<!DOCTYPE html>

<html>
<head>
<title>Krishnalatha Deals Admin</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:30px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:#ff9800;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}
</style>

</head>

<body>

<div class="container">

<h1>Krishnalatha Deals Admin</h1>

<h3>Add Product</h3>

<form id="productForm">

<label>Product Name</label> <input type="text" id="name" required>

<label>Price</label> <input type="text" id="price" required>

<label>Original Price</label> <input type="text" id="originalPrice">

<label>Image URL</label> <input type="text" id="image">

<label>Amazon Link</label> <input type="text" id="amazonLink">

<button type="submit">
Add Product
</button>

</form>

<p id="status"></p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBnp4vvQwB8e2ZedPXmhScChGu-VX_xJYA",
authDomain: "krishnalatha-deals.firebaseapp.com",
projectId: "krishnalatha-deals",
storageBucket: "krishnalatha-deals.firebasestorage.app",
messagingSenderId: "390458780701",
appId: "1:390458780701:web:7f6638bbd480861b12eaf4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("productForm")
.addEventListener("submit", async (e) => {

e.preventDefault();

try {

await addDoc(collection(db,"products"),{
name: document.getElementById("name").value,
price: document.getElementById("price").value,
originalPrice: document.getElementById("originalPrice").value,
image: document.getElementById("image").value,
amazonLink: document.getElementById("amazonLink").value,
createdAt: new Date()
});

document.getElementById("status").innerHTML =
"✅ Product Added Successfully";

document.getElementById("productForm").reset();

} catch(error){

document.getElementById("status").innerHTML =
"❌ Error: " + error.message;

console.log(error);

}

});

</script>

</body>
</html>
