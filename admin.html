<!DOCTYPE html>

<html>
<head>
<title>Krishnalatha Deals Admin</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:30px;
}

.container{
    max-width:600px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:12px;
    background:#ff9800;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}
  select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
}  
</style>

</head>

<body>

<div class="container">

<h1>Krishnalatha Deals Admin</h1>

<h3>Add Product</h3>

<form id="productForm">

<label>Product Name</label> <input type="text" id="name" required>

<label>Price</label> <input type="text" id="price" required>

<label>Original Price</label> <input type="text" id="originalPrice">

<label>Image URL</label>
<input type="text" id="image">

<label>Category</label>

<select id="category">

<option value="Deals">Deals</option>
<option value="Mobiles">Mobiles</option>
<option value="Electronics">Electronics</option>
<option value="Computers">Computers</option>
<option value="Home">Home</option>
<option value="Fashion">Fashion</option>
<option value="Beauty">Beauty</option>
<option value="Grocery">Grocery</option>
<option value="Bags">Bags</option>
<option value="Kids">Kids</option>
<option value="Toys">Toys</option>
<option value="Books">Books</option>
<option value="Health">Health</option>
<option value="Sports">Sports</option>
<option value="Auto">Auto</option>

</select>

<label>Amazon Link</label>
<input type="text" id="amazonLink">

<button type="submit">
Add Product
</button>

</form>

<p id="status"></p>
<h3>Products</h3>

<div id="productList">
Loading products...
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBnp4vvQwB8e2ZedPXmhScChGu-VX_xJYA",
authDomain: "krishnalatha-deals.firebaseapp.com",
projectId: "krishnalatha-deals",
storageBucket: "krishnalatha-deals.firebasestorage.app",
messagingSenderId: "390458780701",
appId: "1:390458780701:web:7f6638bbd480861b12eaf4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
async function loadProducts() {

const snapshot = await getDocs(collection(db, "products"));

let html = "";

snapshot.forEach((productDoc) => {

const product = productDoc.data();

html += `
<div style="border:1px solid #ddd;padding:10px;margin-bottom:10px;background:white;">
    <strong>${product.name || ""}</strong><br>
    Price: ${product.price || ""}<br>
    Category: ${product.category || ""}<br><br>

    <button onclick="deleteProduct('${productDoc.id}')"
        Delete
    </button>
</div>
`;

});

document.getElementById("productList").innerHTML = html;

}
loadProducts();    
document.getElementById("productForm")
.addEventListener("submit", async (e) => {

e.preventDefault();

try {

await addDoc(collection(db,"products"),{
name: document.getElementById("name").value,
price: document.getElementById("price").value,
originalPrice: document.getElementById("originalPrice").value,
image: document.getElementById("image").value,
amazonLink: document.getElementById("amazonLink").value,
category: document.getElementById("category").value || "Other",
createdAt: new Date()
});

document.getElementById("status").innerHTML =
"✅ Product Added Successfully";

document.getElementById("productForm").reset();
loadProducts();
} catch(error){

document.getElementById("status").innerHTML =
"❌ Error: " + error.message;

console.log(error);

}

});

</script>

</body>
</html>
