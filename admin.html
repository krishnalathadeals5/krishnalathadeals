<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBnp4vvQwB8e2ZedPXmhScChGu-VX_xJYA",
authDomain: "krishnalatha-deals.firebaseapp.com",
projectId: "krishnalatha-deals",
storageBucket: "krishnalatha-deals.firebasestorage.app",
messagingSenderId: "390458780701",
appId: "1:390458780701:web:7f6638bbd480861b12eaf4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* Protect Admin Page */
onAuthStateChanged(auth, (user) => {

if (!user) {
window.location.href = "login.html";
return;
}

loadProducts();

});

/* Load Products */
async function loadProducts() {

const snapshot = await getDocs(collection(db, "products"));

let html = "";

snapshot.forEach((productDoc) => {

const product = productDoc.data();

html += `
<div style="border:1px solid #ddd;padding:10px;margin-bottom:10px;background:white;">
<strong>${product.name || ""}</strong><br>
Price: ${product.price || ""}<br>
Category: ${product.category || ""}<br><br>

<button type="button" onclick="deleteProduct('${productDoc.id}')">
Delete
</button>

</div>
`;

});

document.getElementById("productList").innerHTML =
html || "No products found";

}

/* Delete Product */
async function deleteProduct(id){

if(!confirm("Delete this product?")){
return;
}

await deleteDoc(doc(db,"products",id));

loadProducts();

}

window.deleteProduct = deleteProduct;

/* Add Product */
document.getElementById("productForm")
.addEventListener("submit", async (e) => {

e.preventDefault();

try {

await addDoc(collection(db,"products"),{

name: document.getElementById("name").value,
price: document.getElementById("price").value,
originalPrice: document.getElementById("originalPrice").value,
image: document.getElementById("image").value,
amazonLink: document.getElementById("amazonLink").value,
category: document.getElementById("category").value || "Other",
createdAt: new Date()

});

document.getElementById("status").innerHTML =
"✅ Product Added Successfully";

document.getElementById("productForm").reset();

loadProducts();

} catch(error){

document.getElementById("status").innerHTML =
"❌ Error: " + error.message;

console.log(error);

}

});

</script>
