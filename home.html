<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.header{
background:#111;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:18px;
font-weight:bold;
}

/* HERO */
.hero{
background:linear-gradient(45deg,#ff9900,#ff5e00);
color:#fff;
padding:40px 20px;
text-align:center;
}

.hero h1{
margin:0;
font-size:24px;
}

.hero p{
margin:10px 0;
}

.hero button{
padding:10px 20px;
border:none;
background:#000;
color:#fff;
border-radius:6px;
cursor:pointer;
}

/* BRANDS */
.brands{
padding:30px 20px;
text-align:center;
}

.brand-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
gap:15px;
}

.brand{
padding:15px;
border-radius:12px;
text-decoration:none;
color:#000;
background:#fff;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.brand img{
width:40px;
margin-bottom:8px;
}

.brand:hover{
transform:translateY(-5px) scale(1.05);
}

/* BRAND COLORS */
.amazon{border-top:4px solid #ff9900;}
.flipkart{border-top:4px solid #2874f0;}
.myntra{border-top:4px solid #ff3f6c;}
.meesho{border-top:4px solid #f43397;}
.ajio{border-top:4px solid #000;}
.reliance{border-top:4px solid #1e3c72;}

/* SOCIAL FLOAT */
.social-float{
position:fixed;
right:10px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:999;
}

.social-float a{
width:45px;
height:45px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
animation:float 2s infinite ease-in-out;
}

.social-float img{
width:22px;
}

.wa{background:#25D366;}
.tg{background:#0088cc;}
.yt{background:#FF0000;}
.ig{background:#E4405F;}
.fb{background:#1877F2;}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

/* LIVE DEALS */
.deals{
padding:20px;
}

.product{
background:#fff;
padding:10px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.price{
color:green;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:#999;
margin-left:5px;
}

.discount{
color:red;
font-size:12px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">Krishnalatha Deals</div>
</div>

<!-- HERO -->
<div class="hero">
<h1>Best Deals Online</h1>
<p>Amazon • Flipkart • Myntra</p>
<button onclick="location.href='amazon.html'">Shop Now</button>
</div>

<!-- BRANDS -->
<section class="brands">
<h2>Top Platforms</h2>

<div class="brand-grid">

<a href="amazon.html" class="brand amazon">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968870.png">
<p>Amazon</p>
</a>

<a href="#" class="brand flipkart">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png">
<p>Flipkart</p>
</a>

<a href="#" class="brand myntra">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968894.png">
<p>Myntra</p>
</a>

<a href="#" class="brand meesho">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png">
<p>Meesho</p>
</a>

<a href="#" class="brand ajio">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
<p>Ajio</p>
</a>

<a href="#" class="brand reliance">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968672.png">
<p>Reliance</p>
</a>

</div>
</section>

<!-- LIVE DEALS -->
<section class="deals">
<h2>🔥 Live Deals</h2>
<div id="products"></div>
</section>

<!-- SOCIAL FLOAT -->
<div class="social-float">

<a href="https://wa.me/your-number" class="wa" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<a href="https://t.me/your-channel" class="tg" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<a href="#" class="yt" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>

<a href="#" class="ig" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<a href="#" class="fb" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</a>

</div>

<script>
// DEMO DEALS (you can replace with Firebase later)
const products = [
{title:"Mens Jacket", price:4479},
{title:"Slim Fit T-Shirt", price:1784},
{title:"Backpack", price:8796}
];

const container = document.getElementById("products");

products.forEach(p => {

let original = Math.floor(p.price * 1.5);
let discount = Math.floor(((original - p.price)/original)*100);

let link = `https://www.amazon.in/s?k=${encodeURIComponent(p.title)}&tag=krishna-21`;

const div = document.createElement("div");
div.className="product";

div.innerHTML = `
<p>${p.title}</p>
<p class="price">₹${p.price} <span class="old">₹${original}</span></p>
<p class="discount">${discount}% OFF</p>
<a href="${link}" target="_blank">View Deal</a>
`;

container.appendChild(div);

});
</script>

</body>
</html>
