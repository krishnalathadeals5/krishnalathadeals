<script>

// 🔥 AMAZON FIX (extra safe)
function goAmazon(){
window.location.href = "./amazon.html";
}

// 🔥 SPLASH FIX (bulletproof)
document.addEventListener("DOMContentLoaded", function(){

const splash = document.getElementById("splash");

setTimeout(function(){
if(splash){
splash.style.transition = "0.5s ease";
splash.style.opacity = "0";

setTimeout(function(){
splash.remove();
}, 500);
}
}, 1200);

});

// 🔥 PRODUCTS LOAD (safe)
window.addEventListener("load", function(){

const container = document.getElementById("products");
if(!container) return;

const products = [
{title:"Mens Jacket", price:4479},
{title:"Slim Fit T-Shirt", price:1784},
{title:"Backpack", price:8796}
];

container.innerHTML = "";

products.forEach(function(p){

const original = Math.floor(p.price * 1.5);
const discount = Math.floor(((original - p.price)/original)*100);

const link = "https://www.amazon.in/s?k=" + encodeURIComponent(p.title);

const div = document.createElement("div");
div.className = "product";

div.innerHTML =
"<p>"+p.title+"</p>"+
"<p class='price'>₹"+p.price+" <span class='old'>₹"+original+"</span></p>"+
"<p class='discount'>"+discount+"% OFF</p>"+
"<a href='"+link+"' target='_blank'>View Deal</a>";

container.appendChild(div);

});

});

</script>
