<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6fb;
}

/* TOP BAR */
.topbar{
    background:#131921;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
}

.logo{
    color:#ff9900;
    font-weight:bold;
    font-size:18px;
}

/* NAV */
.nav{
    display:flex;
    justify-content:space-around;
    background:#232f3e;
    color:white;
    padding:10px;
}

.nav div{
    cursor:pointer;
    padding:6px 12px;
    background:#37475a;
    border-radius:20px;
}

/* SEARCH */
.search-box{
    padding:10px;
    background:#131921;
}

.search-box input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    outline:none;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
    padding:12px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-content{
    padding:10px;
    text-align:center;
}

.price{
    color:green;
    font-weight:bold;
    margin:5px 0;
}

/* BUTTON */
button{
    width:100%;
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.buy{
    background:#ff9900;
    color:white;
}

/* HEART */
.heart{
    position:absolute;
    top:8px;
    right:8px;
    cursor:pointer;
    font-size:18px;
    background:white;
    border-radius:50%;
    padding:3px 6px;
}

.active{
    color:red;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
    <div class="logo">Krishnalatha Deals</div>
    <div>❤️ <span id="wishCount">0</span></div>
</div>

<!-- NAV -->
<div class="nav">
    <div onclick="setView('home')">Home</div>
    <div onclick="setView('wishlist')">Wishlist</div>
</div>

<!-- SEARCH -->
<div class="search-box">
    <input id="search" placeholder="Search products...">
</div>

<!-- GRID -->
<div class="container" id="grid"></div>

<script>

const products = [
{id:1,name:"Kitchen Box",price:999,img:"images/storage.jpg"},
{id:2,name:"Towel Set",price:299,img:"images/towel.jpg"},
{id:3,name:"Shoes",price:1499,img:"images/shoes.jpg"},
{id:4,name:"Smart Watch",price:1999,img:"images/watch.jpg"},
{id:5,name:"Travel Bag",price:899,img:"images/bag.jpg"},
{id:6,name:"Pooja Diya",price:199,img:"images/diya.jpg"},
{id:7,name:"Laptop",price:45999,img:"images/laptop.jpg"},
{id:8,name:"Mobile",price:14999,img:"images/mobile.jpg"},
{id:9,name:"Home Plant",price:299,img:"images/plant.jpg"},
{id:10,name:"Headphones",price:1299,img:"images/headphones.jpg"}
];

let view="home";

let wishlist = JSON.parse(localStorage.getItem("wish")||"[]");

function save(){
localStorage.setItem("wish",JSON.stringify(wishlist));
}

function setView(v){
view=v;
render();
}

function toggleWish(id){
if(wishlist.includes(id)){
wishlist = wishlist.filter(x=>x!==id);
} else {
wishlist.push(id);
}
save();
render();
}

function render(){

let grid=document.getElementById("grid");
grid.innerHTML="";

let data = view==="home"
? products
: products.filter(p=>wishlist.includes(p.id));

let search = document.getElementById("search").value.toLowerCase();

data = data.filter(p=>p.name.toLowerCase().includes(search));

data.forEach(p=>{

let isWish = wishlist.includes(p.id);

// 🔗 AFFILIATE LINK PLACE (add later)
let affiliateLink = "#";

grid.innerHTML+=`
<div class="card">
<div class="heart ${isWish?'active':''}" onclick="toggleWish(${p.id})">❤</div>
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<a href="${affiliateLink}" class="buy" target="_blank">Buy Now</a>
</div>
</div>
`;
});

document.getElementById("wishCount").innerText=wishlist.length;
}

document.getElementById("search").addEventListener("input",render);

render();

</script>

</body>
</html>
