<script>

// ✅ PRODUCTS WITH LINKS (ADD YOUR AFFILIATE LINKS)
const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg",link:"#"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg",link:"#"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg",link:"#"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg",link:"#"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg",link:"#"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg",link:"#"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg",link:"#"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg",link:"#"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg",link:"#"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg",link:"#"}
];

let wish = JSON.parse(localStorage.getItem("wish")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

// SAVE
function save(){
localStorage.setItem("wish",JSON.stringify(wish));
localStorage.setItem("cart",JSON.stringify(cart));
}

// IMAGE FALLBACK
function imgFix(img){
img.onerror=null;
img.src="https://via.placeholder.com/150";
}

// RENDER
function render(list=products){
let g=document.getElementById("grid");
g.innerHTML="";

list.forEach(p=>{
let isW = wish.find(x=>x.name===p.name);

g.innerHTML+=`
<div class="card" onclick="openDetail('${p.name}')">

<div class="heart ${isW?'active':''}" onclick="event.stopPropagation(); toggleWish('${p.name}')">❤</div>

<img src="${p.img}" onerror="imgFix(this)">

<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
}

// SEARCH
function searchProducts(){
let v=document.getElementById("search").value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(v)));
}

// DETAIL
function openDetail(name){

let p=products.find(x=>x.name===name);
let d=Math.round(((p.old-p.price)/p.old)*100);
let inWish = wish.find(x=>x.name===name);

document.getElementById("detailBody").innerHTML=`
<img src="${p.img}" onerror="imgFix(this)">

<div class="detail-info">
<h2>${p.name}</h2>

<div>
₹${p.price} <span class="old">₹${p.old}</span>
</div>

<div class="discount">${d}% OFF</div>

<button class="btn buy" onclick="buyNow('${p.link}')">Buy Now</button>

<button class="btn cart" onclick="addCart('${p.name}')">Add to Cart</button>

<button class="btn" onclick="toggleWish('${p.name}')">
${inWish ? "❤️ Remove Wishlist" : "🤍 Add Wishlist"}
</button>

</div>
`;

document.getElementById("detailBox").style.display="block";
}

function closeDetail(){
document.getElementById("detailBox").style.display="none";
}

// WISHLIST
function toggleWish(name){
let i=wish.findIndex(x=>x.name===name);

if(i>-1) wish.splice(i,1);
else wish.push({name});

save();
updateCounts();
render();
}

// CART
function addCart(name){
let p=products.find(x=>x.name===name);
let item=cart.find(x=>x.name===name);

if(item) item.qty++;
else cart.push({...p,qty:1});

save();
updateCounts();
alert("Added to cart");
}

// POPUP
function openPopup(type){
let c=document.getElementById("popupContent");
document.getElementById("popup").style.display="flex";

if(type==="wishlist"){
c.innerHTML = wish.length ? wish.map(p=>`
<div class="item">
<div>${p.name}</div>
<button class="remove-btn" onclick="removeWish('${p.name}')">Remove</button>
</div>
`).join("") : "Wishlist Empty";
}

if(type==="cart"){
let total=0;

c.innerHTML = cart.length ? cart.map(p=>{
total += p.price * p.qty;
return `
<div class="item">
<div>${p.name} (₹${p.price})</div>

<div>
<button onclick="changeQty('${p.name}',-1)">-</button>
${p.qty}
<button onclick="changeQty('${p.name}',1)">+</button>
</div>

<button class="remove-btn" onclick="removeCart('${p.name}')">X</button>
</div>`;
}).join("") : "Cart Empty";

c.innerHTML += `<div style="padding:10px;font-weight:bold;">Total: ₹${total}</div>`;
}
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

// REMOVE
function removeWish(name){
wish = wish.filter(x=>x.name!==name);
save();
updateCounts();
openPopup("wishlist");
render();
}

function removeCart(name){
cart = cart.filter(x=>x.name!==name);
save();
updateCounts();
openPopup("cart");
}

// QTY
function changeQty(name,val){
let item=cart.find(x=>x.name===name);
if(!item)return;

item.qty += val;
if(item.qty<=0) cart = cart.filter(x=>x.name!==name);

save();
updateCounts();
openPopup("cart");
}

// BUY NOW
function buyNow(link){
if(link && link !== "#"){
window.open(link,"_blank");
} else {
alert("Add your affiliate link");
}
}

// COUNTS
function updateCounts(){
document.getElementById("wishCount").innerText = wish.length;
document.getElementById("cartCount").innerText = cart.length;
}

// INIT
render();
updateCounts();

</script>
