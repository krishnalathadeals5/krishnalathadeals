<!DOCTYPE html>
<html>
<head>
<title>KrishnaLatha Deals</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header {
  background:#2874f0;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* TOP BAR */
.top {
  position:fixed;
  top:10px;
  right:10px;
  font-size:16px;
}

.top span{
  cursor:pointer;
  margin-left:10px;
}

/* PRODUCTS */
.products {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.card {
  min-width:200px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.card img {
  width:100%;
  height:150px;
  object-fit:contain;
}

button {
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  background:#2874f0;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* MODAL */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:white;
  display:none;
  overflow:auto;
  padding:15px;
}

.close {
  font-size:20px;
  cursor:pointer;
  float:right;
}

/* SOCIAL */
.social {
  text-align:center;
  padding:15px;
}

.social a {
  margin:10px;
  font-size:20px;
  text-decoration:none;
}

.fb { color:#1877f2; }
.insta { color:#e1306c; }
.wa { color:#25d366; }

</style>
</head>

<body>

<header>KrishnaLatha Deals</header>

<div class="top">
  🛒 <span onclick="openCart()">Cart (<span id="cartCount">0</span>)</span>
  ❤️ <span onclick="openWish()">Wish (<span id="wishCount">0</span>)</span>
</div>

<div id="products" class="products"></div>

<!-- CART -->
<div id="cartModal" class="modal">
  <span class="close" onclick="closeCart()">❌</span>
  <h3>Cart</h3>
  <div id="cart"></div>
</div>

<!-- WISHLIST -->
<div id="wishModal" class="modal">
  <span class="close" onclick="closeWish()">❌</span>
  <h3>Wishlist</h3>
  <div id="wish"></div>
</div>

<!-- SOCIAL -->
<div class="social">
  <a href="#" class="fb">Facebook</a>
  <a href="#" class="insta">Instagram</a>
  <a href="#" class="wa">WhatsApp</a>
</div>

<script>

// SAMPLE PRODUCTS (WORKING)
let products = [
  {id:1, name:"Towel Set", price:299, oldPrice:999, image:"https://via.placeholder.com/150", link:"#"},
  {id:2, name:"Kitchen Box", price:499, oldPrice:1299, image:"https://via.placeholder.com/150", link:"#"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wish = JSON.parse(localStorage.getItem("wish")) || [];

// SAVE
function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  localStorage.setItem("wish", JSON.stringify(wish));
  updateCount();
}

// COUNT
function updateCount(){
  document.getElementById("cartCount").innerText = cart.length;
  document.getElementById("wishCount").innerText = wish.length;
}

// SHOW PRODUCTS
function showProducts(){
  let html="";
  products.forEach(p=>{
    let inWish = wish.some(x=>x.id===p.id);

    html += `
    <div class="card">
      <img src="${p.image}">
      <div>${p.name}</div>
      <div>₹${p.price} <del>₹${p.oldPrice}</del></div>

      <button onclick="addCart(${p.id})">Add to Cart</button>

      <button onclick="toggleWish(${p.id})">
        ${inWish ? "❤️ Remove" : "🤍 Wishlist"}
      </button>

      <button onclick="buyNow('${p.link}')">Buy Now</button>
    </div>
    `;
  });

  document.getElementById("products").innerHTML = html;
}

// CART
function addCart(id){
  let item = products.find(x=>x.id===id);

  if(!cart.some(p=>p.id===id)){
    cart.push(item);
  } else {
    cart = cart.filter(p=>p.id!==id);
  }

  save();
  openCart();
}

function openCart(){
  document.getElementById("cartModal").style.display="block";

  let html="";
  cart.forEach(p=>{
    html += `
      <div>
        ${p.name} - ₹${p.price}
        <button onclick="removeCart(${p.id})">Remove</button>
      </div>
    `;
  });

  document.getElementById("cart").innerHTML = html || "Cart is empty";
}

function closeCart(){
  document.getElementById("cartModal").style.display="none";
}

function removeCart(id){
  cart = cart.filter(p=>p.id!==id);
  save();
  openCart();
}

// WISHLIST
function toggleWish(id){
  let item = products.find(x=>x.id===id);

  if(wish.some(p=>p.id===id)){
    wish = wish.filter(p=>p.id!==id);
  } else {
    wish.push(item);
  }

  save();
  showProducts();
}

function openWish(){
  document.getElementById("wishModal").style.display="block";

  let html="";
  wish.forEach(p=>{
    html += `
      <div>
        ${p.name}
        <button onclick="toggleWish(${p.id})">Remove</button>
      </div>
    `;
  });

  document.getElementById("wish").innerHTML = html || "Wishlist is empty";
}

function closeWish(){
  document.getElementById("wishModal").style.display="none";
}

// BUY
function buyNow(link){
  if(link && link !== "#"){
    window.open(link, "_blank");
  } else {
    alert("Affiliate link not added");
  }
}

// INIT
showProducts();
updateCount();

</script>

</body>
</html>
