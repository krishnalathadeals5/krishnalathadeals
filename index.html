<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* SPLASH */
#splash{
position:fixed;
inset:0;
background:#111;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:24px;
z-index:99999;
}

/* HEADER */
.header{
background:#111;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:18px;
font-weight:bold;
}

/* HERO */
.hero{
background:linear-gradient(45deg,#ff9900,#ff5e00);
color:#fff;
padding:40px 20px;
text-align:center;
}

.hero button{
padding:10px 20px;
border:none;
background:#000;
color:#fff;
border-radius:6px;
cursor:pointer;
}

/* BRANDS */
.brands{
padding:30px 20px;
text-align:center;
}

.brand-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(110px,1fr));
gap:15px;
}

.brand{
padding:15px;
border-radius:12px;
text-decoration:none;
color:#000;
background:#fff;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.brand:hover{
transform:scale(1.05);
}

/* DEALS */
.deals{padding:20px;}

.product{
background:#fff;
padding:12px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">Loading Krishnalatha Deals...</div>

<!-- HEADER -->
<div class="header">
<div class="logo">Krishnalatha Deals</div>
</div>

<!-- HERO -->
<div class="hero">
<h2>Best Deals Online</h2>
<p>Amazon • Flipkart • Myntra</p>

<!-- ✅ AMAZON BUTTON FIX -->
<button onclick="openAmazon()">Shop Amazon</button>
</div>

<!-- BRANDS -->
<section class="brands">
<h3>Top Platforms</h3>

<div class="brand-grid">

<!-- ✅ AMAZON LINK FIX -->
<a href="./amazon.html" class="brand">
<p>Amazon</p>
</a>

<a href="#" class="brand">
<p>Flipkart</p>
</a>

</div>
</section>

<!-- DEALS -->
<section class="deals">
<h3>🔥 Live Deals</h3>
<div id="products">Loading deals...</div>
</section>

<script>

/* ✅ AMAZON OPEN FIX */
function openAmazon(){
window.location.href = "./amazon.html";
}

/* SPLASH FIX */
window.addEventListener("load", function(){
setTimeout(function(){
let splash = document.getElementById("splash");
if(splash){
splash.remove();
}
}, 1200);
});

/* SAMPLE PRODUCTS */
window.addEventListener("load", function(){

let container = document.getElementById("products");

let products = [
{title:"Mens Jacket", price:4479},
{title:"Shoes", price:1999},
{title:"Backpack", price:879}
];

container.innerHTML = "";

products.forEach(p=>{

let div = document.createElement("div");
div.className = "product";

div.innerHTML =
"<p>"+p.title+"</p>"+
"<p>₹"+p.price+"</p>";

container.appendChild(div);

});

});

</script>

</body>
</html>
