<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Krishnalatha Deals</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
    }

    header {
      background: orange;
      color: white;
      text-align: center;
      padding: 20px;
    }

    header h1 {
      margin: 0;
    }

    .tagline {
      font-size: 14px;
    }

    .topbar {
      background: black;
      color: white;
      padding: 8px;
      text-align: center;
      font-size: 14px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .product {
      background: white;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: 0.2s;
    }

    .product:hover {
      transform: translateY(-5px);
    }

    .product img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }

    .product h2 {
      font-size: 18px;
      margin: 10px 0;
    }

    .price {
      color: green;
      font-weight: bold;
      font-size: 16px;
    }

    .product a {
      display: block;
      margin-top: 10px;
      padding: 10px;
      background: orange;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .product a:hover {
      background: darkorange;
    }
  </style>
</head>

<body>

<header>
  <h1>Krishnalatha Deals</h1>
  <p class="tagline">Smart Deals. Better Savings.</p>
</header>

<div class="topbar">
  🔥 Today Deals: Kitchen | Beauty | Fashion | Electronics 🔥
</div>

<div class="products">

  <!-- PRODUCT 1 -->
  <div class="product">
    <img src="images/box.jpg" alt="Kitchen Storage Box">
    <h2>Kitchen Storage Box</h2>
    <p class="price">₹999</p>
    <a href="#" target="_blank">Buy Now</a>
  </div>

  <!-- PRODUCT 2 -->
  <div class="product">
    <img src="images/towel.jpg" alt="Towel Set">
    <h2>Towel Set</h2>
    <p class="price">₹299</p>
    <a href="#" target="_blank">Buy Now</a>
  </div>

</div>

</body>
</html>
