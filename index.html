<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
background:#131921;
color:white;
padding:14px;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:22px;
font-weight:800;
color:#ffb84d;
}

.top-icons span{
margin-left:12px;
cursor:pointer;
font-weight:bold;
}

/* SEARCH */
.search-box{
padding:10px;
background:#131921;
}
.search-box input{
width:100%;
padding:10px;
border:none;
border-radius:6px;
outline:none;
}

/* ✅ FIXED SCROLL (true end-to-end smooth) */
.scroll-wrapper{
overflow:hidden;
background:white;
padding:10px 0;
}

.scroll-track{
display:flex;
width:max-content;
animation:scroll 25s linear infinite;
}

.scroll-item{
min-width:140px;
margin-right:15px;
background:#eee;
padding:8px;
border-radius:20px;
text-align:center;
font-size:13px;
font-weight:bold;
white-space:nowrap;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
cursor:pointer;
position:relative;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
display:block;
}

/* DETAIL */
.detail{
position:fixed;
inset:0;
background:white;
display:none;
z-index:9999;
overflow:auto;
}

.detail-header{
display:flex;
justify-content:space-between;
padding:12px;
background:#131921;
color:white;
}

.close{
background:red;
border:none;
color:white;
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
}

.detail-body{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:15px;
}

.detail-body img{
width:320px;
max-width:100%;
border-radius:10px;
}

.detail-info{
flex:1;
min-width:250px;
}

.old{
text-decoration:line-through;
color:gray;
margin-left:8px;
}

.discount{
color:green;
font-weight:bold;
margin:10px 0;
}

.btn{
display:inline-block;
padding:10px 14px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
}
.buy{background:#28a745;color:white;}
.cart{background:#ff9900;color:white;margin-left:10px;}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">Krishnalatha Deals</div>
</div>

<div class="search-box">
<input id="search" placeholder="Search products..." oninput="searchProducts()">
</div>

<!-- SCROLL FIXED -->
<div class="scroll-wrapper">
<div class="scroll-track">
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New</div>
<div class="scroll-item">🏆 Top</div>
<div class="scroll-item">📦 Free</div>

<!-- duplicate for smooth loop -->
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New</div>
<div class="scroll-item">🏆 Top</div>
<div class="scroll-item">📦 Free</div>
</div>
</div>

<div class="container" id="grid"></div>

<!-- DETAIL -->
<div class="detail" id="detailBox">
<div class="detail-header">
<div>Product</div>
<button class="close" onclick="closeDetail()">×</button>
</div>
<div class="detail-body" id="detailBody"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg"}
];

let currentList = products;

/* RENDER */
function render(list=products){
currentList = list;

let g=document.getElementById("grid");
g.innerHTML="";

list.forEach(p=>{
g.innerHTML+=`
<div class="card" onclick="openDetail('${p.name}')">
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
}

/* 🔥 FIXED SEARCH */
function searchProducts(){
let v=document.getElementById("search").value.toLowerCase();

if(v===""){
render(products);
return;
}

render(products.filter(p=>p.name.toLowerCase().includes(v)));
}

/* 🔥 FIXED: RESET SEARCH AFTER CLICK */
function openDetail(name){

// CLEAR SEARCH BOX
document.getElementById("search").value = "";

// RESET FULL LIST BACK
render(products);

let p=products.find(x=>x.name===name);

document.getElementById("detailBody").innerHTML=`
<img src="${p.img}">
<div class="detail-info">
<h2>${p.name}</h2>

<div>
₹${p.price} <span class="old">₹${p.old}</span>
</div>

<div class="discount">${Math.round(((p.old-p.price)/p.old)*100)}% OFF</div>

<button class="btn buy">Buy Now</button>
<button class="btn cart">Add to Cart</button>
</div>
`;

document.getElementById("detailBox").style.display="flex";
}

function closeDetail(){
document.getElementById("detailBox").style.display="none";
}

render();

</script>

</body>
</html>
