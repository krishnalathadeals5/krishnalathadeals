<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.topbar{
background:#131921;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:20px;
font-weight:800;
color:#ffb84d;
}

.top-icons span{
margin-left:10px;
cursor:pointer;
font-weight:bold;
}

/* SEARCH */
.search-box{
padding:10px;
background:#131921;
}
.search-box input{
width:100%;
padding:10px;
border:none;
border-radius:6px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:10px;
text-align:center;
}

.price{
color:green;
font-weight:bold;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
cursor:pointer;
}
.heart.active{background:red;color:white;}

/* BADGE */
.discount{
position:absolute;
top:8px;
left:8px;
background:red;
color:white;
padding:5px;
font-size:12px;
border-radius:20px;
}

/* DETAIL PAGE */
.detail{
position:fixed;
inset:0;
background:white;
display:none;
flex-direction:column;
z-index:1000;
}

.detail-header{
background:#131921;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
align-items:center;
}

.close-btn{
background:red;
border:none;
color:white;
font-size:18px;
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
}

.detail-body{
padding:12px;
}

.detail-body img{
width:100%;
border-radius:10px;
}

.btn{
display:block;
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.buy{background:#28a745;color:white;}
.cart{background:#ff9900;color:white;}

/* CART PANEL */
.popup{
position:fixed;
inset:0;
background:white;
display:none;
flex-direction:column;
z-index:2000;
}

.popup-header{
background:#131921;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
}

.popup-content{
padding:10px;
overflow:auto;
}

.item{
display:flex;
gap:10px;
padding:10px;
background:#f2f2f2;
margin-bottom:10px;
border-radius:10px;
align-items:center;
}

.item img{
width:60px;
height:60px;
object-fit:cover;
}

.qty{
display:flex;
align-items:center;
gap:5px;
}

.qty button{
padding:4px 8px;
}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">Krishnalatha Deals</div>
<div class="top-icons">
<span onclick="openCart()">🛒 <span id="cartCount">0</span></span>
<span onclick="openWish()">❤️ <span id="wishCount">0</span></span>
</div>
</div>

<div class="search-box">
<input id="search" placeholder="Search products...">
</div>

<div class="container" id="grid"></div>

<!-- DETAIL -->
<div class="detail" id="detail">
<div class="detail-header">
<span>Product</span>
<button class="close-btn" onclick="closeDetail()">×</button>
</div>
<div class="detail-body" id="detailBody"></div>
</div>

<!-- CART -->
<div class="popup" id="cartBox">
<div class="popup-header">
<span>Cart</span>
<button onclick="closeCart()">Close</button>
</div>
<div class="popup-content" id="cartContent"></div>
</div>

<!-- WISHLIST -->
<div class="popup" id="wishBox">
<div class="popup-header">
<span>Wishlist</span>
<button onclick="closeWish()">Close</button>
</div>
<div class="popup-content" id="wishContent"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"https://via.placeholder.com/300"},
{name:"Towel Set",price:299,old:499,img:"https://via.placeholder.com/300"},
{name:"Shoes",price:1499,old:1999,img:"https://via.placeholder.com/300"},
{name:"Watch",price:1999,old:2499,img:"https://via.placeholder.com/300"},
{name:"Bag",price:899,old:1299,img:"https://via.placeholder.com/300"},
{name:"Diya",price:199,old:299,img:"https://via.placeholder.com/300"},
{name:"Laptop",price:45999,old:50999,img:"https://via.placeholder.com/300"},
{name:"Mobile",price:14999,old:16999,img:"https://via.placeholder.com/300"},
{name:"Plant",price:299,old:499,img:"https://via.placeholder.com/300"},
{name:"Headphones",price:1299,old:1999,img:"https://via.placeholder.com/300"}
];

let wish=JSON.parse(localStorage.getItem("wish")||"[]");
let cart=JSON.parse(localStorage.getItem("cart")||"[]");

function save(){
localStorage.setItem("wish",JSON.stringify(wish));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* GRID */
function render(){
let g=document.getElementById("grid");
g.innerHTML="";

products.forEach(p=>{
let liked = wish.find(x=>x.name===p.name)?"active":"";
let discount=Math.round((p.old-p.price)/p.old*100);

g.innerHTML+=`
<div class="card" onclick="openDetail('${p.name}')">
<div class="discount">${discount}% OFF</div>
<div class="heart ${liked}" onclick="event.stopPropagation();toggleWish('${p.name}')">❤</div>
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
}

/* WISH */
function toggleWish(name){
let p=products.find(x=>x.name===name);
let i=wish.findIndex(x=>x.name===name);
if(i>-1) wish.splice(i,1);
else wish.push(p);
save(); update(); render();
}

/* DETAIL */
function openDetail(name){
let p=products.find(x=>x.name===name);
document.getElementById("detailBody").innerHTML=`
<img src="${p.img}">
<h2>${p.name}</h2>
<p><b>₹${p.price}</b> <del>${p.old}</del></p>

<button class="btn buy" onclick="buyNow('${p.name}')">Buy Now</button>
<button class="btn cart" onclick="addCart('${p.name}')">Add to Cart</button>
`;

document.getElementById("detail").style.display="flex";
}

function closeDetail(){
document.getElementById("detail").style.display="none";
}

/* CART with QUANTITY */
function addCart(name){
let item=cart.find(x=>x.name===name);
if(item) item.qty++;
else cart.push({name,qty:1});
save(); update();
alert("Added to cart");
}

/* CART UI */
function openCart(){
let box=document.getElementById("cartBox");
box.style.display="flex";

let html="";
cart.forEach((p,i)=>{
let prod=products.find(x=>x.name===p.name);
html+=`
<div class="item">
<img src="${prod.img}">
<div>
<b>${p.name}</b><br>₹${prod.price||prod.price}
</div>
<div class="qty">
<button onclick="dec(${i})">-</button>
${p.qty}
<button onclick="inc(${i})">+</button>
</div>
</div>`;
});

document.getElementById("cartContent").innerHTML=html || "Empty";
}

function closeCart(){document.getElementById("cartBox").style.display="none";}

/* QTY */
function inc(i){cart[i].qty++;save();update();openCart();}
function dec(i){cart[i].qty--;if(cart[i].qty<=0)cart.splice(i,1);save();update();openCart();}

/* WISH */
function openWish(){
let box=document.getElementById("wishBox");
box.style.display="flex";

document.getElementById("wishContent").innerHTML=
wish.map(p=>`
<div class="item">
<img src="${p.img}">
<div>${p.name}</div>
</div>
`).join("") || "Empty";
}
function closeWish(){document.getElementById("wishBox").style.display="none";}

/* BUY */
function buyNow(name){alert("Buying "+name);}

/* UPDATE COUNTS */
function update(){
document.getElementById("wishCount").innerText=wish.length;
document.getElementById("cartCount").innerText=cart.reduce((a,b)=>a+b.qty,0);
}

render();
update();

</script>

</body>
</html>
