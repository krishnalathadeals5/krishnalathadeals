<!DOCTYPE html>
<html>
<head>
<title>KrishnaLatha Deals</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header {
  background:#2874f0;
  color:white;
  padding:15px;
  text-align:center;
}

/* TOP BAR */
.top {
  position:fixed;
  top:10px;
  right:10px;
}

.top span {
  margin:0 5px;
  cursor:pointer;
}

/* SEARCH */
.search {
  padding:10px;
}
.search input {
  width:100%;
  padding:8px;
}

/* PRODUCTS */
.products {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.card {
  min-width:200px;
  background:white;
  padding:10px;
  border-radius:10px;
}

.card img {
  width:100%;
  height:150px;
  object-fit:contain;
}

button {
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  background:#2874f0;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* POPUP */
.popup {
  position:fixed;
  top:0;
  right:-100%;
  width:300px;
  height:100%;
  background:white;
  transition:0.3s;
  padding:10px;
  overflow:auto;
}

.popup.active {
  right:0;
}

.close {
  cursor:pointer;
  color:red;
}

/* SOCIAL */
.social {
  text-align:center;
  margin:10px;
}
.social a {
  margin:5px;
  font-size:20px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>KrishnaLatha Deals</header>

<div class="top">
  🛒 <span onclick="toggleCart()">Cart</span>
  ❤️ <span onclick="toggleWish()">Wish</span>
</div>

<div class="search">
  <input type="text" placeholder="Search products..." onkeyup="searchProducts(this.value)">
</div>

<div id="products" class="products">Loading...</div>

<!-- CART -->
<div id="cartBox" class="popup">
  <span class="close" onclick="toggleCart()">❌ Close</span>
  <h3>Cart</h3>
  <div id="cart"></div>
</div>

<!-- WISHLIST -->
<div id="wishBox" class="popup">
  <span class="close" onclick="toggleWish()">❌ Close</span>
  <h3>Wishlist</h3>
  <div id="wish"></div>
</div>

<!-- SOCIAL -->
<div class="social">
  <a href="#" style="color:#1877f2">Facebook</a>
  <a href="#" style="color:#e4405f">Instagram</a>
  <a href="#" style="color:#25d366">WhatsApp</a>
</div>

<script>

// 🔥 PUT YOUR API
const API = "PASTE_YOUR_API_LINK_HERE";

let products = [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wish = JSON.parse(localStorage.getItem("wish")) || [];

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  localStorage.setItem("wish", JSON.stringify(wish));
}

// LOAD PRODUCTS
async function loadProducts(){
  try{
    const res = await fetch(API);
    const data = await res.json();

    products = data.map(p => ({
      id: Number(p.id),
      name: p.name,
      image: p.image,
      price: Number(p.price),
      oldPrice: Number(p.oldPrice),
      link: p.affiliateLink
    }));

    showProducts(products);

  } catch{
    document.getElementById("products").innerHTML = "Error loading";
  }
}

// SHOW PRODUCTS
function showProducts(list){
  let html = "";
  list.forEach(p=>{
    let heart = wish.some(w=>w.id===p.id) ? "💖" : "🤍";

    html += `
    <div class="card">
      <img src="${p.image}">
      <div>${p.name}</div>
      <div>₹${p.price} <del>₹${p.oldPrice}</del></div>

      <button onclick="addCart(${p.id})">Add to Cart</button>
      <button onclick="toggleWishlist(${p.id})">${heart} Wishlist</button>
      <button onclick="buyNow('${p.link}')">Buy Now</button>
    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

// SEARCH
function searchProducts(val){
  let filtered = products.filter(p => 
    p.name.toLowerCase().includes(val.toLowerCase())
  );
  showProducts(filtered);
}

// CART
function addCart(id){
  if(!cart.some(p=>p.id===id)){
    let item = products.find(x=>x.id===id);
    cart.push(item);
    save();
  }
  renderCart();
  toggleCart();
}

function removeCart(id){
  cart = cart.filter(p=>p.id!==id);
  save();
  renderCart();
}

function renderCart(){
  let html="";
  cart.forEach(p=>{
    html += `
    <div>
      <img src="${p.image}" width="50">
      ${p.name} - ₹${p.price}
      <button onclick="removeCart(${p.id})">Remove</button>
    </div>`;
  });
  document.getElementById("cart").innerHTML = html || "Empty";
}

function toggleCart(){
  document.getElementById("cartBox").classList.toggle("active");
}

// WISHLIST
function toggleWishlist(id){
  if(wish.some(p=>p.id===id)){
    wish = wish.filter(p=>p.id!==id);
  } else {
    let item = products.find(x=>x.id===id);
    wish.push(item);
  }
  save();
  renderWish();
  showProducts(products);
}

function renderWish(){
  let html="";
  wish.forEach(p=>{
    html += `
    <div>
      <img src="${p.image}" width="50">
      ${p.name}
    </div>`;
  });
  document.getElementById("wish").innerHTML = html || "Empty";
}

function toggleWish(){
  document.getElementById("wishBox").classList.toggle("active");
}

// BUY
function buyNow(link){
  window.open(link, "_blank");
}

// INIT
loadProducts();
renderCart();
renderWish();

</script>

</body>
</html>
