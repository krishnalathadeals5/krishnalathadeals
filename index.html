<!DOCTYPE html>
<html>
<head>
<title>KrishnaLatha Deals</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header {
  background:#2874f0;
  color:white;
  padding:15px;
  text-align:center;
}

.top {
  position:fixed;
  top:10px;
  right:10px;
}

.products {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.card {
  min-width:180px;
  background:white;
  padding:10px;
  border-radius:10px;
}

button {
  width:100%;
  margin-top:5px;
  padding:8px;
}
</style>

</head>

<body>

<header>KrishnaLatha Deals</header>

<div class="top">
  🛒 <span onclick="openCart()">Cart</span>
  ❤️ <span onclick="openWish()">Wish</span>
</div>

<div id="products" class="products"></div>

<h3>Cart</h3>
<div id="cart"></div>

<h3>Wishlist</h3>
<div id="wish"></div>

<script>

// PRODUCTS
let products = [
  {id:1,name:"Stylish Bag",price:899,old:1299},
  {id:2,name:"Plant Pot",price:299,old:499}
];

// LOAD DATA
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wish = JSON.parse(localStorage.getItem("wish")) || [];

// SAVE
function save() {
  localStorage.setItem("cart", JSON.stringify(cart));
  localStorage.setItem("wish", JSON.stringify(wish));
}

// SHOW PRODUCTS
function showProducts(){
  let html="";
  products.forEach(p=>{
    html += `
    <div class="card">
      <div>${p.name}</div>
      <div>₹${p.price} <del>₹${p.old}</del></div>

      <button onclick="addCart(${p.id})">Add to Cart</button>
      <button onclick="addWish(${p.id})">❤️ Wishlist</button>
    </div>
    `;
  });
  document.getElementById("products").innerHTML = html;
}

// ADD CART (NO DUPLICATES)
function addCart(id){
  if(!cart.some(p => p.id === id)){
    let p = products.find(x=>x.id===id);
    cart.push(p);
    save();
  }
  openCart();
}

// ADD WISH (NO DUPLICATES)
function addWish(id){
  if(!wish.some(p => p.id === id)){
    let p = products.find(x=>x.id===id);
    wish.push(p);
    save();
  }
  openWish();
}

// SHOW CART
function openCart(){
  let html="";
  cart.forEach(p=>{
    html += `<div>${p.name}</div>`;
  });
  document.getElementById("cart").innerHTML = html;
}

// SHOW WISH
function openWish(){
  let html="";
  wish.forEach(p=>{
    html += `<div>${p.name}</div>`;
  });
  document.getElementById("wish").innerHTML = html;
}

// INIT
showProducts();
openCart();
openWish();

</script>

</body>
</html>
