<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f1115;
color:white;
}

/* HEADER */
.header{
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
background:#111;
}

/* MOVING HERO BANNER */
.hero-wrap{
overflow:hidden;
white-space:nowrap;
background:linear-gradient(90deg,#ff9900,#ff3f6c,#2874f0,#9c27b0);
}

.hero-track{
display:inline-block;
padding:12px 0;
animation:move 12s linear infinite;
font-weight:bold;
}

@keyframes move{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

/* BRAND SECTION */
.brand-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
padding:20px;
}

.brand{
background:#1c1f26;
border-radius:16px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 10px rgba(255,255,255,0.05);
animation:float 3s ease-in-out infinite;
}

.brand:hover{
transform:scale(1.08);
box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.brand img{
width:45px;
height:45px;
margin-bottom:8px;
}

/* COLORS */
.amazon{border-top:4px solid #ff9900;}
.flipkart{border-top:4px solid #2874f0;}
.myntra{border-top:4px solid #ff3f6c;}
.meesho{border-top:4px solid #9c27b0;}
.ajio{border-top:4px solid #ffffff;}

/* FLOAT ANIMATION */
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

/* TEXT */
.title{
text-align:center;
padding:10px;
font-size:16px;
opacity:0.8;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">Krishnalatha Deals</div>

<!-- MOVING HERO -->
<div class="hero-wrap">
<div class="hero-track">
🔥 Best Deals • Lowest Prices • Amazon • Flipkart • Myntra • Meesho • Ajio • Reliance Digital • Offers 🔥
</div>
</div>

<div class="title">Choose your shopping platform</div>

<!-- BRAND ICONS -->
<div class="brand-grid">

<div class="brand amazon" onclick="openPage('amazon.html')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968870.png">
Amazon
</div>

<div class="brand flipkart" onclick="openPage('flipkart.html')">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png">
Flipkart
</div>

<div class="brand myntra" onclick="openPage('myntra.html')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968894.png">
Myntra
</div>

<div class="brand meesho" onclick="openPage('meesho.html')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png">
Meesho
</div>

<div class="brand ajio" onclick="openPage('ajio.html')">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
Ajio
</div>

</div>

<script>

function openPage(page){
window.location.href = page;
}

</script>

</body>
</html>
