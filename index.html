<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* SPLASH */
#splash{
position:fixed;
inset:0;
background:#111;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
z-index:99999;
}

/* HEADER */
.header{
background:#111;
color:#fff;
padding:15px;
text-align:center;
font-weight:bold;
}

/* HERO */
.hero{
background:linear-gradient(45deg,#ff9900,#ff5e00);
color:#fff;
padding:35px 20px;
text-align:center;
}

.hero button{
padding:10px 20px;
border:none;
background:#000;
color:#fff;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

/* BRAND GRID FIX (ICONS PROPER ALIGN) */
.brand-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
gap:15px;
padding:15px;
}

.brand{
background:#fff;
border-radius:14px;
padding:15px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-decoration:none;
color:#000;
font-weight:bold;
transition:0.3s;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.brand img{
width:45px;
height:45px;
margin-bottom:8px;
}

.brand:hover{
transform:translateY(-5px) scale(1.05);
}

/* BRAND COLORS */
.amazon{border-top:4px solid #ff9900;}
.flipkart{border-top:4px solid #2874f0;}
.myntra{border-top:4px solid #ff3f6c;}
.meesho{border-top:4px solid #9c27b0;}
.ajio{border-top:4px solid #000;}

/* PRODUCT COMPARISON BOX (AMAZON STYLE) */
.product-box{
background:#fff;
margin:12px;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.product-info{
flex:1;
min-width:200px;
}

.price{
color:green;
font-weight:bold;
font-size:18px;
}

/* SOCIAL FLOAT ICONS */
.social-float{
position:fixed;
right:12px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:9999;
}

.social{
width:45px;
height:45px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
animation:float 2s infinite ease-in-out;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.social img{
width:22px;
height:22px;
}

/* COLORS */
.wa{background:#25D366;}
.tg{background:#0088cc;}
.yt{background:#FF0000;}
.ig{background:#E4405F;}
.fb{background:#1877F2;}

/* ANIMATION */
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">Loading Krishnalatha Deals...</div>

<!-- HEADER -->
<div class="header">
Krishnalatha Deals
</div>

<!-- HERO -->
<div class="hero">
<h2>Best Deals Online</h2>
<p>Amazon • Flipkart • Myntra • Meesho • Ajio</p>
<button onclick="goAmazon()">Shop Amazon</button>
</div>

<!-- BRANDS -->
<div class="brand-grid">

<a href="./amazon.html" class="brand amazon">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968870.png">
Amazon
</a>

<a href="#" class="brand flipkart">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png">
Flipkart
</a>

<a href="#" class="brand myntra">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968894.png">
Myntra
</a>

<a href="#" class="brand meesho">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png">
Meesho
</a>

<a href="#" class="brand ajio">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
Ajio
</a>

</div>

<!-- PRODUCT COMPARISON STYLE -->
<div class="product-box">
<div class="product-info">
<h3>Mens Jacket</h3>
<div class="price">₹4479</div>
</div>
</div>

<div class="product-box">
<div class="product-info">
<h3>Shoes</h3>
<div class="price">₹1999</div>
</div>
</div>

<div class="product-box">
<div class="product-info">
<h3>Backpack</h3>
<div class="price">₹879</div>
</div>
</div>

<!-- SOCIAL FLOAT ICONS -->
<div class="social-float">

<a class="social wa" href="https://wa.me/" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

<a class="social tg" href="https://t.me/" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png">
</a>

<a class="social yt" href="#" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</a>

<a class="social ig" href="#" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<a class="social fb" href="#" target="_blank">
<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
</a>

</div>

<script>

/* AMAZON PAGE */
function goAmazon(){
window.location.href="./amazon.html";
}

/* SPLASH FIX */
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("splash").remove();
},1000);
});

</script>

</body>
</html>
