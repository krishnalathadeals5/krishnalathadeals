<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f6fa;
}

/* TOP BAR */
.topbar{
    background:#131921;
    color:white;
    display:flex;
    justify-content:space-between;
    padding:12px 15px;
    align-items:center;
}

.logo{
    color:#ff9900;
    font-weight:bold;
}

/* NAV */
.nav{
    display:flex;
    gap:10px;
    padding:10px;
    background:#232f3e;
    color:white;
}

.nav div{
    cursor:pointer;
    padding:6px 10px;
    background:#37475a;
    border-radius:15px;
}

/* SEARCH */
.search-box{
    padding:10px;
    background:#131921;
}

.search-box input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:none;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
    padding:12px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    padding:10px;
    position:relative;
}

.card img{
    width:100%;
    height:140px;
    object-fit:cover;
}

.price{
    color:green;
    font-weight:bold;
}

/* BUTTONS */
button{
    width:100%;
    padding:6px;
    margin-top:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.buy{
    background:#ff9900;
    color:white;
}

/* HEART */
.heart{
    position:absolute;
    top:8px;
    right:8px;
    cursor:pointer;
    font-size:18px;
}

/* ACTIVE HEART */
.active{
    color:red;
}

/* BAR */
.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#111;
    color:white;
    display:flex;
    justify-content:space-around;
    padding:10px;
}
.bottom div{
    cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">Krishnalatha Deals</div>
    <div>❤️ <span id="wishCount">0</span></div>
</div>

<div class="search-box">
    <input id="search" placeholder="Search products...">
</div>

<div class="nav">
    <div onclick="setView('home')">Home</div>
    <div onclick="setView('wishlist')">Wishlist</div>
    <div onclick="setView('compare')">Compare</div>
</div>

<div id="grid" class="container"></div>

<div class="bottom">
    <div onclick="setView('home')">🏠 Home</div>
    <div onclick="setView('wishlist')">❤️ Wishlist</div>
    <div onclick="setView('compare')">⚖ Compare</div>
</div>

<script>

const products = [
{id:1,name:"Kitchen Box",price:999,img:"images/storage.jpg"},
{id:2,name:"Towel",price:299,img:"images/towel.jpg"},
{id:3,name:"Shoes",price:1499,img:"images/shoes.jpg"},
{id:4,name:"Watch",price:1999,img:"images/watch.jpg"},
{id:5,name:"Bag",price:899,img:"images/bag.jpg"},
{id:6,name:"Diya",price:199,img:"images/diya.jpg"},
{id:7,name:"Laptop",price:45999,img:"images/laptop.jpg"},
{id:8,name:"Mobile",price:14999,img:"images/mobile.jpg"},
{id:9,name:"Plant",price:299,img:"images/plant.jpg"},
{id:10,name:"Headphones",price:1299,img:"images/headphones.jpg"}
];

let view="home";

let wishlist = JSON.parse(localStorage.getItem("wish")||"[]");
let compare = [];

function save(){
localStorage.setItem("wish",JSON.stringify(wishlist));
}

function setView(v){
view=v;
render();
}

function toggleWish(id){

let index = wishlist.indexOf(id);

if(index===-1){
wishlist.push(id);
} else {
wishlist.splice(index,1);
}

save();
render();
}

function addCompare(id){
if(compare.includes(id)) return;

if(compare.length<2){
compare.push(id);
}
render();
}

function render(){

let grid=document.getElementById("grid");
grid.innerHTML="";

let data=[];

if(view==="home"){
data=products;
}
else if(view==="wishlist"){
data=products.filter(p=>wishlist.includes(p.id));
}
else if(view==="compare"){
data=products.filter(p=>compare.includes(p.id));
}

data.forEach(p=>{

let isWish = wishlist.includes(p.id);

grid.innerHTML+=`
<div class="card">
<div class="heart ${isWish?'active':''}" onclick="toggleWish(${p.id})">❤</div>
<img src="${p.img}">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>

<button class="buy">Buy Now</button>
<button onclick="addCompare(${p.id})">Add Compare</button>
</div>
`;
});

document.getElementById("wishCount").innerText=wishlist.length;
}

render();

</script>

</body>
</html>
