<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg"}
];

let wish = JSON.parse(localStorage.getItem("wish")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("wish",JSON.stringify(wish));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* OPEN PRODUCT PAGE */
function openProduct(name){
localStorage.setItem("selectedProduct",name);
window.location.href="product.html";
}

/* RENDER */
function render(data=products){
let g=document.getElementById("grid");
g.innerHTML="";

data.forEach(p=>{

let liked = wish.find(x=>x.name===p.name) ? "active" : "";
let discount = Math.round(((p.old-p.price)/p.old)*100);

g.innerHTML+=`
<div class="card" onclick="openProduct('${p.name}')">

<div class="discount">${discount}% OFF</div>

<div class="heart ${liked}" onclick="event.stopPropagation(); toggleWish('${p.name}')">❤</div>

<img src="${p.img}">

<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>

<a class="btn cart-btn" onclick="event.stopPropagation(); addCart('${p.name}')">Add to Cart</a>
<a class="btn buy-btn" onclick="event.stopPropagation(); buyNow('${p.name}')">Buy Now</a>

</div>
</div>`;
});
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
let v=this.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(v)));
});

/* WISHLIST */
function toggleWish(name){
let p = products.find(x=>x.name===name);
let i = wish.findIndex(x=>x.name===name);

if(i>-1) wish.splice(i,1);
else wish.push(p);

save();
updateCounts();
render();
}

/* CART */
function addCart(name){
let p = products.find(x=>x.name===name);
if(!cart.find(x=>x.name===name)) cart.push(p);

save();
updateCounts();
}

/* BUY */
function buyNow(name){
alert("Buying " + name);
}

/* POPUP */
function openPopup(type){
let box=document.getElementById("popup");
let content=document.getElementById("popupContent");
let title=document.getElementById("popupTitle");

box.style.display="flex";

let list = type==="wishlist" ? wish : cart;

title.innerText = type==="wishlist" ? "Wishlist" : "Cart";

content.innerHTML = list.length ? list.map(p=>`
<div class="popup-item">
<img src="${p.img}">
<div>
<b>${p.name}</b><br>
₹${p.price}
</div>
<button onclick="${type==='wishlist'?'removeWish':'removeCart'}('${p.name}')">Remove</button>
</div>
`).join("") : "<p style='padding:10px;'>Empty</p>";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* REMOVE */
function removeWish(name){
wish = wish.filter(x=>x.name!==name);
save();
updateCounts();
openPopup("wishlist");
render();
}

function removeCart(name){
cart = cart.filter(x=>x.name!==name);
save();
updateCounts();
openPopup("cart");
}

function updateCounts(){
document.getElementById("wishCount").innerText=wish.length;
document.getElementById("cartCount").innerText=cart.length;
}

render();
updateCounts();

</script>
