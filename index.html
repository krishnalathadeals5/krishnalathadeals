<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.topbar{
background:#131921;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:20px;
font-weight:800;
color:#ffb84d;
}

.top-icons span{
margin-left:10px;
cursor:pointer;
font-weight:bold;
}

/* SEARCH */
.search-box{
padding:10px;
background:#131921;
}
.search-box input{
width:100%;
padding:10px;
border:none;
border-radius:6px;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
position:relative;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:10px;
text-align:center;
}

.price{
color:green;
font-weight:bold;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
cursor:pointer;
}
.heart.active{background:red;color:white;}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:white;
display:none;
flex-direction:column;
z-index:2000;
}

.popup-header{
background:#131921;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.popup-content{
padding:10px;
overflow:auto;
}

.item{
display:flex;
gap:10px;
align-items:center;
padding:10px;
background:#f2f2f2;
margin-bottom:10px;
border-radius:10px;
}

.item img{
width:60px;
height:60px;
object-fit:cover;
}

.btn{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.remove{background:red;color:white;}

/* DETAIL */
.detail{
position:fixed;
inset:0;
background:white;
display:none;
flex-direction:column;
z-index:3000;
}

.detail-header{
background:#131921;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
}

.close-btn{
background:red;
border:none;
color:white;
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
}

.detail-body{
padding:12px;
}

.detail-body img{
width:100%;
border-radius:10px;
}

.action{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.buy{background:#28a745;color:white;}
.cart{background:#ff9900;color:white;}

</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
<div class="logo">Krishnalatha Deals</div>

<div class="top-icons">
<span onclick="openWish()">❤️ <span id="wishCount">0</span></span>
<span onclick="openCart()">🛒 <span id="cartCount">0</span></span>
</div>
</div>

<!-- SEARCH -->
<div class="search-box">
<input id="search" placeholder="Search products...">
</div>

<!-- GRID -->
<div class="container" id="grid"></div>

<!-- DETAIL -->
<div class="detail" id="detailBox">
<div class="detail-header">
<span>Product</span>
<button class="close-btn" onclick="closeDetail()">×</button>
</div>

<div class="detail-body" id="detailBody"></div>
</div>

<!-- CART -->
<div class="popup" id="cartBox">
<div class="popup-header">
<span>Cart</span>
<button onclick="closeCart()">Close</button>
</div>
<div class="popup-content" id="cartContent"></div>
</div>

<!-- WISHLIST -->
<div class="popup" id="wishBox">
<div class="popup-header">
<span>Wishlist</span>
<button onclick="closeWish()">Close</button>
</div>
<div class="popup-content" id="wishContent"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg"}
];

let wish=JSON.parse(localStorage.getItem("wish")||"[]");
let cart=JSON.parse(localStorage.getItem("cart")||"[]");

function save(){
localStorage.setItem("wish",JSON.stringify(wish));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* RENDER */
function render(){
let g=document.getElementById("grid");
g.innerHTML="";

products.forEach(p=>{
let liked = wish.find(x=>x.name===p.name)?"active":"";

g.innerHTML+=`
<div class="card">
<div class="heart ${liked}" onclick="event.stopPropagation();toggleWish('${p.name}')">❤</div>

<!-- CLICK IMAGE OPENS DETAIL -->
<img src="${p.img}" onclick="openDetail('${p.name}')">

<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
}

/* WISH */
function toggleWish(name){
let p=products.find(x=>x.name===name);
let i=wish.findIndex(x=>x.name===name);
if(i>-1) wish.splice(i,1);
else wish.push(p);
save(); update(); render();
}

/* DETAIL */
function openDetail(name){
let p=products.find(x=>x.name===name);

document.getElementById("detailBody").innerHTML=`
<img src="${p.img}">
<h2>${p.name}</h2>
<p><b>₹${p.price}</b> <del>${p.old}</del></p>

<button class="action buy" onclick="buyNow('${p.name}')">Buy Now</button>
<button class="action cart" onclick="addCart('${p.name}')">Add to Cart</button>
`;

document.getElementById("detailBox").style.display="flex";
}

function closeDetail(){
document.getElementById("detailBox").style.display="none";
}

/* CART */
function addCart(name){
let p=products.find(x=>x.name===name);

let item=cart.find(x=>x.name===name);
if(item) item.qty++;
else cart.push({...p,qty:1});

save(); update();
}

/* CART OPEN */
function openCart(){
document.getElementById("cartBox").style.display="flex";

document.getElementById("cartContent").innerHTML=
cart.map((p,i)=>`
<div class="item">
<img src="${p.img}">
<div style="flex:1">
<b>${p.name}</b><br>₹${p.price}
</div>

<div>
Qty: ${p.qty}
</div>

<button class="btn remove" onclick="removeCart(${i})">X</button>
</div>
`).join("") || "Empty";
}

function closeCart(){
document.getElementById("cartBox").style.display="none";
}

/* WISHLIST OPEN */
function openWish(){
document.getElementById("wishBox").style.display="flex";

document.getElementById("wishContent").innerHTML=
wish.map((p,i)=>`
<div class="item">
<img src="${p.img}">
<div style="flex:1">${p.name}</div>
<button class="btn remove" onclick="removeWish(${i})">X</button>
</div>
`).join("") || "Empty";
}

function closeWish(){
document.getElementById("wishBox").style.display="none";
}

/* REMOVE */
function removeWish(i){
wish.splice(i,1);
save(); update(); openWish(); render();
}

function removeCart(i){
cart.splice(i,1);
save(); update(); openCart();
}

/* BUY */
function buyNow(name){
alert("Buying "+name);
}

/* UPDATE COUNTS */
function update(){
document.getElementById("wishCount").innerText=wish.length;
document.getElementById("cartCount").innerText=cart.reduce((a,b)=>a+b.qty,0);
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
let v=this.value.toLowerCase();
let f=products.filter(p=>p.name.toLowerCase().includes(v));
let g=document.getElementById("grid");
g.innerHTML="";
f.forEach(p=>{
g.innerHTML+=`
<div class="card">
<img src="${p.img}" onclick="openDetail('${p.name}')">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
});

render();
update();

</script>

</body>
</html>
