<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* SPLASH */
#splash{
position:fixed;
inset:0;
background:#111;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
z-index:99999;
}

/* HEADER */
.header{
background:#111;
color:#fff;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
}

/* HERO */
.hero{
background:linear-gradient(45deg,#ff9900,#ff5e00);
color:#fff;
padding:40px 20px;
text-align:center;
}

.hero button{
padding:10px 20px;
border:none;
background:#000;
color:#fff;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

/* BRANDS */
.brands{
padding:30px 15px;
text-align:center;
}

.brand-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
margin-top:15px;
}

.brand{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:15px;
border-radius:14px;
text-decoration:none;
background:#fff;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.3s;
font-weight:bold;
color:#000;
}

.brand img{
width:45px;
height:45px;
margin-bottom:8px;
}

.brand:hover{
transform:translateY(-5px) scale(1.05);
}

/* BRAND COLORS */
.amazon{border-top:4px solid #ff9900;}
.flipkart{border-top:4px solid #2874f0;}
.myntra{border-top:4px solid #ff3f6c;}
.meesho{border-top:4px solid #9c27b0;}
.ajio{border-top:4px solid #000;}

/* DEALS */
.deals{
padding:20px;
}

.product{
background:#fff;
padding:12px;
margin-bottom:12px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.price{color:green;font-weight:bold;}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">Loading Krishnalatha Deals...</div>

<!-- HEADER -->
<div class="header">
Krishnalatha Deals
</div>

<!-- HERO -->
<div class="hero">
<h2>Best Deals Online</h2>
<p>Amazon • Flipkart • Myntra • Meesho • Ajio</p>

<!-- AMAZON BUTTON -->
<button onclick="goAmazon()">Shop Amazon</button>
</div>

<!-- BRANDS -->
<section class="brands">
<h3>Top Platforms</h3>

<div class="brand-grid">

<a href="./amazon.html" class="brand amazon">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968870.png">
<p>Amazon</p>
</a>

<a href="#" class="brand flipkart">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png">
<p>Flipkart</p>
</a>

<a href="#" class="brand myntra">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968894.png">
<p>Myntra</p>
</a>

<a href="#" class="brand meesho">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png">
<p>Meesho</p>
</a>

<a href="#" class="brand ajio">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
<p>Ajio</p>
</a>

</div>
</section>

<!-- DEALS -->
<section class="deals">
<h3>🔥 Live Deals</h3>

<div class="product">
Mens Jacket
<div class="price">₹4479</div>
</div>

<div class="product">
Shoes
<div class="price">₹1999</div>
</div>

<div class="product">
Backpack
<div class="price">₹879</div>
</div>

</section>

<script>

/* AMAZON NAVIGATION */
function goAmazon(){
window.location.href = "./amazon.html";
}

/* SPLASH FIX */
window.addEventListener("load", function(){
setTimeout(()=>{
let splash = document.getElementById("splash");
if(splash) splash.remove();
}, 1000);
});

</script>

</body>
</html>
