<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Krishnalatha Deals</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at center, #0a3b2f, #021d16);
  font-family: 'Georgia', serif;
  color:#d4af37;
}

/* MAIN BOX */
.container{
  width:90%;
  max-width:380px;
  padding:30px;
  border:2px solid #d4af37;
  border-radius:20px;
  text-align:center;
  position:relative;
  box-shadow:0 0 40px rgba(212,175,55,0.5);
}

/* CORNER DESIGN */
.container::before,
.container::after{
  content:"";
  position:absolute;
  width:40px;
  height:40px;
  border:2px solid #d4af37;
}

.container::before{
  top:-2px;
  left:-2px;
  border-right:none;
  border-bottom:none;
}

.container::after{
  bottom:-2px;
  right:-2px;
  border-left:none;
  border-top:none;
}

/* LOGO */
.logo{
  position:relative;
  width:130px;
  height:130px;
  margin:auto;
  border-radius:50%;
  border:3px solid #d4af37;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:45px;
  font-weight:bold;
  box-shadow:0 0 25px #d4af37;
}

/* CROWN */
.logo::before{
  content:"👑";
  position:absolute;
  top:-35px;
  font-size:30px;
}

/* TITLE */
h1{
  margin-top:25px;
  font-size:26px;
  letter-spacing:2px;
}

/* SUBTEXT */
.sub{
  margin-top:10px;
  color:#eee;
  font-size:14px;
}

/* DIVIDER */
.line{
  width:60%;
  height:2px;
  background:#d4af37;
  margin:20px auto;
}

/* LOADING BAR */
.loader{
  width:100%;
  height:8px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#d4af37,#ffd700);
  animation:load 3s linear forwards;
}

@keyframes load{
  100%{width:100%;}
}

/* LOADING TEXT */
.loading-text{
  margin-top:10px;
  font-size:13px;
  color:#ccc;
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">KD</div>

  <h1>KRISHNALATHA<br>DEALS</h1>

  <div class="sub">
    BEST DEALS, BIG SAVINGS!<br>
    One Destination. Endless Savings.
  </div>

  <div class="line"></div>

  <div class="loader">
    <div class="bar"></div>
  </div>

  <div class="loading-text">Loading...</div>

</div>

<script>
setTimeout(()=>{
  window.location.href="home.html";
},3000);
</script>

</body>
</html>
