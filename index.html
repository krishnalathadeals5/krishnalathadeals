<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{margin:0;font-family:Arial;background:#f5f6fa}

/* HEADER */
.topbar{
background:linear-gradient(90deg,#131921,#1f2a38);
color:white;
display:flex;
justify-content:space-between;
padding:14px;
position:sticky;
top:0;
z-index:999;
}
.logo{font-size:22px;font-weight:800;color:#ffb84d}
.top-icons span{margin-left:12px;cursor:pointer;font-weight:bold}

/* SEARCH */
.search-box{padding:10px;background:#131921}
.search-box input{
width:100%;padding:10px;border-radius:6px;border:none;outline:none;
}

/* SCROLL */
.scroll-wrapper{overflow:hidden;background:white;padding:10px 0}
.scroll-track{
display:flex;gap:20px;width:max-content;
animation:scroll 18s linear infinite;
}
.scroll-wrapper:hover .scroll-track{animation-play-state:paused}
.scroll-item{
min-width:160px;background:#f4f4f4;
padding:8px;border-radius:20px;text-align:center;font-size:13px;font-weight:bold
}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;border-radius:12px;overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
cursor:pointer;
}
.card img{width:100%;height:150px;object-fit:cover}
.card-content{text-align:center;padding:10px}
.price{color:green;font-weight:bold}

/* DETAIL */
.detail{
position:fixed;inset:0;background:white;display:none;z-index:9999;
overflow:auto;
}
.detail-header{
display:flex;justify-content:space-between;
padding:12px;background:#131921;color:white;
}
.close{background:red;border:none;color:white;width:35px;height:35px;border-radius:50%}
.detail-body{display:flex;gap:20px;padding:15px}
.detail-body img{width:40%;border-radius:10px;object-fit:cover}
.detail-info{flex:1}
.old{color:gray;text-decoration:line-through;margin-left:8px}
.discount{color:green;font-weight:bold;margin:10px 0}

.btn{
width:100%;padding:12px;margin-top:10px;
border:none;border-radius:8px;font-size:15px;cursor:pointer
}
.buy{background:#28a745;color:white}
.cart{background:#ff9900;color:white}

/* POPUP */
.popup{
position:fixed;inset:0;background:white;display:none;
z-index:9999;flex-direction:column;
}
.popup-header{
display:flex;justify-content:space-between;
padding:15px;background:#131921;color:white;
}
.popup-content{padding:10px;overflow:auto}

.item{
display:flex;justify-content:space-between;
padding:10px;background:#f2f2f2;margin-bottom:10px;border-radius:10px;
}
.qty button{padding:5px 10px;margin:0 5px}
.total{padding:10px;font-weight:bold}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">Krishnalatha Deals</div>
<div class="top-icons">
<span onclick="openPopup('cart')">🛒 <span id="cartCount">0</span></span>
<span onclick="openPopup('wishlist')">❤️ <span id="wishCount">0</span></span>
</div>
</div>

<div class="search-box">
<input id="search" placeholder="Search products...">
</div>

<div class="scroll-wrapper">
<div class="scroll-track">
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New</div>
<div class="scroll-item">🏆 Top</div>
<div class="scroll-item">📦 Free</div>
</div>
</div>

<div class="container" id="grid"></div>

<!-- DETAIL -->
<div class="detail" id="detailBox">
<div class="detail-header">
<div>Product</div>
<button class="close" onclick="closeDetail()">×</button>
</div>
<div class="detail-body" id="detailBody"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-header">
<div id="popupTitle">Cart</div>
<button onclick="closePopup()">Close</button>
</div>
<div class="popup-content" id="popupContent"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg"}
];

let cart=[];
let wish=[];

/* RENDER */
function render(list=products){
let g=document.getElementById("grid");
g.innerHTML="";
list.forEach(p=>{
g.innerHTML+=`
<div class="card" onclick="openDetail('${p.name}')">
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
}

/* SEARCH FIX */
document.getElementById("search").addEventListener("input",e=>{
let v=e.target.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(v)));
});

/* DETAIL */
function openDetail(name){
let p=products.find(x=>x.name===name);
let discount=Math.round(((p.old-p.price)/p.old)*100);

document.getElementById("detailBody").innerHTML=`
<img src="${p.img}">
<div class="detail-info">
<h2>${p.name}</h2>
<div>₹${p.price} <span class="old">₹${p.old}</span></div>
<div class="discount">${discount}% OFF</div>

<button class="btn buy" onclick="buyNow('${p.name}')">Buy Now</button>
<button class="btn cart" onclick="addCart('${p.name}')">Add to Cart</button>
</div>
`;

document.getElementById("detailBox").style.display="flex";
document.getElementById("search").value="";
render(products);
}

function closeDetail(){
document.getElementById("detailBox").style.display="none";
}

/* CART */
function addCart(name){
let p=products.find(x=>x.name===name);
let item=cart.find(x=>x.name===name);

if(item) item.qty++;
else cart.push({...p,qty:1});

updateCounts();
}

/* BUY */
function buyNow(name){
alert("Buying "+name);
}

/* POPUP */
function openPopup(type){
let box=document.getElementById("popup");
let content=document.getElementById("popupContent");
box.style.display="flex";

if(type==="cart"){
let total=0;

content.innerHTML=cart.map(p=>{
total+=p.price*p.qty;
return `
<div class="item">
<div>
<b>${p.name}</b><br>₹${p.price}
</div>

<div class="qty">
<button onclick="changeQty('${p.name}',-1)">-</button>
${p.qty}
<button onclick="changeQty('${p.name}',1)">+</button>
</div>
</div>`;
}).join("");

content.innerHTML+=`<div class="total">Total: ₹${total}</div>`;
}
}

/* QTY */
function changeQty(name,val){
let item=cart.find(x=>x.name===name);
if(!item) return;

item.qty+=val;
if(item.qty<=0) cart=cart.filter(x=>x.name!==name);

updateCounts();
openPopup("cart");
}

/* CLOSE */
function closePopup(){
document.getElementById("popup").style.display="none";
}

/* COUNT */
function updateCounts(){
document.getElementById("cartCount").innerText=cart.length;
document.getElementById("wishCount").innerText=wish.length;
}

render();
updateCounts();

</script>

</body>
</html>
