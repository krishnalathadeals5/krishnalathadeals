<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* SOCIAL BAR */
.social-bar{
display:flex;
justify-content:space-around;
background:#111;
color:white;
padding:8px;
font-size:18px;
}

.social-bar span{
cursor:pointer;
}

/* TOP */
.topbar{
background:#131921;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

.logo{
color:#ff9900;
font-weight:bold;
}

.top-icons{
display:flex;
gap:15px;
}

/* SEARCH */
.search-box{
padding:10px;
background:#131921;
}

.search-box input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
outline:none;
}

/* AUTO SCROLL */
.slider{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
background:white;
scroll-behavior:smooth;
}

.slider div{
min-width:140px;
background:#fff;
padding:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
white-space:nowrap;
}

.slider:hover{
animation-play-state:paused;
}

/* CATEGORIES */
.categories{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
background:#1f2a38;
}

.categories div{
color:white;
background:#2f3e50;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

/* PRODUCT GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:10px;
text-align:center;
}

.price{
color:green;
font-weight:bold;
}

.button{
display:block;
padding:8px;
background:#ff9900;
color:white;
text-decoration:none;
border-radius:6px;
margin-top:6px;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:5px;
cursor:pointer;
}

/* POPUP */
.popup{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:white;
display:none;
flex-direction:column;
z-index:9999;
overflow:auto;
}

.popup-header{
display:flex;
justify-content:space-between;
padding:15px;
background:#131921;
color:white;
}

.popup-content{
padding:10px;
}

.popup-item{
display:flex;
gap:10px;
margin-bottom:10px;
background:#f2f2f2;
padding:10px;
border-radius:10px;
}

.popup-item img{
width:70px;
height:70px;
object-fit:cover;
}

/* CART BUTTON */
.cart-remove{
background:red;
color:white;
border:none;
padding:5px;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- SOCIAL -->
<div class="social-bar">
<span>📘</span>
<span>📸</span>
<span>🟢</span>
<span>✈️</span>
</div>

<!-- TOP -->
<div class="topbar">
<div class="logo">Krishnalatha Deals</div>
<div class="top-icons">
<span onclick="openPopup('wishlist')">❤️ <span id="wishCount">0</span></span>
<span onclick="openPopup('cart')">🛒 <span id="cartCount">0</span></span>
</div>
</div>

<!-- SEARCH -->
<div class="search-box">
<input id="search" placeholder="Search products...">
</div>

<!-- TRENDING SCROLL -->
<div class="slider" id="slider">
<div>🔥 Hot Deals</div>
<div>⚡ Fast Delivery</div>
<div>💰 Best Price</div>
<div>🆕 New Launch</div>
<div>🏆 Top Rated</div>
</div>

<!-- CATEGORIES -->
<div class="categories">
<div onclick="filter('All')">All</div>
<div onclick="filter('Kitchen')">Kitchen</div>
<div onclick="filter('Fashion')">Fashion</div>
<div onclick="filter('Electronics')">Electronics</div>
<div onclick="filter('Home')">Home</div>
</div>

<!-- PRODUCTS -->
<div class="container" id="grid"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-header">
<div id="popupTitle">List</div>
<button onclick="closePopup()">Back</button>
</div>
<div class="popup-content" id="popupContent"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,img:"images/storage.jpg",cat:"Kitchen"},
{name:"Towel Set",price:299,img:"images/towel.jpg",cat:"Home"},
{name:"Shoes",price:1499,img:"images/shoes.jpg",cat:"Fashion"},
{name:"Watch",price:1999,img:"images/watch.jpg",cat:"Electronics"},
{name:"Bag",price:899,img:"images/bag.jpg",cat:"Fashion"},
{name:"Diya",price:199,img:"images/diya.jpg",cat:"Home"},
{name:"Laptop",price:45999,img:"images/laptop.jpg",cat:"Electronics"},
{name:"Mobile",price:14999,img:"images/mobile.jpg",cat:"Electronics"},
{name:"Plant",price:299,img:"images/plant.jpg",cat:"Home"},
{name:"Headphones",price:1299,img:"images/headphones.jpg",cat:"Electronics"}
];

let wish=[];
let cart=[];

function render(data){
let g=document.getElementById("grid");
g.innerHTML="";

data.forEach((p,i)=>{
g.innerHTML+=`
<div class="card">
<div class="heart" onclick="toggleWish(${i})">❤</div>
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<a class="button" href="#">Buy Now</a>
<button onclick="addCart(${i})">Add Cart</button>
</div>
</div>`;
});
}

function filter(cat){
if(cat==="All") render(products);
else render(products.filter(p=>p.cat===cat));
}

function toggleWish(i){
let p=products[i];
let index=wish.findIndex(x=>x.name===p.name);
if(index>-1){
wish.splice(index,1);
}else{
wish.push(p);
}
document.getElementById("wishCount").innerText=wish.length;
}

function addCart(i){
let p=products[i];
if(!cart.includes(p)) cart.push(p);
document.getElementById("cartCount").innerText=cart.length;
}

function openPopup(type){
let box=document.getElementById("popup");
let content=document.getElementById("popupContent");
let title=document.getElementById("popupTitle");

box.style.display="flex";

if(type==="wishlist"){
title.innerText="Wishlist";
content.innerHTML=wish.map(p=>`
<div class="popup-item">
<img src="${p.img}">
<div>
<b>${p.name}</b><br>
₹${p.price}
</div>
</div>
`).join("");
}

if(type==="cart"){
title.innerText="Cart";
content.innerHTML=cart.map((p,i)=>`
<div class="popup-item">
<img src="${p.img}">
<div>
<b>${p.name}</b><br>
₹${p.price}<br>
<button class="cart-remove" onclick="removeCart(${i})">Remove</button>
</div>
</div>
`).join("");
}
}

function removeCart(i){
cart.splice(i,1);
document.getElementById("cartCount").innerText=cart.length;
openPopup('cart');
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function search(){
let val=document.getElementById("search").value.toLowerCase();
let filtered=products.filter(p=>p.name.toLowerCase().includes(val));
render(filtered);
}

document.getElementById("search").addEventListener("input",search);

render(products);

</script>

</body>
</html>
