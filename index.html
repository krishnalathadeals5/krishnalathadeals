<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:#f5f6fa;}

/* HEADER */
.header{
background:#0a3d2c;
color:#fff;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 20px;
}

.logo{color:#ffd700;font-weight:bold;}

.search input{
padding:10px;
width:300px;
border-radius:8px;
border:none;
}

/* HERO SLIDER */
.hero{
margin:15px;
overflow:hidden;
border-radius:12px;
position:relative;
}

.slides{
display:flex;
width:300%;
animation:slide 12s infinite;
}

.slide{
min-width:100%;
padding:40px;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
}

.slide1{background:linear-gradient(90deg,#063,#0a3d2c);}
.slide2{background:linear-gradient(90deg,#1a237e,#3949ab);}
.slide3{background:linear-gradient(90deg,#880e4f,#c2185b);}

.slide img{width:220px;}

@keyframes slide{
0%{transform:translateX(0);}
33%{transform:translateX(0);}
36%{transform:translateX(-100%);}
66%{transform:translateX(-100%);}
69%{transform:translateX(-200%);}
100%{transform:translateX(-200%);}
}

/* PLATFORM CARDS */
.platforms{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:15px;
}

.card{
background:#fff;
padding:15px;
border-radius:10px;
text-align:center;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.card img{height:40px;}

.card button{
margin-top:10px;
padding:6px 10px;
border:none;
border-radius:5px;
color:#fff;
cursor:pointer;
}

.amazon{background:#ff9900;}
.flipkart{background:#2874f0;}
.myntra{background:#ff3f6c;}
.meesho{background:#ff2e63;}
.ajio{background:#111;}
.reliance{background:#e60023;}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.product{
background:#fff;
padding:10px;
border-radius:10px;
transition:0.3s;
}

.product:hover{
transform:scale(1.03);
box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

.product img{
width:100%;
height:150px;
object-fit:contain;
}

.price{font-weight:bold;}
.old{text-decoration:line-through;color:gray;font-size:12px;}
.discount{color:red;font-size:12px;}

/* LOADER */
.loader{
text-align:center;
padding:20px;
font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){
.search input{width:100%;}
.slide{flex-direction:column;text-align:center;}
.slide img{width:150px;margin-top:10px;}
}
</style>
</head>

<body>

<div class="header">
<div class="logo">Krishnalatha Deals</div>
<div class="search"><input placeholder="Search..."></div>
</div>

<!-- HERO -->
<div class="hero">
<div class="slides">

<div class="slide slide1">
<div>
<h1>BEST DEALS</h1>
<p>Amazon, Flipkart, Myntra</p>
<button>Shop Now</button>
</div>
<img src="https://cdn-icons-png.flaticon.com/512/1041/1041880.png">
</div>

<div class="slide slide2">
<div>
<h1>BIG SALE</h1>
<p>Up to 70% OFF</p>
<button>Explore</button>
</div>
<img src="https://cdn-icons-png.flaticon.com/512/891/891419.png">
</div>

<div class="slide slide3">
<div>
<h1>TOP BRANDS</h1>
<p>Best Prices Guaranteed</p>
<button>Shop Now</button>
</div>
<img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
</div>

</div>
</div>

<!-- PLATFORMS -->
<div class="platforms">
<div class="card"><img src="https://logo.clearbit.com/amazon.com"><button class="amazon">Amazon</button></div>
<div class="card"><img src="https://logo.clearbit.com/flipkart.com"><button class="flipkart">Flipkart</button></div>
<div class="card"><img src="https://logo.clearbit.com/myntra.com"><button class="myntra">Myntra</button></div>
<div class="card"><img src="https://logo.clearbit.com/meesho.com"><button class="meesho">Meesho</button></div>
<div class="card"><img src="https://logo.clearbit.com/ajio.com"><button class="ajio">Ajio</button></div>
<div class="card"><img src="https://logo.clearbit.com/reliancedigital.in"><button class="reliance">Reliance</button></div>
</div>

<!-- PRODUCTS -->
<h2 style="padding-left:15px;">🔥 Live Deals</h2>
<div class="loader" id="loader">Loading deals...</div>
<div class="products" id="products"></div>

<script>

/* REAL API FETCH */
const container = document.getElementById("products");
const loader = document.getElementById("loader");

fetch("https://fakestoreapi.com/products")
.then(res => res.json())
.then(data => {
loader.style.display = "none";

data.slice(0,8).forEach(item => {
const div = document.createElement("div");
div.className = "product";

div.innerHTML = `
<img src="${item.image}">
<p>${item.title.substring(0,40)}...</p>
<p class="price">₹${Math.floor(item.price*80)} 
<span class="old">₹${Math.floor(item.price*120)}</span></p>
<p class="discount">${Math.floor(Math.random()*60)}% OFF</p>
`;

container.appendChild(div);
});
})
.catch(() => {
loader.innerText = "Failed to load products";
});

</script>

</body>
</html>
