<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.topbar{
background:#131921;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:20px;
font-weight:800;
color:#ffb84d;
}

.top-icons span{
margin-left:10px;
cursor:pointer;
font-weight:bold;
}

/* SEARCH */
.search-box{
padding:10px;
background:#131921;
}
.search-box input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
outline:none;
}

/* SCROLL (RESTORED) */
.scroll-wrapper{
overflow:hidden;
background:white;
padding:10px 0;
}

.scroll-track{
display:flex;
gap:20px;
width:max-content;
animation:scroll 18s linear infinite;
}

.scroll-wrapper:hover .scroll-track{
animation-play-state:paused;
}

.scroll-item{
min-width:140px;
background:#f4f4f4;
padding:8px;
border-radius:20px;
text-align:center;
font-weight:bold;
font-size:13px;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:10px;
text-align:center;
}

.price{
color:green;
font-weight:bold;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
cursor:pointer;
}
.heart.active{background:red;color:white;}

/* BADGE */
.discount{
position:absolute;
top:8px;
left:8px;
background:red;
color:white;
padding:5px;
font-size:12px;
border-radius:20px;
}

/* DETAIL */
.detail{
position:fixed;
inset:0;
background:white;
display:none;
flex-direction:column;
z-index:1000;
}

.detail-header{
background:#131921;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
align-items:center;
}

.close-btn{
background:red;
border:none;
color:white;
font-size:18px;
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
}

.detail-body{
padding:12px;
}

.detail-body img{
width:100%;
border-radius:10px;
}

.btn{
display:block;
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
}

.buy{background:#28a745;color:white;}
.cart{background:#ff9900;color:white;}

</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
<div class="logo">Krishnalatha Deals</div>
<div class="top-icons">
<span>❤️ <span id="wishCount">0</span></span>
<span>🛒 <span id="cartCount">0</span></span>
</div>
</div>

<!-- SEARCH -->
<div class="search-box">
<input id="search" placeholder="Search products...">
</div>

<!-- SCROLL (FIXED) -->
<div class="scroll-wrapper">
<div class="scroll-track">
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast Delivery</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New Arrivals</div>
<div class="scroll-item">🏆 Top Rated</div>
<div class="scroll-item">📦 Free Delivery</div>

<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast Delivery</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New Arrivals</div>
<div class="scroll-item">🏆 Top Rated</div>
<div class="scroll-item">📦 Free Delivery</div>
</div>
</div>

<!-- GRID -->
<div class="container" id="grid"></div>

<!-- DETAIL -->
<div class="detail" id="detail">
<div class="detail-header">
<span>Product Details</span>
<button class="close-btn" onclick="closeDetail()">×</button>
</div>

<div class="detail-body" id="detailBody"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg"}
];

let wish=JSON.parse(localStorage.getItem("wish")||"[]");
let cart=JSON.parse(localStorage.getItem("cart")||"[]");

function save(){
localStorage.setItem("wish",JSON.stringify(wish));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* RENDER */
function render(data=products){
let g=document.getElementById("grid");
g.innerHTML="";

data.forEach(p=>{
let liked = wish.find(x=>x.name===p.name)?"active":"";
let discount=Math.round((p.old-p.price)/p.old*100);

g.innerHTML+=`
<div class="card" onclick="openDetail('${p.name}')">
<div class="discount">${discount}% OFF</div>
<div class="heart ${liked}" onclick="event.stopPropagation();toggleWish('${p.name}')">❤</div>
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
let v=this.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(v)));
});

/* WISH */
function toggleWish(name){
let p=products.find(x=>x.name===name);
let i=wish.findIndex(x=>x.name===name);
if(i>-1) wish.splice(i,1);
else wish.push(p);
save();
update();
render();
}

/* DETAIL */
function openDetail(name){
let p=products.find(x=>x.name===name);

document.getElementById("detailBody").innerHTML=`
<img src="${p.img}">
<h2>${p.name}</h2>
<p><b>₹${p.price}</b> <del>${p.old}</del></p>

<button class="btn buy" onclick="buyNow('${p.name}')">Buy Now</button>
<button class="btn cart" onclick="addCart('${p.name}')">Add to Cart</button>
`;

document.getElementById("detail").style.display="flex";
}

function closeDetail(){
document.getElementById("detail").style.display="none";
}

/* CART */
function addCart(name){
let p=products.find(x=>x.name===name);
let item=cart.find(x=>x.name===name);
if(item) item.qty++;
else cart.push({...p,qty:1});

save();
update();
alert("Added to cart");
}

/* BUY */
function buyNow(name){
alert("Buying "+name);
}

/* UPDATE COUNTS */
function update(){
document.getElementById("wishCount").innerText=wish.length;
document.getElementById("cartCount").innerText=cart.reduce((a,b)=>a+b.qty,0);
}

render();
update();

</script>

</body>
</html>
