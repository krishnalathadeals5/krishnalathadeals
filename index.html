<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
background:#131921;
color:white;
padding:14px;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:22px;
font-weight:800;
color:#ffb84d;
}

.top-icons span{
margin-left:12px;
cursor:pointer;
font-weight:bold;
}

/* SEARCH */
.search-box{
padding:10px;
background:#131921;
}
.search-box input{
width:100%;
padding:10px;
border:none;
border-radius:6px;
outline:none;
}

/* SCROLL */
.scroll-wrapper{
overflow:hidden;
background:white;
padding:10px 0;
}
.scroll-track{
display:flex;
gap:15px;
width:max-content;
animation:scroll 20s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}
.scroll-item{
min-width:140px;
background:#eee;
padding:8px;
border-radius:20px;
text-align:center;
font-weight:bold;
font-size:13px;
}

/* GRID (FIXED IMAGE ISSUE) */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
position:relative;
cursor:pointer;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
display:block;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
cursor:pointer;
}
.heart.active{
background:red;
color:white;
}

/* DETAIL */
.detail{
position:fixed;
inset:0;
background:white;
display:none;
z-index:9999;
overflow:auto;
}

.detail-header{
display:flex;
justify-content:space-between;
padding:12px;
background:#131921;
color:white;
}

.close{
background:red;
border:none;
color:white;
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
}

.detail-body{
display:flex;
gap:20px;
padding:15px;
flex-wrap:wrap;
}

.detail-body img{
width:320px;
max-width:100%;
border-radius:10px;
}

.detail-info{
flex:1;
min-width:250px;
}

.old{
text-decoration:line-through;
color:gray;
margin-left:8px;
}

.discount{
color:green;
font-weight:bold;
margin:10px 0;
}

.btn{
display:inline-block;
padding:10px 14px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.buy{background:#28a745;color:white;}
.cart{background:#ff9900;color:white;margin-left:10px;}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:white;
display:none;
z-index:10000;
flex-direction:column;
}

.popup-header{
display:flex;
justify-content:space-between;
padding:15px;
background:#131921;
color:white;
}

.popup-content{
padding:10px;
overflow:auto;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#f2f2f2;
margin-bottom:10px;
border-radius:10px;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">Krishnalatha Deals</div>
<div class="top-icons">
<span onclick="openPopup('wishlist')">❤️ <span id="wishCount">0</span></span>
<span onclick="openPopup('cart')">🛒 <span id="cartCount">0</span></span>
</div>
</div>

<div class="search-box">
<input id="search" placeholder="Search products..." oninput="searchProducts()">
</div>

<!-- SCROLL -->
<div class="scroll-wrapper">
<div class="scroll-track">
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New</div>
<div class="scroll-item">🏆 Top</div>
<div class="scroll-item">📦 Free</div>

<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New</div>
<div class="scroll-item">🏆 Top</div>
<div class="scroll-item">📦 Free</div>
</div>
</div>

<div class="container" id="grid"></div>

<!-- DETAIL -->
<div class="detail" id="detailBox">
<div class="detail-header">
<div>Product</div>
<button class="close" onclick="closeDetail()">×</button>
</div>

<div class="detail-body" id="detailBody"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-header">
<div id="popupTitle">List</div>
<button onclick="closePopup()">Close</button>
</div>
<div class="popup-content" id="popupContent"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg"}
];

let wish = JSON.parse(localStorage.getItem("wish")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("wish",JSON.stringify(wish));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* RESET SEARCH (IMPORTANT FIX) */
function clearSearch(){
document.getElementById("search").value="";
}

/* RENDER */
function render(list=products){
let g=document.getElementById("grid");
g.innerHTML="";

list.forEach(p=>{
let isW = wish.find(x=>x.name===p.name);

g.innerHTML+=`
<div class="card" onclick="openDetail('${p.name}')">

<div class="heart ${isW?'active':''}" onclick="event.stopPropagation(); toggleWish('${p.name}')">❤</div>

<img src="${p.img}">

<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
}

/* SEARCH FIX */
function searchProducts(){
let v=document.getElementById("search").value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(v)));
}

/* DETAIL */
function openDetail(name){

clearSearch(); // 🔥 FIX 1 (remove search text)

let p=products.find(x=>x.name===name);
let d=Math.round(((p.old-p.price)/p.old)*100);

document.getElementById("detailBody").innerHTML=`
<img src="${p.img}">
<div class="detail-info">
<h2>${p.name}</h2>

<div>
₹${p.price} <span class="old">₹${p.old}</span>
</div>

<div class="discount">${d}% OFF</div>

<button class="btn buy">Buy Now</button>
<button class="btn cart">Add to Cart</button>
</div>
`;

document.getElementById("detailBox").style.display="block";
}

/* CLOSE DETAIL */
function closeDetail(){
document.getElementById("detailBox").style.display="none";
}

/* WISHLIST */
function toggleWish(name){
let i=wish.findIndex(x=>x.name===name);
if(i>-1) wish.splice(i,1);
else wish.push({name});

save();
updateCounts();
render();
}

/* COUNTS */
function updateCounts(){
document.getElementById("wishCount").innerText = wish.length;
document.getElementById("cartCount").innerText = cart.length;
}

render();
updateCounts();

</script>

</body>
</html>
