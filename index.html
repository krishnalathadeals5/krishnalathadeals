<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.header{
background:#111;
color:#fff;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

/* HERO BANNER */
.hero{
background:linear-gradient(45deg,#ff9900,#ff5e00);
color:white;
text-align:center;
padding:40px 20px;
}

.hero h1{
margin:0;
font-size:28px;
}

.hero p{
margin-top:8px;
opacity:0.9;
}

/* BRAND ROW */
.brand-row{
display:flex;
gap:10px;
overflow-x:auto;
padding:12px;
background:#fff;
}

.brand{
flex:0 0 auto;
background:#fff;
padding:10px 14px;
border-radius:20px;
display:flex;
align-items:center;
gap:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
font-weight:bold;
font-size:13px;
}

.brand img{
width:22px;
height:22px;
}

/* COLORS */
.amazon{border-left:4px solid #ff9900;}
.flipkart{border-left:4px solid #2874f0;}
.myntra{border-left:4px solid #ff3f6c;}
.meesho{border-left:4px solid #9c27b0;}
.ajio{border-left:4px solid #000;}

/* SEARCH BOX */
.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.search-box button{
margin-top:10px;
width:100%;
padding:12px;
background:#111;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

/* RESULT */
.result{
padding:10px;
}

.card{
background:#fff;
margin:10px 0;
padding:15px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:10px;
}

.box{
background:#f7f7f7;
padding:10px;
border-radius:8px;
text-align:center;
}

.price{
color:green;
font-weight:bold;
margin-top:5px;
}

/* BEST */
.best{
background:#d4f8d4;
border:2px solid #2ecc71;
}

/* SOCIAL */
.social{
position:fixed;
right:10px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.social a{
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
animation:float 2s infinite;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

.social img{width:22px;}

.wa{background:#25D366;}
.tg{background:#0088cc;}
.yt{background:#FF0000;}
.ig{background:#E4405F;}
.fb{background:#1877F2;}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">Krishnalatha Deals</div>

<!-- HERO BANNER -->
<div class="hero">
<h1>Best Deals Online</h1>
<p>Amazon • Flipkart • Myntra • Meesho • Ajio</p>
</div>

<!-- BRAND LOGOS -->
<div class="brand-row">

<div class="brand amazon">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968870.png">
Amazon
</div>

<div class="brand flipkart">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png">
Flipkart
</div>

<div class="brand myntra">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968894.png">
Myntra
</div>

<div class="brand meesho">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png">
Meesho
</div>

<div class="brand ajio">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
Ajio
</div>

</div>

<!-- SEARCH -->
<div class="search-box">
<input id="search" placeholder="Search product (e.g. Samsung S23 FE)">
<button onclick="searchProduct()">Compare Prices</button>
</div>

<!-- RESULT -->
<div id="result" class="result"></div>

<!-- SOCIAL -->
<div class="social">

<a class="wa" href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>
<a class="tg" href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a>
<a class="yt" href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
<a class="ig" href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
<a class="fb" href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>

</div>

<script>

/* AMAZON LINK FIX (OPTIONAL) */
function goAmazon(){
window.location.href="amazon.html";
}

/* DATABASE */
const db = {
"Samsung S23 FE":{
amazon:39999,
flipkart:38999,
myntra:null,
meesho:37999,
ajio:null
},
"Mens Jacket":{
amazon:4479,
flipkart:4399,
myntra:4599,
meesho:4200,
ajio:4700
},
"Shoes":{
amazon:1999,
flipkart:1899,
myntra:2099,
meesho:1750,
ajio:2100
}
};

/* SEARCH */
function searchProduct(){

let name = document.getElementById("search").value.trim();
let data = db[name];

let box = document.getElementById("result");

if(!data){
box.innerHTML = "<div class='card'>❌ No product found</div>";
return;
}

let prices = [];

let html = `<div class="card"><h3>${name}</h3><div class="grid">`;

function add(b, price){
if(price){
prices.push({b,price});
html += `
<div class="box">
<b>${b}</b>
<div class="price">₹${price}</div>
</div>`;
}
}

add("Amazon",data.amazon);
add("Flipkart",data.flipkart);
add("Myntra",data.myntra);
add("Meesho",data.meesho);
add("Ajio",data.ajio);

html += "</div>";

if(prices.length){
let best = prices.reduce((a,b)=>a.price<b.price?a:b);
html += `<h3 style="color:green;">🏆 Best Price: ${best.b} ₹${best.price}</h3>`;
}

html += "</div>";

box.innerHTML = html;
}
</script>

</body>
</html>
