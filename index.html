<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

.top{
background:#131921;
color:white;
padding:15px;
font-weight:bold;
}

.container{
padding:15px;
}

img{
width:100%;
border-radius:10px;
}

.price{
font-size:22px;
color:green;
font-weight:bold;
margin-top:10px;
}

.old{
color:gray;
text-decoration:line-through;
margin-left:10px;
}

.discount{
color:red;
font-weight:bold;
margin-top:5px;
}

.btn{
display:block;
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.buy{background:#28a745;color:white;}
.cart{background:#ff9900;color:white;}
.back{background:#333;color:white;}
</style>
</head>

<body>

<div class="top">Product Details</div>

<div class="container" id="box"></div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg"}
];

let name = localStorage.getItem("selectedProduct");
let p = products.find(x=>x.name===name);

let discount = Math.round(((p.old-p.price)/p.old)*100);

document.getElementById("box").innerHTML=`
<img src="${p.img}">
<h2>${p.name}</h2>

<div class="price">
₹${p.price}
<span class="old">₹${p.old}</span>
</div>

<div class="discount">${discount}% OFF</div>

<button class="btn buy" onclick="alert('Buying ${p.name}')">Buy Now</button>
<button class="btn cart" onclick="alert('Added to cart')">Add to Cart</button>
<button class="btn back" onclick="window.history.back()">Back</button>
`;

</script>

</body>
</html>
