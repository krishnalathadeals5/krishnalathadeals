<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KrishnaLatha Deals</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#2874f0;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
position:sticky;
top:0;
z-index:1000;
}

.top-icons{
position:absolute;
right:20px;
top:15px;
font-size:18px;
}

.top-icons span{
margin-left:15px;
font-weight:bold;
}

.search-box{
width:95%;
max-width:800px;
display:block;
margin:15px auto;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
position:relative;
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

.card img{
width:100%;
height:220px;
object-fit:contain;
background:white;
}

.name{
font-size:15px;
font-weight:bold;
margin-top:8px;
height:45px;
overflow:hidden;
}

.price{
color:green;
font-size:18px;
font-weight:bold;
margin-top:5px;
}

.old{
color:gray;
text-decoration:line-through;
font-size:13px;
margin-left:8px;
}

.btn{
width:100%;
padding:10px;
border:none;
border-radius:6px;
margin-top:8px;
cursor:pointer;
font-weight:bold;
}

.cart-btn{
background:#ffd814;
}

.buy-btn{
background:#ff9900;
color:white;
}

.wishlist{
position:absolute;
top:10px;
right:10px;
font-size:22px;
cursor:pointer;
}

.loading{
text-align:center;
padding:30px;
font-size:20px;
}
</style>
</head>

<body>

<header>
KrishnaLatha Deals

<div class="top-icons">
❤️ <span id="wishCount">0</span>
🛒 <span id="cartCount">0</span>
</div>

</header>

<input
type="text"
id="search"
class="search-box"
placeholder="Search products..."
>

<div id="products" class="products">
<div class="loading">Loading Products...</div>
</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbzYhxE_0NfstLPwOpFB6e5hiRWW4mLW_YTrMaAJO5XGIyMvsGKvf1QPUCyT9QaNOWfoyw/exec";

let allProducts = [];
let cart = [];
let wishlist = [];

async function loadProducts(){

try{

const response = await fetch(API);
const data = await response.json();

allProducts = data;

displayProducts(allProducts);

}
catch(error){

document.getElementById("products").innerHTML =
"<h2>Unable to load products.</h2>";

console.error(error);

}

}

function displayProducts(products){

const container =
document.getElementById("products");

container.innerHTML = "";

products.forEach(product=>{

const card = document.createElement("div");

card.className = "card";

card.innerHTML = `

<div class="wishlist"
onclick="addWishlist(${product.id})">
❤️
</div>

<img src="${product.image}"
alt="${product.name}">

<div class="name">
${product.name}
</div>

<div class="price">
₹${product.price}
<span class="old">
₹${product.oldPrice}
</span>
</div>

<button
class="btn cart-btn"
onclick="addCart(${product.id})">
Add To Cart
</button>

<button
class="btn buy-btn"
onclick="buyNow('${product.affiliateLink}')">
Buy Now
</button>

`;

container.appendChild(card);

});

}

function addCart(id){

cart.push(id);

document.getElementById("cartCount").innerText =
cart.length;

}

function addWishlist(id){

wishlist.push(id);

document.getElementById("wishCount").innerText =
wishlist.length;

}

function buyNow(link){

window.open(link,"_blank");

}

document
.getElementById("search")
.addEventListener("input",function(){

const value =
this.value.toLowerCase();

const filtered =
allProducts.filter(product=>

product.name
.toLowerCase()
.includes(value)

);

displayProducts(filtered);

});

loadProducts();

</script>

</body>
</html>
