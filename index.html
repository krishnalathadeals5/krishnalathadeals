<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krishnalatha Deals | Splash</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800;900&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --green-1:#021f13;
      --green-2:#063822;
      --green-3:#0a5a35;
      --green-4:#0c6a3d;
      --gold-1:#fff4b3;
      --gold-2:#f9df7b;
      --gold-3:#f2c94c;
      --gold-4:#d8a323;
      --gold-5:#a96e00;
      --white-soft:#f9f7f1;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:'Montserrat', Arial, sans-serif;
      background:#031a11;
    }

    body{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,220,100,0.18), transparent 20%),
        radial-gradient(circle at 50% 78%, rgba(255,200,70,0.16), transparent 18%),
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04), transparent 18%),
        radial-gradient(circle at 80% 28%, rgba(255,255,255,0.03), transparent 16%),
        linear-gradient(180deg, #052e1d 0%, #032114 32%, #02160f 100%);
    }

    /* ===== full luxury texture ===== */
    body::before{
      content:"";
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at center, rgba(255,215,80,0.10) 0, rgba(255,215,80,0.03) 28%, transparent 50%),
        repeating-radial-gradient(circle at center, rgba(255,220,120,0.045) 0 1px, transparent 1px 12px);
      mix-blend-mode:screen;
      pointer-events:none;
      opacity:0.7;
    }

    .splash-shell{
      position:relative;
      width:min(92vw, 820px);
      height:min(95vh, 1500px);
      border-radius:42px;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:28px;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,215,90,0.13), transparent 28%),
        radial-gradient(circle at 50% 82%, rgba(255,215,90,0.14), transparent 20%),
        linear-gradient(180deg, rgba(7,62,37,0.98), rgba(2,24,14,0.98));
      box-shadow:
        inset 0 0 0 2px rgba(255,223,132,0.85),
        inset 0 0 0 5px rgba(255,223,132,0.18),
        0 20px 80px rgba(0,0,0,0.55);
    }

    /* outer thin gold border */
    .splash-shell::before{
      content:"";
      position:absolute;
      inset:14px;
      border-radius:34px;
      border:2px solid rgba(249,223,123,0.95);
      box-shadow:
        0 0 0 1px rgba(255,247,205,0.25) inset,
        0 0 30px rgba(249,223,123,0.08);
      pointer-events:none;
    }

    /* background sparkles */
    .sparkles{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }

    .spark{
      position:absolute;
      width:4px;
      height:4px;
      border-radius:50%;
      background:#ffd95c;
      box-shadow:0 0 10px #ffd95c, 0 0 22px #ffd95c;
      animation: twinkle 2.8s infinite ease-in-out;
      opacity:0.85;
    }

    .spark.big{
      width:6px;
      height:6px;
      box-shadow:0 0 12px #ffd95c, 0 0 30px #ffd95c;
    }

    @keyframes twinkle{
      0%,100%{ transform:scale(0.55); opacity:0.25; }
      50%{ transform:scale(1.4); opacity:1; }
    }

    /* main content */
    .splash-card{
      position:relative;
      z-index:3;
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      text-align:center;
      padding:72px 28px 48px;
    }

    /* top burst behind logo */
    .top-burst{
      position:absolute;
      top:70px;
      left:50%;
      transform:translateX(-50%);
      width:620px;
      height:620px;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,220,120,0.28) 0%, rgba(255,220,120,0.08) 32%, transparent 62%);
      filter:blur(2px);
      z-index:1;
    }

    .top-burst::before{
      content:"";
      position:absolute;
      inset:-60px;
      background:
        repeating-conic-gradient(
          from 0deg,
          rgba(255,211,82,0.18) 0deg 1deg,
          transparent 1deg 9deg
        );
      border-radius:50%;
      mask: radial-gradient(circle, transparent 0 28%, #000 28% 100%);
      -webkit-mask: radial-gradient(circle, transparent 0 28%, #000 28% 100%);
      animation: rotateSlow 26s linear infinite;
      opacity:0.8;
    }

    @keyframes rotateSlow{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }

    /* ===== LOGO ===== */
    .logo-wrap{
      position:relative;
      z-index:4;
      margin-top:10px;
      margin-bottom:26px;
      width:320px;
      height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
      animation: floatLogo 4s ease-in-out infinite;
    }

    @keyframes floatLogo{
      0%,100%{ transform:translateY(0px); }
      50%{ transform:translateY(-6px); }
    }

    .crown{
      position:absolute;
      top:-8px;
      left:50%;
      transform:translateX(-50%);
      width:160px;
      height:88px;
      z-index:6;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35));
    }

    .crown svg{
      width:100%;
      height:100%;
      display:block;
    }

    .logo-ornament{
      position:absolute;
      inset:22px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:3;
    }

    .logo-ornament::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      border:6px solid rgba(247,215,110,0.95);
      box-shadow:
        0 0 0 3px rgba(91,48,0,0.25) inset,
        0 0 0 10px rgba(247,215,110,0.14),
        0 12px 34px rgba(0,0,0,0.35);
      background:
        radial-gradient(circle at 50% 35%, rgba(255,233,156,0.25), transparent 50%);
    }

    .logo-ornament::after{
      content:"";
      position:absolute;
      inset:-18px;
      border-radius:50%;
      border:4px solid rgba(247,215,110,0.9);
      opacity:0.95;
      box-shadow:0 0 20px rgba(247,215,110,0.25);
    }

    /* decorative leaves */
    .leaf-ring{
      position:absolute;
      inset:0;
      border-radius:50%;
      z-index:2;
      pointer-events:none;
    }

    .leaf-ring span{
      position:absolute;
      width:54px;
      height:18px;
      border:3px solid rgba(247,215,110,0.95);
      border-left:none;
      border-radius:0 40px 40px 0;
      transform-origin:left center;
      box-shadow:0 0 8px rgba(247,215,110,0.18);
    }

    .leaf-ring .l1{ top:80px; left:18px; transform:rotate(-32deg); }
    .leaf-ring .l2{ top:118px; left:2px; transform:rotate(-10deg); }
    .leaf-ring .l3{ top:160px; left:-2px; transform:rotate(12deg); }
    .leaf-ring .l4{ top:202px; left:8px; transform:rotate(34deg); }
    .leaf-ring .l5{ top:236px; left:28px; transform:rotate(54deg); }

    .leaf-ring .r1{ top:80px; right:18px; transform:scaleX(-1) rotate(-32deg); }
    .leaf-ring .r2{ top:118px; right:2px; transform:scaleX(-1) rotate(-10deg); }
    .leaf-ring .r3{ top:160px; right:-2px; transform:scaleX(-1) rotate(12deg); }
    .leaf-ring .r4{ top:202px; right:8px; transform:scaleX(-1) rotate(34deg); }
    .leaf-ring .r5{ top:236px; right:28px; transform:scaleX(-1) rotate(54deg); }

    .logo-center{
      position:relative;
      width:220px;
      height:220px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:5;
      background:
        radial-gradient(circle at 35% 25%, rgba(255,255,255,0.10), transparent 20%),
        radial-gradient(circle at 50% 35%, #0a5934 0%, #063721 48%, #021b10 100%);
      box-shadow:
        inset 0 0 0 2px rgba(255,231,154,0.85),
        inset 0 0 30px rgba(0,0,0,0.45),
        0 0 26px rgba(255,220,120,0.18);
    }

    .kd{
      font-family:'Cinzel', serif;
      font-size:104px;
      font-weight:900;
      line-height:1;
      letter-spacing:-3px;
      background:linear-gradient(180deg, #fff6bf 0%, #f9df7b 24%, #e7b838 55%, #a96e00 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:
        0 2px 0 rgba(255,255,255,0.22),
        0 4px 10px rgba(0,0,0,0.35);
      filter:drop-shadow(0 2px 3px rgba(0,0,0,0.4));
    }

    /* ===== title ===== */
    .brand-title{
      position:relative;
      z-index:4;
      margin-top:12px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      animation: fadeUp 1s ease both;
    }

    .brand-line{
      font-family:'Cinzel', serif;
      font-weight:900;
      letter-spacing:3px;
      line-height:0.95;
      text-transform:uppercase;
      background:linear-gradient(180deg, #fff7c8 0%, #fbe487 22%, #efc44b 55%, #b97a06 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:
        0 2px 0 rgba(255,255,255,0.15),
        0 4px 10px rgba(0,0,0,0.35);
      filter:drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    .brand-line.top{
      font-size:84px;
    }

    .brand-line.bottom{
      font-size:76px;
    }

    /* ornamental divider */
    .ornament-row{
      position:relative;
      z-index:4;
      margin:22px 0 18px;
      width:100%;
      max-width:620px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
    }

    .ornament-line{
      flex:1;
      height:2px;
      background:linear-gradient(90deg, transparent, rgba(248,217,112,0.95), transparent);
      position:relative;
    }

    .ornament-center{
      font-size:28px;
      color:#f3cc56;
      text-shadow:0 0 10px rgba(243,204,86,0.35);
    }

    /* icons row */
    .icon-row{
      position:relative;
      z-index:4;
      display:flex;
      justify-content:center;
      gap:28px;
      margin:10px 0 26px;
      flex-wrap:wrap;
    }

    .icon-box{
      width:74px;
      height:74px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        linear-gradient(180deg, rgba(255,243,186,0.18), rgba(255,214,96,0.06)),
        rgba(255,255,255,0.02);
      border:1px solid rgba(248,217,112,0.18);
      box-shadow:
        inset 0 0 18px rgba(255,215,100,0.06),
        0 8px 20px rgba(0,0,0,0.16);
      font-size:40px;
      color:#f2c94c;
      text-shadow:0 0 12px rgba(242,201,76,0.35);
      animation: iconFloat 4s ease-in-out infinite;
    }

    .icon-box:nth-child(2){ animation-delay:0.4s; }
    .icon-box:nth-child(3){ animation-delay:0.8s; }
    .icon-box:nth-child(4){ animation-delay:1.2s; }

    @keyframes iconFloat{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-5px); }
    }

    /* slogan area */
    .mid-divider{
      position:relative;
      z-index:4;
      width:100%;
      max-width:520px;
      height:26px;
      margin-bottom:18px;
    }

    .mid-divider::before{
      content:"";
      position:absolute;
      top:50%;
      left:0;
      right:0;
      height:2px;
      transform:translateY(-50%);
      background:linear-gradient(90deg, transparent, rgba(249,223,123,0.9), transparent);
    }

    .mid-divider::after{
      content:"✦";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      color:#f2c94c;
      font-size:20px;
      text-shadow:0 0 12px rgba(242,201,76,0.4);
      background:rgba(3,34,20,0.9);
      padding:0 12px;
    }

    .tagline{
      position:relative;
      z-index:4;
      font-family:'Cinzel', serif;
      font-size:34px;
      font-weight:700;
      letter-spacing:1px;
      margin-bottom:14px;
      background:linear-gradient(180deg, #fff4b3 0%, #f2c94c 62%, #c98d0f 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 3px 10px rgba(0,0,0,0.35);
    }

    .subline{
      position:relative;
      z-index:4;
      font-size:24px;
      letter-spacing:3px;
      color:#f5f5f5;
      text-transform:uppercase;
      margin-bottom:34px;
      text-shadow:0 2px 8px rgba(0,0,0,0.35);
    }

    /* bottom gold arc */
    .gold-arc{
      position:relative;
      z-index:2;
      width:130%;
      height:240px;
      margin-top:10px;
      margin-bottom:18px;
      overflow:hidden;
    }

    .gold-arc::before,
    .gold-arc::after{
      content:"";
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:1200px;
      height:1200px;
      border-radius:50%;
      border:14px solid rgba(241,191,43,0.95);
      bottom:-1035px;
      box-shadow:
        0 0 26px rgba(255,214,102,0.3),
        inset 0 0 30px rgba(255,245,180,0.15);
    }

    .gold-arc::after{
      width:1400px;
      height:1400px;
      bottom:-1212px;
      border-width:4px;
      opacity:0.7;
    }

    .arc-glow{
      position:absolute;
      left:50%;
      bottom:20px;
      transform:translateX(-50%);
      width:380px;
      height:70px;
      background:radial-gradient(circle, rgba(255,216,92,0.95) 0%, rgba(255,216,92,0.18) 45%, transparent 72%);
      filter:blur(4px);
      z-index:3;
    }

    /* loading area */
    .loading-wrap{
      position:relative;
      z-index:4;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:24px;
      margin-top:-10px;
    }

    .loader{
      width:96px;
      height:96px;
      border-radius:50%;
      position:relative;
      animation: spin 1.9s linear infinite;
      background:
        conic-gradient(
          from 0deg,
          rgba(255,230,140,1) 0deg 28deg,
          rgba(212,160,35,0.15) 28deg 42deg,
          rgba(255,230,140,1) 42deg 70deg,
          rgba(212,160,35,0.15) 70deg 84deg,
          rgba(255,230,140,1) 84deg 112deg,
          rgba(212,160,35,0.15) 112deg 126deg,
          rgba(255,230,140,1) 126deg 154deg,
          rgba(212,160,35,0.15) 154deg 168deg,
          rgba(255,230,140,1) 168deg 196deg,
          rgba(212,160,35,0.15) 196deg 210deg,
          rgba(255,230,140,1) 210deg 238deg,
          rgba(212,160,35,0.15) 238deg 252deg,
          rgba(255,230,140,1) 252deg 280deg,
          rgba(212,160,35,0.15) 280deg 294deg,
          rgba(255,230,140,1) 294deg 322deg,
          rgba(212,160,35,0.15) 322deg 336deg,
          rgba(255,230,140,1) 336deg 360deg
        );
      box-shadow:0 0 28px rgba(255,213,92,0.18);
    }

    .loader::before{
      content:"";
      position:absolute;
      inset:14px;
      border-radius:50%;
      background:linear-gradient(180deg, #073c24, #042616);
      box-shadow:inset 0 0 20px rgba(0,0,0,0.35);
    }

    @keyframes spin{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }

    .loading-text{
      font-size:28px;
      letter-spacing:4px;
      color:#f3f4f6;
      text-transform:uppercase;
      text-shadow:0 2px 8px rgba(0,0,0,0.35);
      animation:pulseText 1.8s ease-in-out infinite;
    }

    @keyframes pulseText{
      0%,100%{ opacity:0.75; }
      50%{ opacity:1; }
    }

    .loading-dots{
      display:flex;
      gap:14px;
      align-items:center;
      justify-content:center;
    }

    .loading-dots span{
      width:12px;
      height:12px;
      border-radius:50%;
      background:linear-gradient(180deg, #fff3b0, #e0aa1f);
      box-shadow:0 0 12px rgba(255,220,110,0.35);
      animation:dotBounce 1.4s infinite ease-in-out;
    }

    .loading-dots span:nth-child(2){ animation-delay:0.18s; }
    .loading-dots span:nth-child(3){
      width:20px;
      height:20px;
      animation-delay:0.36s;
    }
    .loading-dots span:nth-child(4){ animation-delay:0.54s; }
    .loading-dots span:nth-child(5){ animation-delay:0.72s; }

    @keyframes dotBounce{
      0%,100%{ transform:translateY(0) scale(0.85); opacity:0.7; }
      50%{ transform:translateY(-8px) scale(1.1); opacity:1; }
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* responsive */
    @media (max-width: 900px){
      .splash-shell{
        width:96vw;
        height:96vh;
        border-radius:28px;
        padding:18px;
      }

      .splash-card{
        padding:54px 18px 34px;
      }

      .logo-wrap{
        width:250px;
        height:250px;
        margin-bottom:18px;
      }

      .logo-center{
        width:176px;
        height:176px;
      }

      .kd{
        font-size:78px;
      }

      .brand-line.top{
        font-size:56px;
      }

      .brand-line.bottom{
        font-size:50px;
      }

      .tagline{
        font-size:24px;
      }

      .subline{
        font-size:16px;
        letter-spacing:2px;
      }

      .loading-text{
        font-size:20px;
      }

      .icon-box{
        width:60px;
        height:60px;
        font-size:30px;
      }

      .gold-arc{
        height:180px;
      }
    }

    @media (max-width: 560px){
      .splash-card{
        padding:38px 12px 24px;
      }

      .top-burst{
        width:360px;
        height:360px;
        top:60px;
      }

      .logo-wrap{
        width:190px;
        height:190px;
      }

      .logo-center{
        width:132px;
        height:132px;
      }

      .logo-ornament::before{
        border-width:4px;
      }

      .logo-ornament::after{
        inset:-12px;
        border-width:3px;
      }

      .kd{
        font-size:56px;
        letter-spacing:-2px;
      }

      .crown{
        width:110px;
        height:60px;
        top:-2px;
      }

      .leaf-ring span{
        display:none;
      }

      .brand-line.top{
        font-size:34px;
        letter-spacing:2px;
      }

      .brand-line.bottom{
        font-size:32px;
        letter-spacing:2px;
      }

      .ornament-row{
        margin:16px 0 12px;
        gap:10px;
      }

      .ornament-center{
        font-size:20px;
      }

      .icon-row{
        gap:14px;
        margin:6px 0 18px;
      }

      .icon-box{
        width:48px;
        height:48px;
        border-radius:14px;
        font-size:24px;
      }

      .tagline{
        font-size:18px;
        margin-bottom:10px;
      }

      .subline{
        font-size:11px;
        letter-spacing:1.6px;
        margin-bottom:20px;
      }

      .gold-arc{
        height:120px;
        margin-bottom:8px;
      }

      .loader{
        width:72px;
        height:72px;
      }

      .loading-text{
        font-size:15px;
        letter-spacing:2px;
      }

      .loading-dots{
        gap:10px;
      }

      .loading-dots span{
        width:9px;
        height:9px;
      }

      .loading-dots span:nth-child(3){
        width:15px;
        height:15px;
      }
    }
  </style>
</head>
<body>

  <div class="splash-shell">
    <!-- sparkles -->
    <div class="sparkles">
      <span class="spark big" style="top:6%; left:18%; animation-delay:.2s;"></span>
      <span class="spark" style="top:8%; left:35%; animation-delay:1.1s;"></span>
      <span class="spark big" style="top:10%; left:64%; animation-delay:.8s;"></span>
      <span class="spark" style="top:14%; left:78%; animation-delay:1.7s;"></span>
      <span class="spark big" style="top:18%; left:12%; animation-delay:.4s;"></span>
      <span class="spark" style="top:20%; left:28%; animation-delay:1.9s;"></span>
      <span class="spark big" style="top:22%; left:84%; animation-delay:.6s;"></span>
      <span class="spark" style="top:28%; left:72%; animation-delay:2.1s;"></span>
      <span class="spark big" style="top:34%; left:16%; animation-delay:1.2s;"></span>
      <span class="spark" style="top:38%; left:86%; animation-delay:.5s;"></span>
      <span class="spark" style="top:54%; left:20%; animation-delay:1.4s;"></span>
