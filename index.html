<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f6fa;
}

/* TOP */
.topbar{
    background:#131921;
    color:white;
    display:flex;
    justify-content:space-between;
    padding:12px 15px;
    align-items:center;
}

.logo{
    color:#ff9900;
    font-weight:bold;
}

/* SEARCH */
.search-box{
    padding:10px;
    background:#131921;
}

.search-box input{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:none;
}

/* CATEGORY */
.categories{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    background:#1f2a38;
}

.categories div{
    color:white;
    background:#2f3e50;
    padding:6px 12px;
    border-radius:20px;
    white-space:nowrap;
    cursor:pointer;
}

/* AMAZON STYLE SLIDER FIXED */
.slider{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    background:white;
    scroll-snap-type:x mandatory;
}

.slider::-webkit-scrollbar{
    display:none;
}

.slider .mini{
    min-width:140px;
    background:#fff;
    border-radius:10px;
    padding:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-align:center;
    scroll-snap-align:start;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
    padding:12px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-content{
    padding:10px;
    text-align:center;
}

.price{
    color:green;
    font-weight:bold;
}

/* BUTTON */
.button{
    display:block;
    padding:8px;
    background:#ff9900;
    color:white;
    text-decoration:none;
    border-radius:6px;
    margin-top:6px;
}

/* WISHLIST HEART */
.heart{
    position:absolute;
    top:8px;
    right:8px;
    font-size:18px;
    cursor:pointer;
    background:white;
    border-radius:50%;
    padding:3px 6px;
}

/* COMPARE BAR */
.compare-bar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#111;
    color:white;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.compare-btn{
    background:#ff9900;
    padding:6px 10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">Krishnalatha Deals</div>
    <div>❤️ <span id="wishCount">0</span></div>
</div>

<div class="search-box">
    <input id="search" placeholder="Search products...">
</div>

<!-- AMAZON SLIDER -->
<div class="slider">
    <div class="mini">🔥 Deals</div>
    <div class="mini">⚡ Fast Delivery</div>
    <div class="mini">💰 Best Price</div>
    <div class="mini">🆕 New Launch</div>
    <div class="mini">🏆 Top Rated</div>
    <div class="mini">📦 Free Delivery</div>
</div>

<!-- CATEGORY -->
<div class="categories">
    <div onclick="filter('All')">All</div>
    <div onclick="filter('Kitchen')">Kitchen</div>
    <div onclick="filter('Fashion')">Fashion</div>
    <div onclick="filter('Electronics')">Electronics</div>
    <div onclick="filter('Home')">Home</div>
</div>

<div class="container" id="grid"></div>

<!-- COMPARE BAR -->
<div class="compare-bar">
    <div>Compare: <span id="compareCount">0</span>/2</div>
    <button class="compare-btn" onclick="compare()">Compare</button>
</div>

<script>
const products = [
{name:"Kitchen Box",price:999,img:"images/storage.jpg",cat:"Kitchen"},
{name:"Towel",price:299,img:"images/towel.jpg",cat:"Home"},
{name:"Shoes",price:1499,img:"images/shoes.jpg",cat:"Fashion"},
{name:"Watch",price:1999,img:"images/watch.jpg",cat:"Electronics"},
{name:"Bag",price:899,img:"images/bag.jpg",cat:"Fashion"},
{name:"Diya",price:199,img:"images/diya.jpg",cat:"Home"},
{name:"Laptop",price:45999,img:"images/laptop.jpg",cat:"Electronics"},
{name:"Mobile",price:14999,img:"images/mobile.jpg",cat:"Electronics"},
{name:"Plant",price:299,img:"images/plant.jpg",cat:"Home"},
{name:"Headphones",price:1299,img:"images/headphones.jpg",cat:"Electronics"}
];

let wish = JSON.parse(localStorage.getItem("wish") || "[]");
let compareList = [];

function render(data){
let g = document.getElementById("grid");
g.innerHTML="";

data.forEach((p,i)=>{
g.innerHTML+=`
<div class="card">
<div class="heart" onclick="wishAdd(${i})">❤</div>
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<a class="button">Buy Now</a>
<button onclick="addCompare(${i})">Compare</button>
</div>
</div>`;
});
}

function filter(cat){
if(cat==="All") render(products);
else render(products.filter(p=>p.cat===cat));
}

function wishAdd(i){
if(!wish.includes(products[i])){
wish.push(products[i]);
}
localStorage.setItem("wish",JSON.stringify(wish));
document.getElementById("wishCount").innerText=wish.length;
}

function addCompare(i){
if(compareList.length<2 && !compareList.includes(products[i])){
compareList.push(products[i]);
document.getElementById("compareCount").innerText=compareList.length;
}
}

function compare(){
if(compareList.length<2){
alert("Select 2 products");
return;
}
alert(compareList[0].name+" VS "+compareList[1].name);
}

render(products);
document.getElementById("wishCount").innerText=wish.length;
</script>

</body>
</html>
