<!DOCTYPE html>
<html>
<head>
<title>KrishnaLatha Deals</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header {
  background:#2874f0;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
}

.top {
  position:fixed;
  top:10px;
  right:10px;
}
.top span {
  margin:0 5px;
  cursor:pointer;
  font-weight:bold;
}

.search {
  padding:10px;
}
.search input {
  width:100%;
  padding:10px;
}

.products {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.card {
  min-width:200px;
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.card img {
  width:100%;
  height:150px;
  object-fit:contain;
}

button {
  width:100%;
  margin-top:5px;
  padding:8px;
  border:none;
  background:#2874f0;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

.popup {
  position:fixed;
  top:0;
  right:-100%;
  width:300px;
  height:100%;
  background:white;
  transition:0.3s;
  padding:10px;
  overflow:auto;
}
.popup.active {
  right:0;
}

.close {
  cursor:pointer;
  color:red;
}

.item {
  border-bottom:1px solid #eee;
  padding:5px 0;
}
</style>
</head>

<body>

<header>KrishnaLatha Deals</header>

<div class="top">
  🛒 <span onclick="toggleCart()">Cart</span>
  ❤️ <span onclick="toggleWish()">Wish</span>
</div>

<div class="search">
  <input type="text" placeholder="Search..." onkeyup="searchProducts(this.value)">
</div>

<div id="products" class="products"></div>

<div id="cartBox" class="popup">
  <span class="close" onclick="toggleCart()">❌ Close</span>
  <h3>Cart</h3>
  <div id="cart"></div>
</div>

<div id="wishBox" class="popup">
  <span class="close" onclick="toggleWish()">❌ Close</span>
  <h3>Wishlist</h3>
  <div id="wish"></div>
</div>

<script>

// PRODUCTS
let products = [
  {id:1,name:"Towel Set",image:"https://via.placeholder.com/150",price:299,oldPrice:999,link:"https://amazon.in"},
  {id:2,name:"Kitchen Box",image:"https://via.placeholder.com/150",price:499,oldPrice:1299,link:"https://amazon.in"}
];

// RESET BROKEN DATA (AUTO FIX)
if(!localStorage.getItem("fixed")){
  localStorage.clear();
  localStorage.setItem("fixed","yes");
}

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let wish = JSON.parse(localStorage.getItem("wish")) || [];

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  localStorage.setItem("wish", JSON.stringify(wish));
}

// SHOW PRODUCTS
function showProducts(list){
  let html="";
  list.forEach(p=>{
    let heart = wish.some(w=>w.id===p.id) ? "💖" : "🤍";

    html += `
    <div class="card">
      <img src="${p.image}">
      <div>${p.name}</div>
      <div>₹${p.price} <del>₹${p.oldPrice}</del></div>

      <button onclick="addCart(${p.id})">Add to Cart</button>
      <button onclick="toggleWishlist(${p.id})">${heart} Wishlist</button>
      <button onclick="buyNow('${p.link}')">Buy Now</button>
    </div>`;
  });

  document.getElementById("products").innerHTML = html;
}

// SEARCH
function searchProducts(val){
  let filtered = products.filter(p=>p.name.toLowerCase().includes(val.toLowerCase()));
  showProducts(filtered);
}

// CART
function addCart(id){
  if(!cart.some(p=>p.id===id)){
    cart.push(products.find(x=>x.id===id));
    save();
  }
  renderCart();
}

function removeCart(id){
  cart = cart.filter(p=>p.id!==id);
  save();
  renderCart();
}

function renderCart(){
  let html="";
  cart.forEach(p=>{
    html += `<div class="item">${p.name} - ₹${p.price} <button onclick="removeCart(${p.id})">X</button></div>`;
  });
  document.getElementById("cart").innerHTML = html || "Cart Empty";
}

function toggleCart(){
  document.getElementById("cartBox").classList.toggle("active");
}

// WISHLIST
function toggleWishlist(id){
  if(wish.some(p=>p.id===id)){
    wish = wish.filter(p=>p.id!==id);
  } else {
    wish.push(products.find(x=>x.id===id));
  }
  save();
  renderWish();
  showProducts(products);
}

function renderWish(){
  let html="";
  wish.forEach(p=>{
    html += `<div class="item">${p.name}</div>`;
  });
  document.getElementById("wish").innerHTML = html || "Wishlist Empty";
}

function toggleWish(){
  document.getElementById("wishBox").classList.toggle("active");
}

// BUY
function buyNow(link){
  window.open(link,"_blank");
}

// INIT
renderCart();
renderWish();
showProducts(products);

</script>

</body>
</html>
