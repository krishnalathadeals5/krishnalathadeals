<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* HEADER */
.header{
background:#131921;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
position:sticky;
top:0;
z-index:1000;
}

.logo{
color:#ffb84d;
font-weight:bold;
}

/* SEARCH */
.search{
flex:1;
display:flex;
margin:0 10px;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:4px 0 0 4px;
outline:none;
}

.search button{
background:#febd69;
border:none;
padding:10px;
cursor:pointer;
border-radius:0 4px 4px 0;
}

/* HERO CAROUSEL */
.hero{
position:relative;
overflow:hidden;
background:#1a1d25;
color:white;
text-align:center;
padding:25px;
}

.slide{
display:none;
font-weight:bold;
font-size:16px;
}

.slide.active{
display:block;
animation:fade 0.5s ease-in-out;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:22px;
cursor:pointer;
padding:10px;
background:rgba(0,0,0,0.4);
border-radius:50%;
}

.left{left:10px;}
.right{right:10px;}

/* BRAND BAR */
.brand-bar{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:white;
}

.brand{
flex:0 0 auto;
display:flex;
align-items:center;
gap:6px;
padding:10px 14px;
border-radius:20px;
background:#f5f5f5;
cursor:pointer;
font-weight:bold;
animation:float 3s infinite;
}

.brand img{
width:20px;
height:20px;
}

/* FLOAT */
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-4px);}
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:contain;
}

.price{
color:green;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:gray;
font-size:12px;
}

.best{
color:#d32f2f;
font-weight:bold;
}

/* SOCIAL */
.social{
position:fixed;
right:10px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.social a{
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
animation:float 2s infinite;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

.social img{width:20px;}

.wa{background:#25D366;}
.tg{background:#0088cc;}
.yt{background:#FF0000;}
.ig{background:#E4405F;}
.fb{background:#1877F2;}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">Krishnalatha Deals</div>

<div class="search">
<input id="search" placeholder="Search product...">
<button onclick="compare()">🔍</button>
</div>
</div>

<!-- HERO SLIDER -->
<div class="hero">

<div class="slide active">🔥 Amazon Mega Deals Today</div>
<div class="slide">⚡ Flipkart Big Saving Days</div>
<div class="slide">💄 Myntra Fashion Sale</div>
<div class="slide">🛍 Meesho Lowest Price Deals</div>
<div class="slide">🏷 Ajio Premium Offers</div>

<div class="arrow left" onclick="changeSlide(-1)">❮</div>
<div class="arrow right" onclick="changeSlide(1)">❯</div>

</div>

<!-- BRAND LINKS -->
<div class="brand-bar">

<div class="brand" onclick="openPage('amazon.html')">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg"> Amazon
</div>

<div class="brand" onclick="openPage('flipkart.html')">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png"> Flipkart
</div>

<div class="brand" onclick="openPage('myntra.html')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968894.png"> Myntra
</div>

<div class="brand" onclick="openPage('meesho.html')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png"> Meesho
</div>

<div class="brand" onclick="openPage('ajio.html')">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png"> Ajio
</div>

</div>

<!-- PRODUCT GRID -->
<div class="grid" id="result"></div>

<!-- SOCIAL -->
<div class="social">

<a class="wa"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>
<a class="tg"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a>
<a class="yt"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
<a class="ig"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
<a class="fb"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>

</div>

<script>

/* HERO SLIDER */
let index=0;
function showSlide(i){
let slides=document.querySelectorAll(".slide");
slides.forEach(s=>s.classList.remove("active"));
index=(i+slides.length)%slides.length;
slides[index].classList.add("active");
}
function changeSlide(dir){
showSlide(index+dir);
}
setInterval(()=>changeSlide(1),4000);

/* NAV */
function openPage(p){
window.location.href=p;
}

/* PRODUCT COMPARISON */
const db={
"Samsung S23 FE":{
amazon:39999,
flipkart:38999,
myntra:0,
meesho:37999,
ajio:0
},
"watch":{
amazon:1999,
flipkart:1899,
myntra:2100,
meesho:1750,
ajio:0
}
};

function compare(){

let key=document.getElementById("search").value.toLowerCase();
let d=db[key];

let box=document.getElementById("result");

if(!d){
box.innerHTML="<div class='card'>No product found</div>";
return;
}

let arr=[];
let html="<div class='card'><h3>Price Comparison</h3>";

function add(n,p){
if(p>0){
arr.push({n,p});
html+=`<p>${n}: <span class='price'>₹${p}</span></p>`;
}
}

add("Amazon",d.amazon);
add("Flipkart",d.flipkart);
add("Myntra",d.myntra);
add("Meesho",d.meesho);
add("Ajio",d.ajio);

let best=arr.reduce((a,b)=>a.p<b.p?a:b);

html+=`<p class='best'>🏆 Best Price: ${best.n} ₹${best.p}</p></div>`;

box.innerHTML=html;
}

</script>

</body>
</html>
