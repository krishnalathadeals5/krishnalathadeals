<script>
// ==========================
// 🧠 AUTO PRODUCT SYSTEM
// ==========================

const products = [
    {name:"Kitchen Storage Box", price:999, img:"images/storage.jpg", badge:"-50%"},
    {name:"Towel Set", price:299, img:"images/towel.jpg", badge:"-40%"},
    {name:"Running Shoes", price:1499, img:"images/shoes.jpg", badge:"-30%"},
    {name:"Smart Watch", price:1999, img:"images/watch.jpg", badge:"-60%"},
    {name:"Travel Bag", price:899, img:"images/bag.jpg", badge:"HOT"},
    {name:"Pooja Diya", price:199, img:"images/diya.jpg", badge:"NEW"},
    {name:"Laptop", price:45999, img:"images/laptop.jpg", badge:"HOT"},
    {name:"Smart Mobile", price:14999, img:"images/mobile.jpg", badge:"SALE"},
    {name:"Home Plant", price:299, img:"images/plant.jpg", badge:"NEW"},
    {name:"Headphones", price:1299, img:"images/headphones.jpg", badge:"HOT"}
];

const grid = document.getElementById("productGrid");

// ==========================
// 📦 RENDER PRODUCTS
// ==========================
function render(items){
    grid.innerHTML = "";

    items.forEach(p => {
        grid.innerHTML += `
        <div class="card-wrap">
            <div class="card">
                <div class="badge">${p.badge}</div>
                <img src="${p.img}">
                <div class="card-content">
                    <h3>${p.name}</h3>
                    <div class="price">₹${p.price}</div>
                    <a href="#" class="button">Buy Now</a>
                </div>
            </div>
        </div>
        `;
    });
}

// initial load
render(products);

// ==========================
// 🔍 SEARCH SYSTEM
// ==========================

const searchInput = document.createElement("input");
searchInput.placeholder = "Search products...";
searchInput.style.cssText = `
width:90%;
padding:10px;
margin:10px auto;
display:block;
border-radius:8px;
border:1px solid #ccc;
`;

document.body.insertBefore(searchInput, document.querySelector(".banner"));

searchInput.addEventListener("input", function(){
    const value = this.value.toLowerCase();

    const filtered = products.filter(p =>
        p.name.toLowerCase().includes(value)
    );

    render(filtered);
});
</script>
