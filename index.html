<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.topbar{
background:linear-gradient(90deg,#131921,#1f2a38);
color:white;
display:flex;
justify-content:space-between;
padding:14px 16px;
position:sticky;
top:0;
z-index:999;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* PREMIUM LOGO */
.logo{
font-size:26px;
font-weight:900;
color:#ffb84d;
letter-spacing:0.5px;
display:flex;
align-items:center;
gap:5px;
}

.logo span{
font-size:18px;
animation:float 2s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-3px);}
100%{transform:translateY(0);}
}

.top-icons span{
margin-left:12px;
cursor:pointer;
font-weight:bold;
}

/* HORIZONTAL SCROLL */
.scroll-wrapper{
overflow:hidden;
background:white;
padding:10px 0;
border-bottom:1px solid #eee;
}

.scroll-track{
display:flex;
gap:20px;
width:max-content;
animation:scroll 18s linear infinite;
}

.scroll-wrapper:hover .scroll-track{
animation-play-state:paused;
}

.scroll-item{
min-width:140px;
background:#f4f4f4;
padding:8px;
border-radius:20px;
text-align:center;
font-weight:bold;
font-size:13px;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
cursor:pointer;
position:relative;
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:8px 10px;
text-align:center;
}

.card h3{
margin:5px 0;
font-size:14px;
}

.price{
color:green;
font-weight:bold;
}

/* BADGE */
.discount{
position:absolute;
top:8px;
left:8px;
background:red;
color:white;
padding:5px 8px;
font-size:12px;
border-radius:20px;
font-weight:bold;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
cursor:pointer;
}

.heart.active{
background:red;
color:white;
}

/* DETAIL POPUP */
.detail{
position:fixed;
inset:0;
background:white;
z-index:9999;
display:none;
flex-direction:column;
}

.detail-header{
background:#131921;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
}

.detail-body{
padding:12px;
}

.detail img{
width:100%;
border-radius:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

.buy{background:#28a745;color:white;}
.cart{background:#ff9900;color:white;}
.close{background:#333;color:white;}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
<div class="logo">
Krishna<span>🪶</span>latha Deals
</div>
<div class="top-icons">
<span>❤️ <span id="wishCount">0</span></span>
<span>🛒 <span id="cartCount">0</span></span>
</div>
</div>

<!-- AUTO SCROLL -->
<div class="scroll-wrapper">
<div class="scroll-track">
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast Delivery</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New Arrivals</div>
<div class="scroll-item">🏆 Top Rated</div>
<div class="scroll-item">📦 Free Delivery</div>

<!-- duplicate for smooth loop -->
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast Delivery</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New Arrivals</div>
<div class="scroll-item">🏆 Top Rated</div>
<div class="scroll-item">📦 Free Delivery</div>
</div>
</div>

<!-- GRID -->
<div class="container" id="grid"></div>

<!-- DETAIL -->
<div class="detail" id="detailBox">
<div class="detail-header">
<div>Product Details</div>
<button onclick="closeDetail()">X</button>
</div>

<div class="detail-body" id="detailBody"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg"}
];

let wish = JSON.parse(localStorage.getItem("wish")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("wish",JSON.stringify(wish));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* RENDER */
function render(){
let g=document.getElementById("grid");
g.innerHTML="";

products.forEach(p=>{

let liked = wish.find(x=>x.name===p.name) ? "active" : "";
let discount = Math.round(((p.old-p.price)/p.old)*100);

g.innerHTML+=`
<div class="card" onclick="openDetail('${p.name}')">

<div class="discount">${discount}% OFF</div>

<div class="heart ${liked}" onclick="event.stopPropagation(); toggleWish('${p.name}')">❤</div>

<img src="${p.img}">

<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>

</div>`;
});
}

/* WISHLIST */
function toggleWish(name){
let p = products.find(x=>x.name===name);
let i = wish.findIndex(x=>x.name===name);

if(i>-1) wish.splice(i,1);
else wish.push(p);

save();
updateCounts();
render();
}

/* DETAIL */
function openDetail(name){
let p = products.find(x=>x.name===name);
let discount = Math.round(((p.old-p.price)/p.old)*100);

document.getElementById("detailBody").innerHTML=`
<img src="${p.img}">
<h2>${p.name}</h2>

<div style="color:green;font-size:18px;font-weight:bold;">
₹${p.price} <span style="text-decoration:line-through;color:gray;">₹${p.old}</span>
</div>

<p>${discount}% OFF - Best Deal Price</p>

<button class="buy" onclick="buyNow('${p.name}')">Buy Now</button>
<button class="cart" onclick="addCart('${p.name}')">Add to Cart</button>
`;

document.getElementById("detailBox").style.display="flex";
}

function closeDetail(){
document.getElementById("detailBox").style.display="none";
}

function addCart(name){
let p = products.find(x=>x.name===name);
if(!cart.find(x=>x.name===name)) cart.push(p);

save();
updateCounts();
alert("Added to cart");
}

function buyNow(name){
alert("Buying " + name);
}

function updateCounts(){
document.getElementById("wishCount").innerText=wish.length;
document.getElementById("cartCount").innerText=cart.length;
}

render();
updateCounts();

</script>

</body>
</html>
