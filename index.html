<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.topbar{
background:linear-gradient(90deg,#131921,#1f2a38);
color:white;
display:flex;
justify-content:space-between;
padding:14px 16px;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:22px;
font-weight:800;
color:#ffb84d;
}

.top-icons span{
margin-left:12px;
cursor:pointer;
font-weight:bold;
}

/* SCROLL */
.scroll-wrapper{
overflow:hidden;
background:white;
padding:10px 0;
}

.scroll-track{
display:flex;
gap:20px;
width:max-content;
animation:scroll 18s linear infinite;
}

.scroll-wrapper:hover .scroll-track{
animation-play-state:paused;
}

.scroll-item{
min-width:140px;
background:#f4f4f4;
padding:8px;
border-radius:20px;
text-align:center;
font-weight:bold;
font-size:13px;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
position:relative;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
cursor:pointer;
}

.card-content{
padding:10px;
text-align:center;
}

.price{
color:green;
font-weight:bold;
margin-top:4px;
}

.mrp{
color:gray;
text-decoration:line-through;
font-size:12px;
margin-left:5px;
}

/* BUTTONS */
.btn{
display:block;
padding:7px;
margin-top:6px;
border-radius:6px;
text-align:center;
cursor:pointer;
font-size:13px;
border:none;
width:100%;
}

.cart-btn{background:#ff9900;color:white;}
.buy-btn{background:#28a745;color:white;}

/* BADGE */
.discount{
position:absolute;
top:8px;
left:8px;
background:red;
color:white;
padding:5px 8px;
font-size:12px;
border-radius:20px;
font-weight:bold;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
cursor:pointer;
}

.heart.active{
background:red;
color:white;
}

/* DETAIL PAGE */
.detail{
position:fixed;
inset:0;
background:white;
display:none;
flex-direction:column;
z-index:10000;
}

.detail-header{
background:#131921;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
}

.detail-body{
padding:12px;
}

.detail-body img{
width:100%;
border-radius:10px;
}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:white;
display:none;
flex-direction:column;
z-index:9999;
}

.popup-header{
display:flex;
justify-content:space-between;
padding:15px;
background:#131921;
color:white;
}

.popup-content{
padding:10px;
overflow:auto;
}

.popup-item{
display:flex;
gap:10px;
padding:10px;
background:#f2f2f2;
margin-bottom:10px;
border-radius:10px;
align-items:center;
}

.popup-item img{
width:70px;
height:70px;
object-fit:cover;
}

.popup-item button{
margin-left:auto;
padding:5px 10px;
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
<div class="logo">Krishnalatha Deals</div>

<div class="top-icons">
<span>❤️ <span id="wishCount">0</span></span>
<span>🛒 <span id="cartCount">0</span></span>
</div>
</div>

<!-- SCROLL -->
<div class="scroll-wrapper">
<div class="scroll-track">
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast Delivery</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New Arrivals</div>
<div class="scroll-item">🏆 Top Rated</div>
<div class="scroll-item">📦 Free Delivery</div>
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast Delivery</div>
</div>
</div>

<!-- GRID -->
<div class="container" id="grid"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-header">
<div id="popupTitle">List</div>
<button onclick="closePopup()">Close</button>
</div>
<div class="popup-content" id="popupContent"></div>
</div>

<!-- DETAIL PAGE -->
<div class="detail" id="detail">
<div class="detail-header">
<div>Product</div>
<button onclick="closeDetail()">X</button>
</div>
<div class="detail-body" id="detailBody"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg"},
{name:"Towel Set",price:299,old:499},
{name:"Shoes",price:1499,old:1999},
{name:"Watch",price:1999,old:2499},
{name:"Bag",price:899,old:1299},
{name:"Diya",price:199,old:299},
{name:"Laptop",price:45999,old:50999},
{name:"Mobile",price:14999,old:16999},
{name:"Plant",price:299,old:499},
{name:"Headphones",price:1299,old:1999}
];

let wish=[];
let cart=[];

/* RENDER */
function render(){
let g=document.getElementById("grid");
g.innerHTML="";

products.forEach(p=>{

let discount=Math.round(((p.old-p.price)/p.old)*100);

g.innerHTML+=`
<div class="card">

<div class="discount">${discount}% OFF</div>

<div class="heart" onclick="event.stopPropagation(); toggleWish('${p.name}')">❤</div>

<img src="${p.img}" onclick="openDetail('${p.name}')">

<div class="card-content">
<h3>${p.name}</h3>

<div class="price">
₹${p.price} <span class="mrp">₹${p.old}</span>
</div>

<button class="btn cart-btn" onclick="addCart('${p.name}')">Add to Cart</button>
<button class="btn buy-btn" onclick="buyNow('${p.name}')">Buy Now</button>

</div>
</div>`;
});
}

/* DETAIL PAGE */
function openDetail(name){
let p=products.find(x=>x.name===name);
let discount=Math.round(((p.old-p.price)/p.old)*100);

document.getElementById("detailBody").innerHTML=`
<img src="${p.img}">
<h2>${p.name}</h2>

<h3>₹${p.price} <span class="mrp">₹${p.old}</span></h3>
<p>${discount}% OFF</p>

<button class="btn buy-btn" onclick="buyNow('${p.name}')">Buy Now</button>
<button class="btn cart-btn" onclick="addCart('${p.name}')">Add to Cart</button>
`;

document.getElementById("detail").style.display="flex";
}

function closeDetail(){
document.getElementById("detail").style.display="none";
}

/* CART */
function addCart(name){
let p=products.find(x=>x.name===name);
if(!cart.find(x=>x.name===name)) cart.push(p);
updateCounts();
}

/* BUY */
function buyNow(name){
alert("Buying " + name);
}

/* WISHLIST */
function toggleWish(name){
let p=products.find(x=>x.name===name);
let i=wish.findIndex(x=>x.name===name);

if(i>-1) wish.splice(i,1);
else wish.push(p);

updateCounts();
render();
}

/* COUNT */
function updateCounts(){
document.getElementById("wishCount").innerText=wish.length;
document.getElementById("cartCount").innerText=cart.length;
}

render();
updateCounts();

</script>

</body>
</html>
