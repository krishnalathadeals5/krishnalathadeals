<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f1115;
color:white;
}

/* 🔥 TOP TICKER (FULL WIDTH ENDLESS) */
.ticker{
width:100%;
overflow:hidden;
background:linear-gradient(90deg,#ff9900,#2874f0,#ff3f6c,#9c27b0,#00c853);
white-space:nowrap;
}

.ticker span{
display:inline-block;
padding:10px 0;
font-weight:bold;
font-size:14px;
animation:scroll 14s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

/* 🔥 HERO BANNER BIG */
.hero{
height:140px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:#1a1d25;
padding:10px;
}

.hero h1{
margin:0;
font-size:26px;
}

.hero p{
margin-top:6px;
opacity:0.8;
animation:slideText 6s linear infinite;
white-space:nowrap;
}

@keyframes slideText{
0%{transform:translateX(100%);}
100%{transform:translateX(-100%);}
}

/* TITLE */
.title{
text-align:center;
padding:10px;
font-size:14px;
opacity:0.8;
}

/* BRAND GRID */
.brand-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:15px;
padding:20px;
}

.brand{
background:#1c1f26;
border-radius:16px;
padding:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
animation:float 3s ease-in-out infinite;
box-shadow:0 0 10px rgba(255,255,255,0.05);
}

.brand:hover{
transform:scale(1.08);
}

.brand img{
width:45px;
height:45px;
margin-bottom:8px;
}

/* COLORS */
.amazon{border-top:4px solid #ff9900;}
.flipkart{border-top:4px solid #2874f0;}
.myntra{border-top:4px solid #ff3f6c;}
.meesho{border-top:4px solid #9c27b0;}
.ajio{border-top:4px solid #ffffff;}
.reliance{border-top:4px solid #00c853;}

/* FLOAT ANIMATION */
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}

/* SOCIAL FLOAT */
.social{
position:fixed;
right:10px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.social a{
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
animation:float 2s infinite;
box-shadow:0 3px 10px rgba(0,0,0,0.4);
}

.social img{width:22px;}

.wa{background:#25D366;}
.tg{background:#0088cc;}
.yt{background:#FF0000;}
.ig{background:#E4405F;}
.fb{background:#1877F2;}

</style>
</head>

<body>

<!-- 🔥 TOP FULL WIDTH TICKER -->
<div class="ticker">
<span>🔥 Best Deals • Amazon • Flipkart • Myntra • Meesho • Ajio • Reliance Digital • Offers • Lowest Price Guarantee • 🔥</span>
</div>

<!-- HERO -->
<div class="hero">
<h1>Best Deals Online</h1>
<p>Compare prices across all platforms instantly</p>
</div>

<div class="title">Choose your shopping platform</div>

<!-- BRAND ICONS -->
<div class="brand-grid">

<div class="brand amazon" onclick="openPage('amazon.html')">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
Amazon
</div>

<div class="brand flipkart" onclick="openPage('flipkart.html')">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png">
Flipkart
</div>

<div class="brand myntra" onclick="openPage('myntra.html')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968894.png">
Myntra
</div>

<div class="brand meesho" onclick="openPage('meesho.html')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png">
Meesho
</div>

<div class="brand ajio" onclick="openPage('ajio.html')">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
Ajio
</div>

<div class="brand reliance" onclick="openPage('reliance.html')">
<img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png">
Reliance
</div>

</div>

<!-- SOCIAL -->
<div class="social">

<a class="wa" href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>
<a class="tg" href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a>
<a class="yt" href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
<a class="ig" href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
<a class="fb" href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>

</div>

<script>
function openPage(page){
window.location.href = page;
}
</script>

</body>
</html>
