<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* HEADER */
.header{
background:#131921;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 15px;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:18px;
font-weight:bold;
color:#ffb84d;
}

/* SEARCH */
.search{
flex:1;
display:flex;
margin:0 10px;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:4px 0 0 4px;
outline:none;
}

.search button{
background:#febd69;
border:none;
padding:10px 14px;
cursor:pointer;
border-radius:0 4px 4px 0;
}

/* HERO */
.hero{
background:linear-gradient(90deg,#ff9900,#2874f0);
color:white;
text-align:center;
padding:18px;
font-weight:bold;
}

/* PLATFORM BAR (REPLACES CATEGORIES) */
.platform-bar{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:white;
white-space:nowrap;
}

/* PLATFORM ITEM */
.platform{
flex:0 0 auto;
display:flex;
align-items:center;
gap:8px;
padding:10px 14px;
border-radius:25px;
background:#f5f5f5;
cursor:pointer;
font-weight:bold;
font-size:13px;
transition:0.3s;
animation:float 3s ease-in-out infinite;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.platform:hover{
transform:scale(1.08);
}

.platform img{
width:22px;
height:22px;
}

/* BRAND COLORS */
.amazon{border-left:4px solid #ff9900;}
.flipkart{border-left:4px solid #2874f0;}
.myntra{border-left:4px solid #ff3f6c;}
.meesho{border-left:4px solid #9c27b0;}
.ajio{border-left:4px solid #000;}

/* FLOAT ANIMATION */
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-5px);}
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

/* CARD */
.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.2s;
cursor:pointer;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.title{
font-size:14px;
margin:5px 0;
height:35px;
overflow:hidden;
}

.price{
color:#1a8e3e;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:gray;
font-size:12px;
}

.discount{
color:#d32f2f;
font-size:12px;
}

.hidden{display:none;}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">Krishnalatha Deals</div>

<div class="search">
<input id="search" placeholder="Search products...">
<button onclick="search()">🔍</button>
</div>
</div>

<!-- HERO -->
<div class="hero">
🔥 Amazon • Flipkart • Myntra • Meesho • Ajio Deals Hub
</div>

<!-- PLATFORM SWITCH BAR -->
<div class="platform-bar">

<div class="platform amazon" onclick="filter('all')">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
All
</div>

<div class="platform amazon" onclick="filter('amazon')">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
Amazon
</div>

<div class="platform flipkart" onclick="filter('flipkart')">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png">
Flipkart
</div>

<div class="platform myntra" onclick="filter('myntra')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968894.png">
Myntra
</div>

<div class="platform meesho" onclick="filter('meesho')">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png">
Meesho
</div>

<div class="platform ajio" onclick="filter('ajio')">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
Ajio
</div>

</div>

<!-- PRODUCTS -->
<div class="grid" id="grid">

<div class="card" data-platform="amazon">
<img src="https://m.media-amazon.com/images/I/71geVdy6-OS.jpg">
<div class="title">Samsung S23 FE</div>
<div class="price">₹39,999</div>
<div class="old">₹72,999</div>
<div class="discount">-45%</div>
</div>

<div class="card" data-platform="flipkart">
<img src="https://m.media-amazon.com/images/I/61-r9zOKBCL.jpg">
<div class="title">Noise Smart Watch</div>
<div class="price">₹1,999</div>
<div class="old">₹2,999</div>
<div class="discount">-30%</div>
</div>

<div class="card" data-platform="myntra">
<img src="https://m.media-amazon.com/images/I/61cwywLZR-L.jpg">
<div class="title">Backpack Travel Bag</div>
<div class="price">₹899</div>
<div class="old">₹1,999</div>
<div class="discount">-55%</div>
</div>

</div>

<script>

/* FILTER PLATFORM */
function filter(type){

let cards = document.querySelectorAll(".card");

cards.forEach(card=>{
let platform = card.getAttribute("data-platform");

if(type==="all"){
card.classList.remove("hidden");
}else{
card.classList.toggle("hidden", platform!==type);
}
});
}

/* SEARCH */
function search(){
let val = document.getElementById("search").value.toLowerCase();
let cards = document.querySelectorAll(".card");

cards.forEach(card=>{
let text = card.innerText.toLowerCase();
card.classList.toggle("hidden", !text.includes(val));
});
}

</script>

</body>
</html>
