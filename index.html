<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* HEADER */
.header{
background:#131921;
color:white;
display:flex;
align-items:center;
padding:10px 15px;
position:sticky;
top:0;
z-index:1000;
}

.logo{
color:#ffb84d;
font-weight:bold;
white-space:nowrap;
}

/* SEARCH */
.search{
flex:1;
display:flex;
margin-left:10px;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:4px 0 0 4px;
outline:none;
}

.search button{
background:#febd69;
border:none;
padding:10px;
cursor:pointer;
border-radius:0 4px 4px 0;
}

/* ================= HERO (BIGGER + SMOOTH SLIDER) ================= */
.hero{
position:relative;
height:140px;
overflow:hidden;
background:#0f1115;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
font-size:18px;
}

.hero-track{
display:flex;
width:100%;
transition:transform 0.6s ease-in-out;
}

.hero-slide{
min-width:100%;
text-align:center;
padding:20px;
}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:22px;
background:rgba(0,0,0,0.4);
color:white;
padding:8px 12px;
border-radius:50%;
cursor:pointer;
}

.left{left:10px;}
.right{right:10px;}

/* ================= BRAND ICONS ================= */
.brand-bar{
display:flex;
gap:12px;
overflow-x:auto;
padding:12px;
background:white;
}

.brand{
flex:0 0 auto;
display:flex;
align-items:center;
gap:8px;
padding:10px 14px;
border-radius:25px;
background:#f5f5f5;
font-weight:bold;
cursor:pointer;
transition:0.3s;
animation:float 3s infinite;
}

.brand img{
width:22px;
height:22px;
}

.brand:hover{
transform:scale(1.1);
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-4px);}
}

/* ================= GRID ================= */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:contain;
}

.price{color:green;font-weight:bold;}
.old{color:gray;text-decoration:line-through;font-size:12px;}
.best{color:red;font-weight:bold;margin-top:10px;}

/* ================= SOCIAL ================= */
.social{
position:fixed;
right:10px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.social a{
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
animation:float 2s infinite;
}

.social img{width:20px;}

.wa{background:#25D366;}
.tg{background:#0088cc;}
.yt{background:#FF0000;}
.ig{background:#E4405F;}
.fb{background:#1877F2;}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">Krishnalatha Deals</div>

<div class="search">
<input id="search" placeholder="Search product (e.g. Samsung S23 FE)">
<button onclick="compare()">🔍</button>
</div>
</div>

<!-- HERO (BIG + SMOOTH) -->
<div class="hero">
<div class="hero-track" id="track">

<div class="hero-slide">🔥 Amazon Mega Offers</div>
<div class="hero-slide">⚡ Flipkart Big Savings</div>
<div class="hero-slide">💄 Myntra Fashion Sale</div>
<div class="hero-slide">🛍 Meesho Lowest Price</div>
<div class="hero-slide">🏷 Ajio Premium Deals</div>

</div>

<div class="arrow left" onclick="move(-1)">❮</div>
<div class="arrow right" onclick="move(1)">❯</div>
</div>

<!-- BRAND ICONS -->
<div class="brand-bar">

<div class="brand">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg"> Amazon
</div>

<div class="brand">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png"> Flipkart
</div>

<div class="brand">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968894.png"> Myntra
</div>

<div class="brand">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png"> Meesho
</div>

<div class="brand">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png"> Ajio
</div>

</div>

<!-- PRODUCT COMPARISON -->
<div class="grid" id="result"></div>

<!-- SOCIAL -->
<div class="social">
<a class="wa"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>
<a class="tg"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a>
<a class="yt"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
<a class="ig"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
<a class="fb"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>
</div>

<script>

/* HERO SLIDER */
let index=0;
function move(dir){
let track=document.getElementById("track");
let slides=document.querySelectorAll(".hero-slide");

index+=dir;
if(index<0) index=slides.length-1;
if(index>=slides.length) index=0;

track.style.transform=`translateX(-${index*100}%)`;
}

setInterval(()=>move(1),4000);

/* PRODUCT DATABASE */
const data={
"samsung s23 fe":{
amazon:39999,
flipkart:38999,
myntra:0,
meesho:37999,
ajio:0
},
"watch":{
amazon:1999,
flipkart:1899,
myntra:2100,
meesho:1750,
ajio:0
},
"backpack":{
amazon:999,
flipkart:899,
myntra:0,
meesho:799,
ajio:0
}
};

/* COMPARE */
function compare(){

let key=document.getElementById("search").value.toLowerCase();
let d=data[key];

let box=document.getElementById("result");

if(!d){
box.innerHTML="<div class='card'>No product found</div>";
return;
}

let arr=[];
let html="<div class='card'><h3>Price Comparison</h3>";

function add(n,p){
if(p>0){
arr.push({n,p});
html+=`<p>${n}: <span class='price'>₹${p}</span></p>`;
}
}

add("Amazon",d.amazon);
add("Flipkart",d.flipkart);
add("Myntra",d.myntra);
add("Meesho",d.meesho);
add("Ajio",d.ajio);

let best=arr.reduce((a,b)=>a.p<b.p?a:b);

html+=`<div class='best'>🏆 Best Price: ${best.n} ₹${best.p}</div></div>`;

box.innerHTML=html;
}

</script>

</body>
</html>
