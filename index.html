<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
background:#131921;
color:white;
padding:14px;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:22px;
font-weight:800;
color:#ffb84d;
}

/* SEARCH */
.search-box{
padding:10px;
background:#131921;
}
.search-box input{
width:100%;
padding:10px;
border:none;
border-radius:6px;
}

/* SCROLL */
.scroll-wrapper{
overflow:hidden;
background:white;
padding:10px 0;
}
.scroll-track{
display:flex;
width:max-content;
animation:scroll 22s linear infinite;
}
.scroll-item{
min-width:140px;
margin-right:15px;
background:#eee;
padding:8px;
border-radius:20px;
text-align:center;
font-size:13px;
font-weight:bold;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
cursor:pointer;
position:relative;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
cursor:pointer;
}
.heart.active{
background:red;
color:white;
}

/* DETAIL */
.detail{
position:fixed;
inset:0;
background:white;
display:none;
z-index:9999;
overflow:auto;
}

.detail-header{
display:flex;
justify-content:space-between;
padding:12px;
background:#131921;
color:white;
}

.close{
background:red;
border:none;
color:white;
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
}

/* AMAZON STYLE IMAGE FIX */
.detail-body{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:20px;
justify-content:center;
align-items:center;
}

.detail-body img{
width:300px;
height:300px;
object-fit:contain;
background:#fff;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.detail-info{
max-width:400px;
}

.old{
text-decoration:line-through;
color:gray;
margin-left:8px;
}

.discount{
color:green;
font-weight:bold;
margin:10px 0;
}

/* BUTTONS */
.btn{
padding:10px 14px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
}
.buy{background:#28a745;color:white;}
.cart{background:#ff9900;color:white;margin-left:10px;}

</style>
</head>

<body>

<div class="topbar">
<div class="logo">Krishnalatha Deals</div>
</div>

<div class="search-box">
<input id="search" placeholder="Search products..." oninput="searchProducts()">
</div>

<div class="scroll-wrapper">
<div class="scroll-track">
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New</div>
<div class="scroll-item">🏆 Top</div>
<div class="scroll-item">📦 Free</div>
</div>
</div>

<div class="container" id="grid"></div>

<!-- DETAIL -->
<div class="detail" id="detailBox">
<div class="detail-header">
<div>Product</div>
<button class="close" onclick="closeDetail()">×</button>
</div>
<div class="detail-body" id="detailBody"></div>
</div>

<script>

/* ✅ FIXED IMAGE PATHS */
const products=[
{name:"Kitchen Box",price:999,old:1499,img:"storage.jpg"},
{name:"Towel Set",price:299,old:499,img:"towel.jpg"},
{name:"Shoes",price:1499,old:1999,img:"shoes.jpg"},
{name:"Watch",price:1999,old:2499,img:"watch.jpg"},
{name:"Bag",price:899,old:1299,img:"bag.jpg"},
{name:"Diya",price:199,old:299,img:"diya.jpg"},
{name:"Laptop",price:45999,old:50999,img:"laptop.jpg"},
{name:"Mobile",price:14999,old:16999,img:"mobile.jpg"},
{name:"Plant",price:299,old:499,img:"plant.jpg"},
{name:"Headphones",price:1299,old:1999,img:"headphones.jpg"}
];

/* RENDER */
function render(list=products){
let g=document.getElementById("grid");
g.innerHTML="";

list.forEach(p=>{
g.innerHTML+=`
<div class="card" onclick="openDetail('${p.name}')">
<img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x200?text=No+Image'">
<h3 style="padding:10px">${p.name}</h3>
<div style="padding:0 10px 10px">₹${p.price}</div>
</div>`;
});
}

/* SEARCH */
function searchProducts(){
let v=document.getElementById("search").value.toLowerCase();
if(v===""){ render(products); return; }
render(products.filter(p=>p.name.toLowerCase().includes(v)));
}

/* DETAIL VIEW */
function openDetail(name){
let p=products.find(x=>x.name===name);
let d=Math.round(((p.old-p.price)/p.old)*100);

document.getElementById("detailBody").innerHTML=`

<img src="${p.img}" onerror="this.src='https://via.placeholder.com/300x300?text=No+Image'">

<div class="detail-info">
<h2>${p.name}</h2>

<div style="font-size:20px;margin:10px 0;">
₹${p.price}
<span class="old">₹${p.old}</span>
</div>

<div class="discount">${d}% OFF</div>

<button class="btn buy">Buy Now</button>
<button class="btn cart">Add to Cart</button>
</div>
`;

document.getElementById("detailBox").style.display="flex";
}

function closeDetail(){
document.getElementById("detailBox").style.display="none";
}

render();

</script>

</body>
</html>
