<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.topbar{
background:linear-gradient(90deg,#131921,#1f2a38);
color:white;
display:flex;
justify-content:space-between;
padding:14px;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:22px;
font-weight:800;
color:#ffb84d;
}

.top-icons span{
margin-left:12px;
cursor:pointer;
font-weight:bold;
}

/* SEARCH */
.search-box{
padding:10px;
background:#131921;
}
.search-box input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
outline:none;
}

/* SCROLL */
.scroll-wrapper{
overflow:hidden;
background:white;
padding:10px 0;
}
.scroll-track{
display:flex;
gap:20px;
width:max-content;
animation:scroll 18s linear infinite;
}
.scroll-wrapper:hover .scroll-track{
animation-play-state:paused;
}
.scroll-item{
min-width:140px;
background:#f4f4f4;
padding:8px;
border-radius:20px;
text-align:center;
font-weight:bold;
font-size:13px;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
position:relative;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:10px;
text-align:center;
}

.price{
color:green;
font-weight:bold;
margin-top:5px;
}

/* BUTTONS */
.btn{
display:block;
padding:7px;
margin-top:6px;
border-radius:6px;
text-align:center;
cursor:pointer;
font-size:13px;
}
.cart-btn{background:#ff9900;color:white;}
.buy-btn{background:#28a745;color:white;}

/* DISCOUNT */
.discount{
position:absolute;
top:8px;
left:8px;
background:red;
color:white;
padding:5px 8px;
font-size:12px;
border-radius:20px;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
cursor:pointer;
}
.heart.active{
background:red;
color:white;
}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:white;
display:none;
flex-direction:column;
z-index:9999;
}

.popup-header{
display:flex;
justify-content:space-between;
padding:15px;
background:#131921;
color:white;
}

.popup-content{
padding:10px;
overflow:auto;
}

.popup-item{
display:flex;
gap:10px;
padding:10px;
background:#f2f2f2;
margin-bottom:10px;
border-radius:10px;
align-items:center;
}

.popup-item img{
width:70px;
height:70px;
object-fit:cover;
}

.popup-item button{
margin-left:auto;
padding:5px 10px;
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

/* DETAIL PAGE */
.detail{
position:fixed;
inset:0;
background:white;
display:none;
flex-direction:column;
z-index:10000;
}

.detail-header{
display:flex;
justify-content:space-between;
padding:12px;
background:#131921;
color:white;
}

.detail-body{
padding:12px;
}

.detail-body img{
width:100%;
border-radius:10px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
<div class="logo">Krishnalatha Deals</div>

<div class="top-icons">
<span onclick="openPopup('wishlist')">❤️ <span id="wishCount">0</span></span>
<span onclick="openPopup('cart')">🛒 <span id="cartCount">0</span></span>
</div>
</div>

<!-- SEARCH -->
<div class="search-box">
<input id="search" placeholder="Search products...">
</div>

<!-- SCROLL -->
<div class="scroll-wrapper">
<div class="scroll-track">
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast Delivery</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New Arrivals</div>
<div class="scroll-item">🏆 Top Rated</div>
<div class="scroll-item">📦 Free Delivery</div>

<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast Delivery</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New Arrivals</div>
<div class="scroll-item">🏆 Top Rated</div>
<div class="scroll-item">📦 Free Delivery</div>
</div>
</div>

<!-- GRID -->
<div class="container" id="grid"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-header">
<div id="popupTitle">List</div>
<button onclick="closePopup()">Close</button>
</div>
<div class="popup-content" id="popupContent"></div>
</div>

<!-- DETAIL PAGE -->
<div class="detail" id="detailBox">
<div class="detail-header">
<div>Product Details</div>
<button onclick="closeDetail()">X</button>
</div>
<div class="detail-body" id="detailBody"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg"}
];

let wish = JSON.parse(localStorage.getItem("wish")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("wish",JSON.stringify(wish));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* RENDER */
function render(data=products){
let g=document.getElementById("grid");
g.innerHTML="";

data.forEach(p=>{

let liked = wish.find(x=>x.name===p.name) ? "active" : "";
let discount = Math.round(((p.old-p.price)/p.old)*100);

g.innerHTML+=`
<div class="card" onclick="openDetail('${p.name}')">

<div class="discount">${discount}% OFF</div>

<div class="heart ${liked}" onclick="event.stopPropagation(); toggleWish('${p.name}')">❤</div>

<img src="${p.img}">

<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price} <del style="color:gray;">₹${p.old}</del></div>

<div class="btn cart-btn" onclick="event.stopPropagation(); addCart('${p.name}')">Add to Cart</div>
<div class="btn buy-btn" onclick="event.stopPropagation(); buyNow('${p.name}')">Buy Now</div>

</div>
</div>`;
});
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
let v=this.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(v)));
});

/* WISHLIST */
function toggleWish(name){
let p=products.find(x=>x.name===name);
let i=wish.findIndex(x=>x.name===name);

if(i>-1) wish.splice(i,1);
else wish.push(p);

save(); updateCounts(); render();
}

/* CART */
function addCart(name){
let p=products.find(x=>x.name===name);
if(!cart.find(x=>x.name===name)) cart.push(p);

save(); updateCounts();
}

/* BUY */
function buyNow(name){
alert("Buying " + name);
}

/* DETAIL */
function openDetail(name){
let p=products.find(x=>x.name===name);
let discount=Math.round(((p.old-p.price)/p.old)*100);

document.getElementById("detailBody").innerHTML=`
<img src="${p.img}">
<h2>${p.name}</h2>
<p style="color:green;font-size:18px;">
₹${p.price} <del style="color:gray;">₹${p.old}</del>
</p>
<p>${discount}% OFF</p>
<button onclick="buyNow('${p.name}')" style="background:#28a745;color:white;">Buy Now</button>
<button onclick="addCart('${p.name}')" style="background:#ff9900;color:white;">Add to Cart</button>
`;

document.getElementById("detailBox").style.display="flex";
}

function closeDetail(){
document.getElementById("detailBox").style.display="none";
}

/* POPUP */
function openPopup(type){
let box=document.getElementById("popup");
let content=document.getElementById("popupContent");

box.style.display="flex";

let list = type==="wishlist" ? wish : cart;

content.innerHTML = list.length ? list.map(p=>`
<div class="popup-item">
<img src="${p.img}">
<div><b>${p.name}</b><br>₹${p.price}</div>
<button onclick="${type==='wishlist'?'removeWish':'removeCart'}('${p.name}')">Remove</button>
</div>
`).join("") : "<p>Empty</p>";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* REMOVE */
function removeWish(name){
wish=wish.filter(x=>x.name!==name);
save(); updateCounts(); openPopup("wishlist"); render();
}

function removeCart(name){
cart=cart.filter(x=>x.name!==name);
save(); updateCounts(); openPopup("cart");
}

/* COUNT */
function updateCounts(){
document.getElementById("wishCount").innerText=wish.length;
document.getElementById("cartCount").innerText=cart.length;
}

render();
updateCounts();

</script>

</body>
</html>
