<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f6fa;
}

/* TOP BAR */
.topbar{
    background:#131921;
    color:white;
    display:flex;
    justify-content:space-between;
    padding:12px 15px;
    align-items:center;
}

.logo{color:#ff9900;font-weight:bold;cursor:pointer}

/* SEARCH */
.search-box{padding:10px;background:#131921}

.search-box input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
}

/* SLIDER FIX */
.slider{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    background:white;
    scroll-snap-type:x mandatory;
}

.slider::-webkit-scrollbar{display:none;}

.slider .mini{
    min-width:150px;
    background:#fff;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-align:center;
    scroll-snap-align:start;
}

/* CATEGORY */
.categories{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    background:#1f2a38;
}

.categories div{
    color:white;
    background:#2f3e50;
    padding:6px 12px;
    border-radius:20px;
    white-space:nowrap;
    cursor:pointer;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
    padding:12px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{width:100%;height:150px;object-fit:cover}

.card-content{text-align:center;padding:10px}

.price{color:green;font-weight:bold}

.button{
    display:block;
    padding:8px;
    background:#ff9900;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

/* HEART */
.heart{
    position:absolute;
    top:8px;
    right:8px;
    background:white;
    border-radius:50%;
    padding:4px 6px;
    cursor:pointer;
    color:#aaa;
}
.heart.active{color:red}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* BAR */
.bottom-bar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#111;
    color:white;
    padding:10px;
    display:flex;
    justify-content:space-between;
}

.btn{
    background:#ff9900;
    border:none;
    padding:6px 10px;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo" onclick="showPage('home')">Krishnalatha Deals</div>
    <div onclick="showPage('wishlist')">❤️ <span id="wishCount">0</span></div>
</div>

<!-- HOME PAGE -->
<div id="home" class="page active">

<div class="search-box">
    <input placeholder="Search products...">
</div>

<div class="slider">
    <div class="mini">🔥 Deals</div>
    <div class="mini">⚡ Fast Delivery</div>
    <div class="mini">💰 Best Price</div>
    <div class="mini">🆕 New Launch</div>
</div>

<div class="categories">
    <div onclick="filter('All')">All</div>
    <div onclick="filter('Kitchen')">Kitchen</div>
    <div onclick="filter('Fashion')">Fashion</div>
    <div onclick="filter('Electronics')">Electronics</div>
    <div onclick="filter('Home Decor')">Home Decor</div>
</div>

<div class="container" id="grid"></div>
</div>

<!-- WISHLIST PAGE -->
<div id="wishlist" class="page">
    <div class="container" id="wishGrid"></div>
</div>

<!-- BOTTOM -->
<div class="bottom-bar">
    <div>Compare: 0/2</div>
    <button class="btn">Compare</button>
</div>

<script>
const products = [
{id:1,name:"Kitchen Box",price:999,img:"images/storage.jpg",cat:"Kitchen"},
{id:2,name:"Towel",price:299,img:"images/towel.jpg",cat:"Home Decor"},
{id:3,name:"Shoes",price:1499,img:"images/shoes.jpg",cat:"Fashion"},
{id:4,name:"Watch",price:1999,img:"images/watch.jpg",cat:"Electronics"},
{id:5,name:"Bag",price:899,img:"images/bag.jpg",cat:"Fashion"},
{id:6,name:"Diya",price:199,img:"images/diya.jpg",cat:"Home Decor"},
{id:7,name:"Laptop",price:45999,img:"images/laptop.jpg",cat:"Electronics"},
{id:8,name:"Mobile",price:14999,img:"images/mobile.jpg",cat:"Electronics"},
{id:9,name:"Plant",price:299,img:"images/plant.jpg",cat:"Home Decor"},
{id:10,name:"Headphones",price:1299,img:"images/headphones.jpg",cat:"Electronics"}
];

let wish = JSON.parse(localStorage.getItem("wish") || "[]");

function showPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
if(p==="wishlist") renderWish();
}

function render(data=products){
let g=document.getElementById("grid");
g.innerHTML="";
data.forEach(p=>{
g.innerHTML+=`
<div class="card">
<div class="heart ${wish.includes(p.id)?'active':''}" onclick="toggleWish(${p.id})">❤</div>
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<a class="button">Buy Now</a>
</div>
</div>`;
});
}

function renderWish(){
let g=document.getElementById("wishGrid");
g.innerHTML="";
let list = products.filter(p=>wish.includes(p.id));

list.forEach(p=>{
g.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
}

function toggleWish(id){
if(wish.includes(id)){
wish = wish.filter(x=>x!==id);
}else{
wish.push(id);
}
localStorage.setItem("wish",JSON.stringify(wish));
document.getElementById("wishCount").innerText=wish.length;
render();
}

function filter(cat){
if(cat==="All") render();
else render(products.filter(p=>p.cat===cat));
}

render();
document.getElementById("wishCount").innerText=wish.length;
</script>

</body>
</html>
