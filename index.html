<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* SOCIAL BAR (PREMIUM STYLE) */
.social-bar{
display:flex;
justify-content:space-around;
align-items:center;
padding:10px;
background:#111;
}

.social-bar a{
width:38px;
height:38px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
font-size:18px;
transition:0.2s;
}

.social-bar a:hover{
transform:scale(1.1);
}

.fb{color:#1877F2;}
.insta{color:#E4405F;}
.wa{color:#25D366;}
.tele{color:#229ED9;}
.yt{color:#FF0000;}

/* TOP */
.topbar{
background:#131921;
color:white;
display:flex;
justify-content:space-between;
padding:12px;
align-items:center;
position:sticky;
top:0;
z-index:999;
}

.logo{
color:#ff9900;
font-weight:bold;
}

.top-icons span{
cursor:pointer;
margin-left:10px;
}

/* SEARCH */
.search-box{
padding:10px;
background:#131921;
}

.search-box input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
outline:none;
}

/* AUTO SCROLL */
.slider-wrapper{
overflow:hidden;
background:white;
padding:10px;
}

.slider{
display:flex;
gap:10px;
width:max-content;
animation:scroll 18s linear infinite;
}

.slider:hover{
animation-play-state:paused;
}

.slider div{
min-width:140px;
background:#f4f4f4;
padding:10px;
border-radius:10px;
text-align:center;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* CATEGORY */
.categories{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
background:#1f2a38;
}

.categories div{
color:white;
background:#2f3e50;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

/* CARD */
.card{
background:white;
border-radius:12px;
overflow:hidden;
position:relative;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:10px;
text-align:center;
}

.price{
color:green;
font-weight:bold;
}

/* BUTTONS */
.button{
display:block;
padding:8px;
background:#ff9900;
color:white;
text-decoration:none;
border-radius:6px;
margin-top:6px;
cursor:pointer;
}

.buy{
background:#28a745;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
cursor:pointer;
font-size:16px;
}

.heart.active{
background:red;
color:white;
}

/* DISCOUNT BADGE */
.discount{
position:absolute;
top:8px;
left:8px;
background:red;
color:white;
padding:5px 8px;
font-size:12px;
border-radius:20px;
font-weight:bold;
}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:white;
display:none;
flex-direction:column;
z-index:9999;
}

.popup-header{
display:flex;
justify-content:space-between;
padding:15px;
background:#131921;
color:white;
}

.popup-content{
padding:10px;
overflow:auto;
}

.popup-item{
display:flex;
gap:10px;
padding:10px;
background:#f2f2f2;
margin-bottom:10px;
border-radius:10px;
align-items:center;
}

.popup-item img{
width:70px;
height:70px;
object-fit:cover;
}

.popup-item button{
margin-left:auto;
padding:5px 10px;
border:none;
background:red;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- SOCIAL -->
<div class="social-bar">
<a class="fb"><i class="fa-brands fa-facebook-f"></i></a>
<a class="insta"><i class="fa-brands fa-instagram"></i></a>
<a class="wa"><i class="fa-brands fa-whatsapp"></i></a>
<a class="tele"><i class="fa-brands fa-telegram"></i></a>
<a class="yt"><i class="fa-brands fa-youtube"></i></a>
</div>

<!-- TOP -->
<div class="topbar">
<div class="logo">Krishnalatha Deals</div>
<div class="top-icons">
<span onclick="openPopup('wishlist')">❤️ <span id="wishCount">0</span></span>
<span onclick="openPopup('cart')">🛒 <span id="cartCount">0</span></span>
</div>
</div>

<!-- SEARCH -->
<div class="search-box">
<input id="search" placeholder="Search products...">
</div>

<!-- AUTO SCROLL -->
<div class="slider-wrapper">
<div class="slider">
<div>🔥 Deals</div>
<div>⚡ Fast Delivery</div>
<div>💰 Best Price</div>
<div>🆕 New</div>
<div>🏆 Top Rated</div>
<div>📦 Free Delivery</div>
</div>
</div>

<!-- CATEGORY -->
<div class="categories">
<div onclick="filter('All')">All</div>
<div onclick="filter('Kitchen')">Kitchen</div>
<div onclick="filter('Fashion')">Fashion</div>
<div onclick="filter('Electronics')">Electronics</div>
<div onclick="filter('Home')">Home</div>
</div>

<!-- GRID -->
<div class="container" id="grid"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-header">
<div id="popupTitle">List</div>
<button onclick="closePopup()">Close</button>
</div>
<div class="popup-content" id="popupContent"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg",cat:"Kitchen"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg",cat:"Home"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg",cat:"Fashion"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg",cat:"Electronics"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg",cat:"Fashion"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg",cat:"Home"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg",cat:"Electronics"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg",cat:"Electronics"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg",cat:"Home"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg",cat:"Electronics"}
];

let wish=[];
let cart=[];

/* RENDER */
function render(data){
let g=document.getElementById("grid");
g.innerHTML="";

data.forEach((p)=>{

let liked = wish.find(x=>x.name===p.name) ? "active" : "";
let discount = Math.round(((p.old - p.price)/p.old)*100);

g.innerHTML+=`
<div class="card">

<div class="discount">${discount}% OFF</div>

<div class="heart ${liked}" onclick="toggleWish('${p.name}')">❤</div>

<img src="${p.img}">

<div class="card-content">
<h3>${p.name}</h3>

<div class="price">
₹${p.price} <small style="text-decoration:line-through;color:gray;">₹${p.old}</small>
</div>

<a class="button" onclick="addCart('${p.name}')">Add to Cart</a>
<a class="button buy" onclick="buyNow('${p.name}')">Buy Now</a>

</div>
</div>`;
});
}

/* FILTER */
function filter(cat){
if(cat==="All") render(products);
else render(products.filter(p=>p.cat===cat));
}

/* WISHLIST */
function toggleWish(name){
let p = products.find(x=>x.name===name);
let i = wish.findIndex(x=>x.name===name);

if(i>-1) wish.splice(i,1);
else wish.push(p);

document.getElementById("wishCount").innerText=wish.length;
render(products);
}

/* CART */
function addCart(name){
let p = products.find(x=>x.name===name);
if(!cart.find(x=>x.name===name)) cart.push(p);
document.getElementById("cartCount").innerText=cart.length;
}

/* BUY */
function buyNow(name){
alert("Buy Now clicked for " + name);
}

/* POPUP */
function openPopup(type){
let box=document.getElementById("popup");
let content=document.getElementById("popupContent");
let title=document.getElementById("popupTitle");

box.style.display="flex";

let list = type==="wishlist" ? wish : cart;

title.innerText = type==="wishlist" ? "Wishlist" : "Cart";

content.innerHTML = list.map(p=>`
<div class="popup-item">
<img src="${p.img}">
<div>
<b>${p.name}</b><br>
₹${p.price}
</div>
<button onclick="${type==='wishlist'?'removeWish':'removeCart'}('${p.name}')">Remove</button>
</div>
`).join("");
}

/* REMOVE CART */
function removeCart(name){
cart = cart.filter(x=>x.name!==name);
document.getElementById("cartCount").innerText=cart.length;
openPopup("cart");
}

/* REMOVE WISHLIST */
function removeWish(name){
wish = wish.filter(x=>x.name!==name);
document.getElementById("wishCount").innerText=wish.length;
openPopup("wishlist");
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
let v=this.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(v)));
});

render(products);
document.getElementById("wishCount").innerText=wish.length;
document.getElementById("cartCount").innerText=cart.length;

</script>

</body>
</html>
