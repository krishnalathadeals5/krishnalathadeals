<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f6fa;
}

/* TOP BAR */
.topbar{
    background:#131921;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    color:#ff9900;
    font-weight:bold;
    font-size:18px;
}

.wish-icon{
    cursor:pointer;
    font-size:18px;
}

/* SOCIAL BAR */
.social{
    display:flex;
    justify-content:space-around;
    padding:8px;
    background:white;
    font-size:13px;
}

.social div{
    padding:5px 10px;
    border-radius:20px;
    cursor:pointer;
}

/* CATEGORY SCROLL */
.categories{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    background:#1f2a38;
    scroll-behavior:smooth;
}

.categories div{
    color:white;
    background:#2f3e50;
    padding:6px 12px;
    border-radius:20px;
    white-space:nowrap;
    cursor:pointer;
}

/* TRENDING SLIDER */
.slider{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    background:white;
}

.slider .mini{
    min-width:140px;
    background:#fff;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-align:center;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
    padding:12px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-content{
    padding:10px;
    text-align:center;
}

.price{
    color:green;
    font-weight:bold;
}

/* BUTTON */
.button{
    display:block;
    background:#ff9900;
    color:white;
    padding:8px;
    border-radius:6px;
    text-decoration:none;
    margin-top:6px;
}

/* HEART */
.heart{
    position:absolute;
    top:8px;
    right:8px;
    background:white;
    border-radius:50%;
    padding:4px 6px;
    cursor:pointer;
    font-size:16px;
    color:#999;
}

.heart.active{
    color:red;
}

/* WISHLIST MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index:2000;
}

.modal-content{
    background:white;
    margin:50px auto;
    padding:15px;
    width:90%;
    max-width:400px;
    border-radius:10px;
}

.close{
    float:right;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
    <div class="logo">Krishnalatha Deals</div>
    <div class="wish-icon" onclick="openWish()">❤️ <span id="wishCount">0</span></div>
</div>

<!-- SOCIAL -->
<div class="social">
    <div style="background:#ff0000;color:white;">YouTube</div>
    <div style="background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);color:white;">Instagram</div>
    <div style="background:#25D366;color:white;">WhatsApp</div>
    <div style="background:#0088cc;color:white;">Telegram</div>
</div>

<!-- TRENDING -->
<div class="slider">
    <div class="mini">🔥 Trending</div>
    <div class="mini">⚡ Fast Deals</div>
    <div class="mini">💰 Best Price</div>
    <div class="mini">🆕 New</div>
    <div class="mini">🏆 Top Rated</div>
</div>

<!-- CATEGORIES -->
<div class="categories" id="catScroll">
    <div onclick="filter('All')">All</div>
    <div onclick="filter('Kitchen')">Kitchen</div>
    <div onclick="filter('Fashion')">Fashion</div>
    <div onclick="filter('Electronics')">Electronics</div>
    <div onclick="filter('Home')">Home Decor</div>
</div>

<!-- PRODUCTS -->
<div class="container" id="grid"></div>

<!-- WISHLIST MODAL -->
<div class="modal" id="wishModal">
    <div class="modal-content">
        <span class="close" onclick="closeWish()">✖</span>
        <h3>Your Wishlist</h3>
        <div id="wishList"></div>
    </div>
</div>

<script>
const products = [
{name:"Kitchen Box",price:999,img:"images/storage.jpg",cat:"Kitchen",link:"#"},
{name:"Towel Set",price:299,img:"images/towel.jpg",cat:"Home",link:"#"},
{name:"Shoes",price:1499,img:"images/shoes.jpg",cat:"Fashion",link:"#"},
{name:"Watch",price:1999,img:"images/watch.jpg",cat:"Electronics",link:"#"},
{name:"Bag",price:899,img:"images/bag.jpg",cat:"Fashion",link:"#"},
{name:"Diya",price:199,img:"images/diya.jpg",cat:"Home",link:"#"},
{name:"Laptop",price:45999,img:"images/laptop.jpg",cat:"Electronics",link:"#"},
{name:"Mobile",price:14999,img:"images/mobile.jpg",cat:"Electronics",link:"#"},
{name:"Plant",price:299,img:"images/plant.jpg",cat:"Home",link:"#"},
{name:"Headphones",price:1299,img:"images/headphones.jpg",cat:"Electronics",link:"#"}
];

let wishlist = [];

function render(data){
let g = document.getElementById("grid");
g.innerHTML="";

data.forEach((p,i)=>{
g.innerHTML+=`
<div class="card">
<div class="heart" onclick="toggleWish(${i},this)">❤</div>
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<a class="button" href="${p.link}" target="_blank">Buy Now</a>
</div>
</div>`;
});
}

function filter(cat){
if(cat==="All") render(products);
else render(products.filter(p=>p.cat===cat));
}

/* WISHLIST TOGGLE */
function toggleWish(i,el){
let item = products[i];

let index = wishlist.findIndex(p=>p.name===item.name);

if(index === -1){
wishlist.push(item);
el.classList.add("active");
} else {
wishlist.splice(index,1);
el.classList.remove("active");
}

document.getElementById("wishCount").innerText = wishlist.length;
}

/* OPEN WISHLIST */
function openWish(){
let box = document.getElementById("wishList");
box.innerHTML="";

wishlist.forEach(p=>{
box.innerHTML += `
<p>✔ ${p.name} - ₹${p.price}</p>
`;
});

document.getElementById("wishModal").style.display="block";
}

function closeWish(){
document.getElementById("wishModal").style.display="none";
}

render(products);
</script>

</body>
</html>
