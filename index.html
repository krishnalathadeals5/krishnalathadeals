<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.topbar{
background:linear-gradient(90deg,#131921,#1f2a38);
color:white;
display:flex;
justify-content:space-between;
padding:14px;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:22px;
font-weight:800;
color:#ffb84d;
}

.top-icons span{
margin-left:12px;
cursor:pointer;
font-weight:bold;
}

/* SEARCH */
.search-box{
padding:10px;
background:#131921;
}
.search-box input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
outline:none;
}

/* SCROLL FIX */
.scroll-wrapper{
overflow:hidden;
background:white;
padding:10px 0;
}

.scroll-track{
display:flex;
gap:20px;
width:max-content;
animation:scroll 15s linear infinite;
}

.scroll-wrapper:hover .scroll-track{
animation-play-state:paused;
}

.scroll-item{
min-width:160px;
background:#f4f4f4;
padding:8px;
border-radius:20px;
text-align:center;
font-weight:bold;
font-size:13px;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
cursor:pointer;
position:relative;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:10px;
text-align:center;
}

.price{
color:green;
font-weight:bold;
}

/* BADGE */
.discount{
position:absolute;
top:8px;
left:8px;
background:red;
color:white;
padding:5px 8px;
font-size:12px;
border-radius:20px;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:6px;
cursor:pointer;
}
.heart.active{
background:red;
color:white;
}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:white;
display:none;
flex-direction:column;
z-index:9999;
}

.popup-header{
display:flex;
justify-content:space-between;
padding:15px;
background:#131921;
color:white;
}

.popup-content{
padding:10px;
overflow:auto;
}

/* CART ITEM */
.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
background:#f2f2f2;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

.qty button{
padding:5px 10px;
}

/* DETAIL FIX (IMPORTANT) */
.detail{
position:fixed;
inset:0;
background:white;
display:none;
flex-direction:column;
z-index:10000;
overflow:hidden;
}

.detail-header{
background:#131921;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.close-btn{
width:34px;
height:34px;
border-radius:50%;
border:none;
background:#ff4d4d;
color:white;
font-size:18px;
cursor:pointer;
}

.detail-body{
padding:12px;
overflow-y:auto;
flex:1;
}

.detail-body img{
width:100%;
max-height:300px;
object-fit:contain;
border-radius:10px;
}

.action-btn{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
}

.buy{background:#28a745;color:white;}
.cart{background:#ff9900;color:white;}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">Krishnalatha Deals</div>
<div class="top-icons">
<span>❤️ <span id="wishCount">0</span></span>
<span>🛒 <span id="cartCount">0</span></span>
</div>
</div>

<div class="search-box">
<input id="search" placeholder="Search products...">
</div>

<!-- SCROLL -->
<div class="scroll-wrapper">
<div class="scroll-track">
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast Delivery</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New Arrivals</div>
<div class="scroll-item">🏆 Top Rated</div>
<div class="scroll-item">📦 Free Delivery</div>
</div>
</div>

<div class="container" id="grid"></div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-header">
<div>Cart / Wishlist</div>
<button onclick="closePopup()">Close</button>
</div>
<div class="popup-content" id="popupContent"></div>
</div>

<!-- DETAIL -->
<div class="detail" id="detailBox">
<div class="detail-header">
<div>Product Details</div>
<button class="close-btn" onclick="closeDetail()">×</button>
</div>
<div class="detail-body" id="detailBody"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg"}
];

let wish = [];
let cart = [];

/* RENDER */
function render(){
let g=document.getElementById("grid");
g.innerHTML="";

products.forEach(p=>{
g.innerHTML+=`
<div class="card" onclick="openDetail('${p.name}')">
<div class="discount">${Math.round((p.old-p.price)/p.old*100)}% OFF</div>
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
}

/* DETAIL */
function openDetail(name){
let p=products.find(x=>x.name===name);

if(!p) return;

document.getElementById("detailBody").innerHTML=`
<img src="${p.img}">
<h2>${p.name}</h2>
<p style="color:green;font-size:18px;">₹${p.price}</p>

<button class="action-btn buy" onclick="buyNow('${p.name}')">Buy Now</button>
<button class="action-btn cart" onclick="addCart('${p.name}')">Add to Cart</button>
`;

document.getElementById("detailBox").style.display="flex";
}

function closeDetail(){
document.getElementById("detailBox").style.display="none";
}

/* CART */
function addCart(name){
let p=products.find(x=>x.name===name);
let item=cart.find(x=>x.name===name);

if(item) item.qty++;
else cart.push({...p,qty:1});

updateCounts();
}

/* BUY */
function buyNow(name){
alert("Buying "+name);
}

/* POPUP */
function openPopup(type){

let box=document.getElementById("popup");
let content=document.getElementById("popupContent");

box.style.display="flex";

if(type==="cart"){
let total=0;

content.innerHTML=cart.map(p=>{
total+=p.price*p.qty;
return `
<div class="cart-item">
<div>
<b>${p.name}</b><br>
₹${p.price} x ${p.qty}
</div>
<div>
<button onclick="changeQty('${p.name}',-1)">-</button>
${p.qty}
<button onclick="changeQty('${p.name}',1)">+</button>
</div>
<button onclick="removeCart('${p.name}')">X</button>
</div>
`;
}).join("");

content.innerHTML+=`<div><b>Total: ₹${total}</b></div>`;
}

if(type==="wishlist"){
content.innerHTML="<p>Wishlist feature simple version</p>";
}
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* CART FUNCTIONS */
function changeQty(name,val){
let item=cart.find(x=>x.name===name);
if(!item) return;

item.qty+=val;
if(item.qty<=0){
cart=cart.filter(x=>x.name!==name);
}

updateCounts();
openPopup("cart");
}

function removeCart(name){
cart=cart.filter(x=>x.name!==name);
updateCounts();
openPopup("cart");
}

/* COUNT */
function updateCounts(){
document.getElementById("cartCount").innerText=cart.length;
document.getElementById("wishCount").innerText=wish.length;
}

render();
updateCounts();

</script>

</body>
</html>
