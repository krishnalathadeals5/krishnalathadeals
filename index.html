<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* HEADER */
.header{
background:#131921;
color:white;
display:flex;
align-items:center;
padding:10px 15px;
position:sticky;
top:0;
z-index:1000;
}

.logo{
color:#ffb84d;
font-weight:bold;
white-space:nowrap;
}

/* SEARCH */
.search{
flex:1;
display:flex;
margin-left:10px;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:4px 0 0 4px;
outline:none;
}

.search button{
background:#febd69;
border:none;
padding:10px;
cursor:pointer;
}

/* ================= HERO (SMOOTH CONTINUOUS + HOVER PAUSE) ================= */
.hero-wrap{
background:#0f1115;
overflow:hidden;
padding:10px 0;
}

.hero-track{
display:flex;
gap:25px;
width:max-content;
animation:scroll 16s linear infinite;
}

.hero-item{
color:white;
font-weight:bold;
padding:6px 14px;
background:rgba(255,255,255,0.08);
border-radius:20px;
white-space:nowrap;
font-size:13px;
}

.hero-wrap:hover .hero-track{
animation-play-state:paused;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* ================= BRAND LOGOS FIXED ================= */
.brand-bar{
display:flex;
gap:12px;
overflow-x:auto;
padding:12px;
background:white;
}

.brand{
flex:0 0 auto;
display:flex;
align-items:center;
gap:8px;
padding:10px 14px;
border-radius:25px;
background:#f5f5f5;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.brand img{
width:24px;
height:24px;
object-fit:contain;
}

.brand:hover{
transform:scale(1.08);
}

/* ================= PRODUCT GRID ================= */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:contain;
}

.price{color:green;font-weight:bold;}
.old{color:gray;text-decoration:line-through;font-size:12px;}
.best{color:red;font-weight:bold;margin-top:10px;}

/* ================= COMPARISON BOX ================= */
.compare-box{
margin:15px;
padding:15px;
background:white;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">Krishnalatha Deals</div>

<div class="search">
<input id="search" placeholder="Search product (e.g. Samsung S23 FE)">
<button onclick="compare()">🔍</button>
</div>
</div>

<!-- 🔥 HERO CONTINUOUS SCROLL -->
<div class="hero-wrap">
<div class="hero-track">

<div class="hero-item">🔥 Amazon Mega Offers</div>
<div class="hero-item">⚡ Flipkart Big Savings</div>
<div class="hero-item">💄 Myntra Fashion Sale</div>
<div class="hero-item">🛍 Meesho Lowest Price</div>
<div class="hero-item">🏷 Ajio Premium Deals</div>

<div class="hero-item">🔥 Amazon Mega Offers</div>
<div class="hero-item">⚡ Flipkart Big Savings</div>
<div class="hero-item">💄 Myntra Fashion Sale</div>
<div class="hero-item">🛍 Meesho Lowest Price</div>
<div class="hero-item">🏷 Ajio Premium Deals</div>

</div>
</div>

<!-- BRAND LOGOS (FIXED) -->
<div class="brand-bar">

<div class="brand">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
Amazon
</div>

<div class="brand">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png">
Flipkart
</div>

<div class="brand">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968894.png">
Myntra
</div>

<div class="brand">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png">
Meesho
</div>

<div class="brand">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
Ajio
</div>

</div>

<!-- COMPARISON RESULT -->
<div id="result" class="compare-box"></div>

<script>

/* PRODUCT DATABASE */
const data={
"samsung s23 fe":{
amazon:39999,
flipkart:38999,
myntra:0,
meesho:37999,
ajio:0
},
"watch":{
amazon:1999,
flipkart:1899,
myntra:2100,
meesho:1750,
ajio:0
},
"backpack":{
amazon:999,
flipkart:899,
myntra:0,
meesho:799,
ajio:0
}
};

/* COMPARISON */
function compare(){

let key=document.getElementById("search").value.toLowerCase();
let d=data[key];

let box=document.getElementById("result");

if(!d){
box.innerHTML="No product found";
return;
}

let arr=[];
let html="<h3>Price Comparison</h3>";

function add(n,p){
if(p>0){
arr.push({n,p});
html+=`<p>${n}: <span class='price'>₹${p}</span></p>`;
}
}

add("Amazon",d.amazon);
add("Flipkart",d.flipkart);
add("Myntra",d.myntra);
add("Meesho",d.meesho);
add("Ajio",d.ajio);

let best=arr.reduce((a,b)=>a.p<b.p?a:b);

html+=`<div class="best">🏆 Best Price: ${best.n} ₹${best.p}</div>`;

box.innerHTML=html;
}

</script>

</body>
</html>
