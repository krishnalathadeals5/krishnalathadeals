<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
background:#131921;
color:white;
padding:14px;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:22px;
font-weight:800;
color:#ffb84d;
}

.top-icons span{
margin-left:12px;
cursor:pointer;
font-weight:bold;
}

/* SEARCH */
.search-box{
    flex:1;
    margin:0 20px;
    background:#131921;
    display:flex;
    align-items:center;
    position:relative;
}
.search-box input{
width:calc(100% - 60px);
height:50px;
padding:0 20px;
font-size:18px;
border:none;
border-radius:12px 0 0 12px;
margin-right:-1px;
outline:none;
}
  .search-btn{
    height:50px;
    width:60px;
    border:none;
    background:#febd69;
    cursor:pointer;
    display:flex;
    align-items:center;

    position:absolute;
    right:0;
    top:0;
    border-radius:0 12px 12px 0;
}
/* 🔥 FIXED SMOOTH SCROLL */
.scroll-wrapper{
overflow:hidden;
background:white;
padding:10px 0;
}

.scroll-track{
display:flex;
gap:15px;
width:max-content;
animation:scroll 18s linear infinite;
will-change:transform;
}

@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

.scroll-item{
min-width:140px;
background:#eee;
padding:8px;
border-radius:20px;
text-align:center;
font-size:13px;
font-weight:bold;
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
justify-content:center;
gap:15px;
padding:15px;
}



.card img{
width:100%;
height:220px;
object-fit:contain;
background:#fff;
display:block;
}
    
@media(max-width:768px){

.container{
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card img{
height:110px;
}

}
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,.1);
position:relative;
cursor:pointer;

display:flex;
flex-direction:column;
height:100%;

}
.card-content{
padding:10px;
text-align:center;
min-height:90px;
}

.price{
    color:#008000;
    font-size:28px;
    font-weight:700;
    margin-top:10px;
}
.old-price{
    color:#888;
    text-decoration:line-through;
    font-size:14px;
    margin-top:4px;
}
/* HEART */
    .discount-badge{
position:absolute;
top:10px;
left:10px;
background:#ff4d4f;
color:white;
padding:5px 10px;
border-radius:6px;
font-size:13px;
font-weight:bold;
z-index:10;
}
.heart{
    position:absolute;
    top:15px;
    right:15px;
    width:40px;
    height:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:white;
    border-radius:50%;
    cursor:pointer;
    z-index:10;
}
.heart.active{
background:red;
color:white;
}

/* DETAIL */
.detail{
position:fixed;
inset:0;
background:white;
display:none;
z-index:9999;
overflow:auto;
}

.detail-header{
display:flex;
justify-content:space-between;
padding:12px;
background:#131921;
color:white;
}

.close{
background:red;
border:none;
color:white;
width:32px;
height:32px;
border-radius:50%;
cursor:pointer;
}

/* AMAZON STYLE DETAIL */
.detail-body{
display:flex;
gap:20px;
padding:15px;
flex-wrap:wrap;
}

.detail-body img{
width:320px;
max-width:100%;
border-radius:10px;
}

.detail-info{
flex:1;
min-width:250px;
}

.old{
text-decoration:line-through;
color:gray;
margin-left:8px;
}

.discount{
color:green;
font-weight:bold;
margin:10px 0;
}

/* BUTTONS */
.btn{
display:inline-block;
padding:10px 14px;
margin-top:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.buy{background:#28a745;color:white;}
.cart{background:#ff9900;color:white;margin-left:10px;}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:white;
display:none;
z-index:10000;
flex-direction:column;
}

.popup-header{
display:flex;
justify-content:space-between;
padding:15px;
background:#131921;
color:white;
}

.popup-content{
padding:10px;
overflow:auto;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#f2f2f2;
margin-bottom:10px;
border-radius:10px;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:5px 10px;
border-radius:6px;
cursor:pointer;
}
/* MOBILE FIX */
@media (max-width: 768px) {

    .topbar{
    flex-wrap:wrap;
    padding:10px;
    align-items:center;
}

    .logo{
    width:auto;
    font-size:20px;
    order:1;
}

    .search-box{
    width:100%;
    margin-top:10px;
    margin-left:0;
    margin-right:0;
    order:99;
    flex-basis:100%;
}

 .top-icons{
    width:auto;
    margin-left:auto;
    order:2;
}   
}
 .category-bar{
    display:flex;
    gap:8px;
    overflow-x:auto;
    white-space:nowrap;
    padding:10px;
    background:white;
}
.category-bar::-webkit-scrollbar{
    display:none;
}

.category-bar{
    -ms-overflow-style:none;
    scrollbar-width:none;
}
.category-bar button{
    flex-shrink:0;
    padding:8px 12px;
    border:1px solid #ddd;
    border-radius:8px;
    background:white;
    cursor:pointer;
}   
    .deal-btn{
    background:#ff9900;
    color:white;
    border:none;
    padding:10px 16px;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    margin-top:8px;
    width:85%;
}

.deal-btn:hover{
    background:#e68a00;
}
</style>
</head>

<body>



<div class="topbar">

   <div class="logo">
      Krishnalatha Deals
   </div>

   <div class="search-box">
    <input id="search"
        placeholder="Search products..."
        oninput="searchProducts()">

    <button class="search-btn">
    <svg width="24" height="24" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="7" stroke="#333" stroke-width="2" fill="none"/>
        <line x1="16" y1="16" x2="22" y2="22" stroke="#333" stroke-width="2"/>
    </svg>
</button>
</div>

   <div class="top-icons">
      <span onclick="openPopup('wishlist')">❤️
      <span id="wishCount">0</span></span>

      <span onclick="openPopup('cart')">🛒
      <span id="cartCount">0</span></span>
   </div>

</div>

<!-- SCROLL -->
<div class="scroll-wrapper">
<div class="scroll-track">
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New</div>
<div class="scroll-item">🏆 Top</div>
<div class="scroll-item">📦 Free</div>

<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New</div>
<div class="scroll-item">🏆 Top</div>
<div class="scroll-item">📦 Free</div>
</div>
</div>

<div class="category-bar">
<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Today Deals')">Today's Deals</button>
<button onclick="filterCategory('Mobiles')">Mobiles & Accessories</button>
<button onclick="filterCategory('Electronics')">Electronics</button>
<button onclick="filterCategory('Computers')">Computers & Office</button>
<button onclick="filterCategory('Home & Kitchen')">Home & Kitchen</button>
<button onclick="filterCategory('Fashion')">Fashion</button>
<button onclick="filterCategory('Beauty')">Beauty & Personal Care</button>
<button onclick="filterCategory('Grocery')">Grocery</button>
<button onclick="filterCategory('Bags & Luggage')">Bags & Luggage</button>
<button onclick="filterCategory('Baby & Kids')">Baby & Kids</button>
<button onclick="filterCategory('Toys & Games')">Toys & Games</button>
<button onclick="filterCategory('Books & Stationery')">Books & Stationery</button>
<button onclick="filterCategory('Health & Fitness')">Health & Fitness</button>
<button onclick="filterCategory('Sports & Outdoors')">Sports & Outdoors</button>
<button onclick="filterCategory('Automotive')">Automotive</button>
<button onclick="filterCategory('Pet Supplies')">Pet Supplies</button>
<button onclick="filterCategory('Pooja & Spiritual')">Pooja & Spiritual</button>
<button onclick="filterCategory('Home Decor')">Home Decor</button>
</div>

<div class="container" id="grid"></div>

<!-- DETAIL -->
<div class="detail" id="detailBox">
<div class="detail-header">
<div>Product</div>
<button class="close" onclick="closeDetail()">×</button>
</div>

<div class="detail-body" id="detailBody"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-header">
<div id="popupTitle">List</div>
<button onclick="closePopup()">Close</button>
</div>
<div class="popup-content" id="popupContent"></div>
</div>

<script>

let products = [];

async function loadProducts(){

const url="https://script.google.com/macros/s/AKfycbzYhxE_0NfstLPwOpFB6e5hiRWW4mLW_YTrMaAJO5XGIyMvsGKvf1QPUCyT9QaNOWfoyw/exec";

try{

const res = await fetch(url);
const data = await res.json();

products = data.map(p=>({
name:p.name,
price:Number(p.price),
old:Number(p.oldPrice),
img:p.image,
link:p.affiliateLink,
category:p.category || "Other"
}));

render();

}catch(err){

console.error(err);

document.getElementById("grid").innerHTML=
"<h2 style='padding:20px'>Unable to load products</h2>";

}
}

let wish = JSON.parse(localStorage.getItem("wish")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function save(){
localStorage.setItem("wish",JSON.stringify(wish));
localStorage.setItem("cart",JSON.stringify(cart));
}

/* RENDER */
function render(list=products){
let g=document.getElementById("grid");
g.innerHTML="";

list.forEach(p=>{
let isW = wish.find(x=>x.name===p.name);

g.innerHTML+=`
<div class="card" onclick="openDetail('${p.name}')">

<div class="heart ${isW?'active':''}"
onclick="event.stopPropagation(); event.preventDefault(); toggleWish('${p.name}'); return false;">❤</div>
<img src="${p.img}">
<div class="discount-badge">
${Math.round(((p.old-p.price)/p.old)*100)}% OFF
</div>
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<div class="old-price">₹${p.old}</div>

<button class="deal-btn">View Deal</button>
</div>
</div>`;
});
}

/* SEARCH */
function searchProducts(){
let v=document.getElementById("search").value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(v)));
}

/* DETAIL */
function openDetail(name){

let p=products.find(x=>x.name===name);
let d=Math.round(((p.old-p.price)/p.old)*100);

document.getElementById("detailBody").innerHTML=`
<img src="${p.img}">
<div class="detail-info">
<h2>${p.name}</h2>

<div>
₹${p.price} <span class="old">₹${p.old}</span>
</div>

<div class="discount">${d}% OFF</div>

<button class="btn buy" onclick="buyNow('${p.name}')">Buy Now</button>
<button class="btn cart" onclick="addCart('${p.name}')">Add to Cart</button>
</div>
`;

document.getElementById("detailBox").style.display="block";
}

function closeDetail(){
document.getElementById("detailBox").style.display="none";
}

/* WISHLIST */
function toggleWish(name){
let i=wish.findIndex(x=>x.name===name);
if(i>-1){
  wish.splice(i,1);
}else{
  let p = products.find(x=>x.name===name);

  wish.push({
    name:p.name,
    img:p.img,
    price:p.price
  });
}
save();
updateCounts();
render();
}

/* CART */
function addCart(name){
let p=products.find(x=>x.name===name);
let item=cart.find(x=>x.name===name);

if(item) item.qty++;
else cart.push({...p,qty:1});

save();
updateCounts();
}
function buyNow(name){

let p=products.find(x=>x.name===name);

if(!p || !p.link){
alert("Affiliate link not available");
return;
}

window.open(p.link,"_blank");

}
/* POPUP */
function openPopup(type){
let c=document.getElementById("popupContent");
document.getElementById("popup").style.display="flex";

if(type==="wishlist"){
  c.innerHTML = wish.length ? wish.map(p=>`
<div class="item" style="display:flex;align-items:center;gap:15px;padding:10px;">

<img src="${p.img}" style="width:80px;height:80px;object-fit:contain;">

<div style="flex:1;">
<div>${p.name}</div>
<div>₹${p.price}</div>
</div>

<button onclick="addCart('${p.name}')">
Add To Cart
</button>

<button class="remove-btn"
onclick="removeWish('${p.name}')">
Remove
</button>

</div>
`).join("") : "Empty";

  return;
}

if(type==="cart"){
let total=0;

c.innerHTML = cart.map(p=>{
total += p.price * p.qty;
return `
<div class="item" style="display:flex;align-items:center;gap:15px;justify-content:space-between;">

<img src="${p.img}" style="width:80px;height:80px;object-fit:contain;">

<div style="flex:1;">
<div>${p.name}</div>
<div>₹${p.price}</div>
</div>

<div>
<button onclick="changeQty('${p.name}',-1)">-</button>
${p.qty}
<button onclick="changeQty('${p.name}',1)">+</button>
</div>

<button class="remove-btn"
onclick="removeCart('${p.name}')">
✕
</button>

</div>`;
}).join("");

c.innerHTML += `<div style="padding:10px;font-weight:bold;">Total: ₹${total}</div>`;
}
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* REMOVE */
function removeWish(name){
wish = wish.filter(x=>x.name!==name);
save();
updateCounts();
openPopup("wishlist");
render();
}

function removeCart(name){
cart = cart.filter(x=>x.name!==name);
save();
updateCounts();
openPopup("cart");
}

/* QTY */
function changeQty(name,val){
let item=cart.find(x=>x.name===name);
if(!item)return;

item.qty += val;
if(item.qty<=0) cart = cart.filter(x=>x.name!==name);

save();
updateCounts();
openPopup("cart");
}

/* COUNTS */
function updateCounts(){
document.getElementById("wishCount").innerText = wish.length;
document.getElementById("cartCount").innerText = cart.length;
}
function filterCategory(category){

if(category==="All"){
render(products);
return;
}

render(products.filter(
p => p.category === category
));

}
loadProducts();
updateCounts();

</script>

</body>
</html>
