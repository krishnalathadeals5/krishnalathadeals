<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f1f3f6;
}

/* 🔥 TOP AMAZON STYLE HEADER */
.header{
background:#131921;
color:white;
display:flex;
align-items:center;
gap:15px;
padding:10px 15px;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-weight:bold;
font-size:18px;
color:#ffb84d;
white-space:nowrap;
}

/* SEARCH BAR */
.search{
flex:1;
display:flex;
}

.search input{
width:100%;
padding:10px;
border:none;
border-radius:4px 0 0 4px;
outline:none;
}

.search button{
background:#febd69;
border:none;
padding:10px 14px;
cursor:pointer;
border-radius:0 4px 4px 0;
}

/* CATEGORY BAR */
.categories{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
background:white;
white-space:nowrap;
}

.cat{
padding:8px 12px;
background:#f5f5f5;
border-radius:20px;
font-size:13px;
cursor:pointer;
}

/* HERO BANNER */
.hero{
background:linear-gradient(90deg,#ff9900,#2874f0);
color:white;
padding:25px;
text-align:center;
font-weight:bold;
}

/* PRODUCT GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:15px;
padding:15px;
}

/* PRODUCT CARD */
.card{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.2s;
cursor:pointer;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:160px;
object-fit:contain;
}

.title{
font-size:14px;
margin:5px 0;
height:35px;
overflow:hidden;
}

.price{
color:#1a8e3e;
font-weight:bold;
}

.old{
text-decoration:line-through;
color:gray;
font-size:12px;
}

.discount{
color:#d32f2f;
font-size:12px;
}

/* BADGE */
.badge{
background:#ff5252;
color:white;
font-size:12px;
padding:3px 6px;
border-radius:4px;
position:absolute;
}

.card-wrap{
position:relative;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

<div class="logo">Krishnalatha Deals</div>

<div class="search">
<input placeholder="Search products...">
<button>🔍</button>
</div>

</div>

<!-- HERO -->
<div class="hero">
🔥 Amazon • Flipkart Style Shopping Experience
</div>

<!-- CATEGORY -->
<div class="categories">
<div class="cat">All</div>
<div class="cat">Mobiles</div>
<div class="cat">Electronics</div>
<div class="cat">Fashion</div>
<div class="cat">Home</div>
<div class="cat">Beauty</div>
<div class="cat">Sports</div>
</div>

<!-- PRODUCT GRID -->
<div class="grid">

<!-- PRODUCT 1 -->
<div class="card-wrap">
<div class="card">
<div class="badge">-45%</div>
<img src="https://m.media-amazon.com/images/I/71geVdy6-OS.jpg">
<div class="title">Samsung Galaxy S23 FE</div>
<div class="price">₹39,999</div>
<div class="old">₹72,999</div>
<div class="discount">Save ₹33,000</div>
</div>
</div>

<!-- PRODUCT 2 -->
<div class="card-wrap">
<div class="card">
<div class="badge">-30%</div>
<img src="https://m.media-amazon.com/images/I/61-r9zOKBCL.jpg">
<div class="title">Noise Smart Watch</div>
<div class="price">₹1,999</div>
<div class="old">₹2,999</div>
<div class="discount">Limited Deal</div>
</div>
</div>

<!-- PRODUCT 3 -->
<div class="card-wrap">
<div class="card">
<div class="badge">-55%</div>
<img src="https://m.media-amazon.com/images/I/61cwywLZR-L.jpg">
<div class="title">Backpack Travel Bag</div>
<div class="price">₹899</div>
<div class="old">₹1,999</div>
<div class="discount">Best Price</div>
</div>
</div>

</div>

</body>
</html>
