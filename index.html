<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.topbar{
display:flex;
justify-content:space-between;
background:#131921;
color:white;
padding:14px;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:22px;
font-weight:800;
color:#ffb84d;
}

.top-icons span{
margin-left:12px;
cursor:pointer;
font-weight:bold;
}

/* SEARCH */
.search-box{
padding:10px;
background:#131921;
}
.search-box input{
width:100%;
padding:10px;
border:none;
border-radius:6px;
}

/* SCROLL */
.scroll-wrapper{
overflow:hidden;
background:white;
padding:10px 0;
}
.scroll-track{
display:flex;
gap:15px;
width:max-content;
animation:scroll 15s linear infinite;
}
.scroll-wrapper:hover .scroll-track{
animation-play-state:paused;
}
.scroll-item{
min-width:140px;
background:#eee;
padding:8px;
border-radius:20px;
text-align:center;
font-weight:bold;
font-size:13px;
}
@keyframes scroll{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* GRID */
.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
position:relative;
cursor:pointer;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-content{
padding:10px;
text-align:center;
}

.price{
color:green;
font-weight:bold;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border-radius:50%;
padding:5px;
cursor:pointer;
}
.heart.active{background:red;color:white;}

/* DETAIL AMAZON STYLE */
.detail{
position:fixed;
inset:0;
background:white;
display:none;
z-index:9999;
overflow:auto;
}

.detail-header{
display:flex;
justify-content:space-between;
padding:12px;
background:#131921;
color:white;
}

.close{
background:red;
border:none;
color:white;
width:35px;
height:35px;
border-radius:50%;
cursor:pointer;
font-size:18px;
}

.detail-body{
display:flex;
flex-wrap:wrap;
gap:20px;
padding:15px;
}

.detail-body img{
width:350px;
max-width:100%;
border-radius:10px;
}

.detail-info{
flex:1;
min-width:250px;
}

.old{
text-decoration:line-through;
color:gray;
margin-left:10px;
}

.discount{
color:green;
font-weight:bold;
margin:10px 0;
}

/* BUTTONS */
.btn{
display:block;
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.buy{background:#28a745;color:white;}
.cart{background:#ff9900;color:white;}

/* POPUP */
.popup{
position:fixed;
inset:0;
background:white;
display:none;
z-index:10000;
flex-direction:column;
}

.popup-header{
display:flex;
justify-content:space-between;
padding:15px;
background:#131921;
color:white;
}

.popup-content{
padding:10px;
overflow:auto;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#f2f2f2;
margin-bottom:10px;
border-radius:10px;
}

.qty button{
padding:5px 10px;
}

.total{
padding:10px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="topbar">
<div class="logo">Krishnalatha Deals</div>
<div class="top-icons">
<span onclick="openPopup('wishlist')">❤️ <span id="wishCount">0</span></span>
<span onclick="openPopup('cart')">🛒 <span id="cartCount">0</span></span>
</div>
</div>

<div class="search-box">
<input id="search" placeholder="Search products..." oninput="searchProducts()">
</div>

<div class="scroll-wrapper">
<div class="scroll-track">
<div class="scroll-item">🔥 Deals</div>
<div class="scroll-item">⚡ Fast</div>
<div class="scroll-item">💰 Best Price</div>
<div class="scroll-item">🆕 New</div>
<div class="scroll-item">🏆 Top</div>
<div class="scroll-item">📦 Free</div>
</div>
</div>

<div class="container" id="grid"></div>

<!-- DETAIL -->
<div class="detail" id="detailBox">
<div class="detail-header">
<div>Product</div>
<button class="close" onclick="closeDetail()">×</button>
</div>
<div class="detail-body" id="detailBody"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-header">
<div id="popupTitle">Cart</div>
<button onclick="closePopup()">Close</button>
</div>
<div class="popup-content" id="popupContent"></div>
</div>

<script>

const products=[
{name:"Kitchen Box",price:999,old:1499,img:"images/storage.jpg"},
{name:"Towel Set",price:299,old:499,img:"images/towel.jpg"},
{name:"Shoes",price:1499,old:1999,img:"images/shoes.jpg"},
{name:"Watch",price:1999,old:2499,img:"images/watch.jpg"},
{name:"Bag",price:899,old:1299,img:"images/bag.jpg"},
{name:"Diya",price:199,old:299,img:"images/diya.jpg"},
{name:"Laptop",price:45999,old:50999,img:"images/laptop.jpg"},
{name:"Mobile",price:14999,old:16999,img:"images/mobile.jpg"},
{name:"Plant",price:299,old:499,img:"images/plant.jpg"},
{name:"Headphones",price:1299,old:1999,img:"images/headphones.jpg"}
];

let wish=[];
let cart=[];

/* RENDER */
function render(list=products){
let g=document.getElementById("grid");
g.innerHTML="";

list.forEach(p=>{
let w = wish.find(x=>x.name===p.name) ? "active" : "";

g.innerHTML+=`
<div class="card" onclick="openDetail('${p.name}')">

<div class="heart ${w}" onclick="event.stopPropagation(); toggleWish('${p.name}')">❤</div>

<img src="${p.img}">

<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
}

/* SEARCH FIX */
function searchProducts(){
let v=document.getElementById("search").value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(v)));
}

/* CLEAR SEARCH ON OPEN */
function clearSearch(){
document.getElementById("search").value="";
render();
}

/* WISHLIST */
function toggleWish(name){
let p=products.find(x=>x.name===name);
let i=wish.findIndex(x=>x.name===name);

if(i>-1) wish.splice(i,1);
else wish.push(p);

updateCounts();
render();
}

/* CART MULTI QTY */
function addCart(name){
let p=products.find(x=>x.name===name);
let item=cart.find(x=>x.name===name);

if(item) item.qty++;
else cart.push({...p,qty:1});

updateCounts();
}

/* DETAIL AMAZON */
function openDetail(name){
clearSearch();

let p=products.find(x=>x.name===name);
let d=Math.round(((p.old-p.price)/p.old)*100);

document.getElementById("detailBody").innerHTML=`
<img src="${p.img}">
<div class="detail-info">
<h2>${p.name}</h2>

<div>
₹${p.price} <span class="old">₹${p.old}</span>
</div>

<div class="discount">${d}% OFF</div>

<button class="btn buy" onclick="buyNow('${p.name}')">Buy Now</button>
<button class="btn cart" onclick="addCart('${p.name}')">Add to Cart</button>
</div>
`;

document.getElementById("detailBox").style.display="block";
}

function closeDetail(){
document.getElementById("detailBox").style.display="none";
}

/* BUY */
function buyNow(name){
alert("Buying " + name);
}

/* POPUP */
function openPopup(type){
let c=document.getElementById("popupContent");
document.getElementById("popup").style.display="flex";

if(type==="wishlist"){
c.innerHTML=wish.map(p=>`
<div class="item">
<div>${p.name}</div>
<button onclick="removeWish('${p.name}')">Remove</button>
</div>`).join("");
}

if(type==="cart"){
let total=0;

c.innerHTML=cart.map(p=>{
total+=p.price*p.qty;
return `
<div class="item">
<div>${p.name} (₹${p.price})</div>

<div class="qty">
<button onclick="changeQty('${p.name}',-1)">-</button>
${p.qty}
<button onclick="changeQty('${p.name}',1)">+</button>
</div>
<button onclick="removeCart('${p.name}')">X</button>
</div>`;
}).join("");

c.innerHTML+=`<div class="total">Total: ₹${total}</div>`;
}
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

/* REMOVE */
function removeWish(n){wish=wish.filter(x=>x.name!==n);updateCounts();}
function removeCart(n){cart=cart.filter(x=>x.name!==n);updateCounts();openPopup('cart');}

/* QTY */
function changeQty(n,v){
let i=cart.find(x=>x.name===n);
if(!i)return;
i.qty+=v;
if(i.qty<=0) cart=cart.filter(x=>x.name!==n);
updateCounts();
openPopup('cart');
}

/* COUNTS */
function updateCounts(){
document.getElementById("wishCount").innerText=wish.length;
document.getElementById("cartCount").innerText=cart.length;
}

render();
updateCounts();

</script>

</body>
</html>
