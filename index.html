<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f6fa;
}

/* TOP BAR */
.topbar{
    background:#131921;
    color:white;
    display:flex;
    justify-content:space-between;
    padding:12px 15px;
    align-items:center;
}

.logo{color:#ff9900;font-weight:bold;cursor:pointer}

/* NAV BAR */
.navbar{
    display:flex;
    gap:10px;
    background:#232f3e;
    padding:10px;
}

.navbar button{
    background:#37475a;
    color:white;
    border:none;
    padding:6px 12px;
    border-radius:20px;
    cursor:pointer;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
    padding:12px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{width:100%;height:150px;object-fit:cover}

.card-content{text-align:center;padding:10px}

.price{color:green;font-weight:bold}

.button{
    display:block;
    padding:8px;
    background:#ff9900;
    color:white;
    text-decoration:none;
    border-radius:6px;
    margin-top:6px;
}

/* HEART */
.heart{
    position:absolute;
    top:8px;
    right:8px;
    background:white;
    border-radius:50%;
    padding:4px 6px;
    cursor:pointer;
    color:#aaa;
}
.heart.active{color:red}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* COMPARE BAR */
.compare-bar{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#111;
    color:white;
    padding:10px;
    display:flex;
    justify-content:space-between;
}
.btn{
    background:#ff9900;
    border:none;
    padding:6px 10px;
    border-radius:5px;
    cursor:pointer;
}

/* COMPARE VIEW */
.compare-box{
    padding:20px;
}
.compare-item{
    background:white;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo" onclick="goHome()">Krishnalatha Deals</div>
    <div onclick="showPage('wishlist')">❤️ <span id="wishCount">0</span></div>
</div>

<!-- NAV -->
<div class="navbar">
    <button onclick="goHome()">Home</button>
    <button onclick="showPage('wishlist')">Wishlist</button>
    <button onclick="showCompare()">Compare</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="container" id="grid"></div>
</div>

<!-- WISHLIST -->
<div id="wishlist" class="page">
    <div class="navbar">
        <button onclick="goHome()">⬅ Back Home</button>
    </div>
    <div class="container" id="wishGrid"></div>
</div>

<!-- COMPARE -->
<div id="comparePage" class="page">
    <div class="navbar">
        <button onclick="goHome()">⬅ Back Home</button>
    </div>
    <div class="compare-box" id="compareBox"></div>
</div>

<!-- BOTTOM -->
<div class="compare-bar">
    <div>Compare: <span id="compareCount">0</span>/2</div>
    <button class="btn" onclick="showCompare()">Open Compare</button>
</div>

<script>

const products = [
{id:1,name:"Kitchen Box",price:999,img:"images/storage.jpg"},
{id:2,name:"Towel",price:299,img:"images/towel.jpg"},
{id:3,name:"Shoes",price:1499,img:"images/shoes.jpg"},
{id:4,name:"Watch",price:1999,img:"images/watch.jpg"},
{id:5,name:"Bag",price:899,img:"images/bag.jpg"},
{id:6,name:"Diya",price:199,img:"images/diya.jpg"},
{id:7,name:"Laptop",price:45999,img:"images/laptop.jpg"},
{id:8,name:"Mobile",price:14999,img:"images/mobile.jpg"},
{id:9,name:"Plant",price:299,img:"images/plant.jpg"},
{id:10,name:"Headphones",price:1299,img:"images/headphones.jpg"}
];

let wish = JSON.parse(localStorage.getItem("wish") || "[]");
let compareList = [];

function goHome(){
showPage("home");
render();
}

function showPage(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
if(p==="wishlist") renderWish();
}

function render(){
let g=document.getElementById("grid");
g.innerHTML="";
products.forEach(p=>{
g.innerHTML+=`
<div class="card">
<div class="heart ${wish.includes(p.id)?'active':''}" onclick="toggleWish(${p.id})">❤</div>
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<a class="button">Buy Now</a>
<button onclick="addCompare(${p.id})">Compare</button>
</div>
</div>`;
});
}

function renderWish(){
let g=document.getElementById("wishGrid");
g.innerHTML="";
products.filter(p=>wish.includes(p.id)).forEach(p=>{
g.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
</div>
</div>`;
});
}

function toggleWish(id){
if(wish.includes(id)){
wish = wish.filter(x=>x!==id);
}else{
wish.push(id);
}
localStorage.setItem("wish",JSON.stringify(wish));
document.getElementById("wishCount").innerText=wish.length;
render();
}

function addCompare(id){
let item = products.find(p=>p.id===id);

if(compareList.length < 2 && !compareList.includes(item)){
compareList.push(item);
document.getElementById("compareCount").innerText=compareList.length;
}
}

function showCompare(){
showPage("comparePage");

let box=document.getElementById("compareBox");
box.innerHTML="";

if(compareList.length<2){
box.innerHTML="Select 2 products to compare";
return;
}

box.innerHTML=`
<div class="compare-item">
<b>${compareList[0].name}</b> - ₹${compareList[0].price}
</div>
<div class="compare-item">
<b>${compareList[1].name}</b> - ₹${compareList[1].price}
</div>`;
}

render();
document.getElementById("wishCount").innerText=wish.length;

</script>

</body>
</html>
