<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishnalatha Deals</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: orange;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .menu {
            background: black;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 14px;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 48%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 10px;
        }

        .price {
            color: green;
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
        }

        button {
            background: orange;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: darkorange;
        }

        @media (max-width: 600px) {
            .card {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Krishnalatha Deals ✅ UPDATED</h1>
    <p>Smart Deals. Better Savings.</p>
</header>

<div class="menu">
    🔥 Today Deals: Kitchen | Beauty | Fashion | Electronics 🔥
</div>

<div class="container">

    <div class="card">
        <img src="images/storage.jpg" alt="Kitchen Storage Box">
        <h2>Kitchen Storage Box</h2>
        <div class="price">₹999</div>
        <button>Buy Now</button>
    </div>

    <div class="card">
        <img src="images/towel.jpg" alt="Towel Set">
        <h2>Towel Set</h2>
        <div class="price">₹299</div>
        <button>Buy Now</button>
    </div>

</div>

</body>
</html>
