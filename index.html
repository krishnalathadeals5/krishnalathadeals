<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f6fa;
}

/* TOP BAR */
.topbar{
    background:#131921;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{color:#ff9900;font-weight:bold}

.top-icons{
    display:flex;
    gap:15px;
    cursor:pointer;
}

/* SOCIAL BAR */
.social{
    display:flex;
    justify-content:space-around;
    padding:8px;
    background:white;
    font-size:13px;
}

/* AUTO SCROLL CATEGORY */
.categories{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    background:#1f2a38;
    scroll-behavior:smooth;
}

.categories div{
    color:white;
    background:#2f3e50;
    padding:6px 12px;
    border-radius:20px;
    white-space:nowrap;
    cursor:pointer;
}

/* TRENDING */
.slider{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    background:white;
}

/* PRODUCTS */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
    padding:12px;
}

.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    position:relative;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    cursor:pointer;
}

.card-content{
    padding:10px;
    text-align:center;
}

.price{color:green;font-weight:bold}

.button{
    display:block;
    padding:8px;
    background:#ff9900;
    color:white;
    border-radius:6px;
    margin-top:6px;
    text-decoration:none;
}

/* HEART */
.heart{
    position:absolute;
    top:8px;
    right:8px;
    background:white;
    border-radius:50%;
    padding:4px 6px;
    cursor:pointer;
}

.heart.active{color:red}

/* ===== CART FIX ===== */
.cart{
    position:fixed;
    right:-350px;
    top:0;
    width:320px;
    height:100%;
    background:white;
    box-shadow:-3px 0 10px rgba(0,0,0,0.2);
    transition:0.3s;
    z-index:2000;
    padding:10px;
    overflow:auto;
}

.cart.open{right:0}

.cart-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:1px solid #ddd;
    padding-bottom:10px;
}

.close{
    cursor:pointer;
    font-size:18px;
}

.cart-item{
    display:flex;
    gap:10px;
    align-items:center;
    padding:8px 0;
    border-bottom:1px solid #eee;
}

.cart-item img{
    width:50px;
    height:50px;
    object-fit:cover;
    border-radius:6px;
}

.total{
    font-weight:bold;
    margin-top:10px;
}

/* WISHLIST */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    z-index:3000;
}

.modal-content{
    background:white;
    width:90%;
    max-width:400px;
    margin:60px auto;
    padding:15px;
    border-radius:10px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
    <div class="logo">Krishnalatha Deals</div>
    <div class="top-icons">
        <div onclick="openCart()">🛒 <span id="cartCount">0</span></div>
        <div onclick="openWish()">❤️ <span id="wishCount">0</span></div>
    </div>
</div>

<!-- SOCIAL -->
<div class="social">
    <div style="background:red;color:white;padding:4px 8px;border-radius:20px;">YouTube</div>
    <div style="background:purple;color:white;padding:4px 8px;border-radius:20px;">Instagram</div>
    <div style="background:#25D366;color:white;padding:4px 8px;border-radius:20px;">WhatsApp</div>
    <div style="background:#0088cc;color:white;padding:4px 8px;border-radius:20px;">Telegram</div>
</div>

<!-- CATEGORY -->
<div class="categories" id="catBox"></div>

<!-- PRODUCTS -->
<div class="container" id="grid"></div>

<!-- CART -->
<div class="cart" id="cart">
    <div class="cart-header">
        <h3>Cart</h3>
        <span class="close" onclick="openCart()">✖</span>
    </div>
    <div id="cartItems"></div>
    <div class="total">Total: ₹<span id="total">0</span></div>
</div>

<!-- WISHLIST -->
<div class="modal" id="wishModal">
    <div class="modal-content">
        <h3>Wishlist</h3>
        <div id="wishList"></div>
        <button onclick="closeWish()">Close</button>
    </div>
</div>

<script>

const products = [
{name:"Kitchen Box",price:999,img:"images/storage.jpg",cat:"Kitchen"},
{name:"Towel",price:299,img:"images/towel.jpg",cat:"Home"},
{name:"Shoes",price:1499,img:"images/shoes.jpg",cat:"Fashion"},
{name:"Watch",price:1999,img:"images/watch.jpg",cat:"Electronics"},
{name:"Bag",price:899,img:"images/bag.jpg",cat:"Fashion"},
{name:"Diya",price:199,img:"images/diya.jpg",cat:"Home"},
{name:"Laptop",price:45999,img:"images/laptop.jpg",cat:"Electronics"},
{name:"Mobile",price:14999,img:"images/mobile.jpg",cat:"Electronics"}
];

let wishlist=[];
let cart=[];

/* categories */
const cats=["All","Kitchen","Fashion","Electronics","Home"];
document.getElementById("catBox").innerHTML =
cats.map(c=>`<div onclick="filter('${c}')">${c}</div>`).join("");

function render(data){
let g=document.getElementById("grid");
g.innerHTML="";

data.forEach((p,i)=>{
g.innerHTML+=`
<div class="card">
<div class="heart" onclick="wishToggle(${i},this)">❤</div>
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<div class="button" onclick="addCart(${i})">Add Cart</div>
</div>
</div>`;
});
}

/* FILTER */
function filter(c){
if(c==="All") render(products);
else render(products.filter(p=>p.cat===c));
}

/* WISHLIST FIX */
function wishToggle(i,el){
let item=products[i];
let index=wishlist.findIndex(x=>x.name===item.name);

if(index===-1){
wishlist.push(item);
el.classList.add("active");
}else{
wishlist.splice(index,1);
el.classList.remove("active");
}
document.getElementById("wishCount").innerText=wishlist.length;
}

/* CART FIX WITH IMAGE */
function addCart(i){
cart.push(products[i]);
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText=cart.length;

let box=document.getElementById("cartItems");
let total=0;
box.innerHTML="";

cart.forEach(p=>{
total+=p.price;
box.innerHTML+=`
<div class="cart-item">
<img src="${p.img}">
<div>
<div>${p.name}</div>
<div>₹${p.price}</div>
</div>
</div>`;
});

document.getElementById("total").innerText=total;
}

function openCart(){
document.getElementById("cart").classList.toggle("open");
}

/* WISHLIST */
function openWish(){
let box=document.getElementById("wishList");
box.innerHTML="";

wishlist.forEach(p=>{
box.innerHTML+=`<p>${p.name} - ₹${p.price}</p>`;
});

document.getElementById("wishModal").style.display="block";
}

function closeWish(){
document.getElementById("wishModal").style.display="none";
}

render(products);
</script>

</body>
</html>
