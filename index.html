<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals - Pro Store</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f6fa;
}

/* TOP BAR */
.topbar{
    background:#131921;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 15px;
    position:sticky;
    top:0;
    z-index:1000;
}

.logo{
    color:#ff9900;
    font-weight:bold;
}

.top-icons{
    display:flex;
    gap:12px;
    cursor:pointer;
}

/* SEARCH */
.search-box{
    padding:10px;
    background:#131921;
}

.search-box input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    outline:none;
}

/* AUTO CATEGORY SCROLL */
.categories{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    background:#1f2a38;
    white-space:nowrap;
}

.categories div{
    color:white;
    background:#2f3e50;
    padding:6px 12px;
    border-radius:20px;
    cursor:pointer;
}

/* TRENDING */
.slider{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:10px;
    background:white;
}

.slider .mini{
    min-width:140px;
    background:#fff;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    text-align:center;
}

/* GRID */
.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:12px;
    padding:12px;
}

/* CARD */
.card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    position:relative;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    cursor:pointer;
}

.card-content{
    padding:10px;
    text-align:center;
}

.price{
    color:green;
    font-weight:bold;
}

/* BUTTONS */
.button{
    display:block;
    padding:8px;
    background:#ff9900;
    color:white;
    border-radius:6px;
    text-decoration:none;
    margin-top:6px;
    cursor:pointer;
}

/* HEART */
.heart{
    position:absolute;
    top:8px;
    right:8px;
    background:white;
    border-radius:50%;
    padding:4px 6px;
    cursor:pointer;
    color:#aaa;
}

.heart.active{
    color:red;
}

/* CART PANEL */
.cart{
    position:fixed;
    right:-320px;
    top:0;
    width:300px;
    height:100%;
    background:white;
    box-shadow:-2px 0 10px rgba(0,0,0,0.2);
    transition:0.3s;
    padding:10px;
    z-index:2000;
}

.cart.open{
    right:0;
}

.cart-item{
    border-bottom:1px solid #ddd;
    padding:6px 0;
    font-size:14px;
}

.total{
    font-weight:bold;
    margin-top:10px;
}

/* POPUP */
.popup{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    z-index:3000;
}

.popup-content{
    background:white;
    width:90%;
    max-width:400px;
    margin:60px auto;
    padding:15px;
    border-radius:10px;
}

.close{
    float:right;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
    <div class="logo">Krishnalatha Deals</div>
    <div class="top-icons">
        <div onclick="openCart()">🛒 <span id="cartCount">0</span></div>
        <div onclick="openWishlist()">❤️ <span id="wishCount">0</span></div>
    </div>
</div>

<!-- SEARCH -->
<div class="search-box">
    <input id="search" placeholder="Search products...">
</div>

<!-- TRENDING -->
<div class="slider">
    <div class="mini">🔥 Trending</div>
    <div class="mini">⚡ Fast Deals</div>
    <div class="mini">💰 Best Price</div>
    <div class="mini">🆕 New</div>
</div>

<!-- CATEGORIES -->
<div class="categories" id="catBox"></div>

<!-- PRODUCTS -->
<div class="container" id="grid"></div>

<!-- CART -->
<div class="cart" id="cart">
    <h3>Cart</h3>
    <div id="cartItems"></div>
    <div class="total">Total: ₹<span id="total">0</span></div>
</div>

<!-- PRODUCT POPUP -->
<div class="popup" id="popup">
    <div class="popup-content">
        <span class="close" onclick="closePopup()">✖</span>
        <div id="popupData"></div>
    </div>
</div>

<script>

const products = [
{name:"Kitchen Box",price:999,img:"images/storage.jpg",cat:"Kitchen",link:"#"},
{name:"Towel Set",price:299,img:"images/towel.jpg",cat:"Home",link:"#"},
{name:"Shoes",price:1499,img:"images/shoes.jpg",cat:"Fashion",link:"#"},
{name:"Watch",price:1999,img:"images/watch.jpg",cat:"Electronics",link:"#"},
{name:"Bag",price:899,img:"images/bag.jpg",cat:"Fashion",link:"#"},
{name:"Diya",price:199,img:"images/diya.jpg",cat:"Home",link:"#"},
{name:"Laptop",price:45999,img:"images/laptop.jpg",cat:"Electronics",link:"#"},
{name:"Mobile",price:14999,img:"images/mobile.jpg",cat:"Electronics",link:"#"}
];

let wishlist = [];
let cart = [];

/* CATEGORIES */
const cats = ["All","Kitchen","Fashion","Electronics","Home"];
document.getElementById("catBox").innerHTML =
cats.map(c=>`<div onclick="filter('${c}')">${c}</div>`).join("");

/* RENDER */
function render(data){
let g = document.getElementById("grid");
g.innerHTML="";

data.forEach((p,i)=>{
g.innerHTML+=`
<div class="card">
<div class="heart" onclick="toggleWish(${i},this)">❤</div>
<img src="${p.img}" onclick="openPopup(${i})">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">₹${p.price}</div>
<div class="button" onclick="addCart(${i})">Add to Cart</div>
<a class="button" href="${p.link}" target="_blank">Buy Now</a>
</div>
</div>`;
});
}

/* FILTER */
function filter(c){
if(c==="All") render(products);
else render(products.filter(p=>p.cat===c));
}

/* WISHLIST */
function toggleWish(i,el){
let item = products[i];
let exists = wishlist.find(x=>x.name===item.name);

if(exists){
wishlist = wishlist.filter(x=>x.name!==item.name);
el.classList.remove("active");
} else {
wishlist.push(item);
el.classList.add("active");
}

document.getElementById("wishCount").innerText = wishlist.length;
}

/* CART */
function addCart(i){
cart.push(products[i]);
updateCart();
}

function updateCart(){
document.getElementById("cartCount").innerText = cart.length;

let box = document.getElementById("cartItems");
let total = 0;

box.innerHTML = "";

cart.forEach(p=>{
total += p.price;
box.innerHTML += `<div class="cart-item">${p.name} - ₹${p.price}</div>`;
});

document.getElementById("total").innerText = total;
}

function openCart(){
document.getElementById("cart").classList.toggle("open");
}

/* POPUP */
function openPopup(i){
let p = products[i];
document.getElementById("popupData").innerHTML=`
<h3>${p.name}</h3>
<img src="${p.img}" style="width:100%">
<p>Price: ₹${p.price}</p>
<a href="${p.link}" class="button">Buy Now</a>
`;
document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

render(products);

</script>

</body>
</html>
