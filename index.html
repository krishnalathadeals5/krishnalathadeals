<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f6fa;
}

/* HEADER */
.header{
background:#111;
color:#fff;
padding:15px;
text-align:center;
font-weight:bold;
}

/* BRAND GRID */
.brand-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:12px;
padding:15px;
}

.brand{
background:#fff;
border-radius:12px;
padding:12px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
font-weight:bold;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.brand img{
width:40px;
height:40px;
margin-bottom:5px;
}

.amazon{border-top:4px solid #ff9900;}
.flipkart{border-top:4px solid #2874f0;}
.myntra{border-top:4px solid #ff3f6c;}
.meesho{border-top:4px solid #9c27b0;}
.ajio{border-top:4px solid #000;}
.reliance{border-top:4px solid #e60000;}

/* SEARCH BOX */
.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.search-box button{
margin-top:10px;
padding:10px 15px;
background:#111;
color:#fff;
border:none;
border-radius:6px;
cursor:pointer;
}

/* RESULT */
.compare-card{
background:#fff;
margin:15px;
padding:15px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.compare-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:10px;
margin-top:10px;
}

.price-box{
background:#f7f7f7;
padding:10px;
border-radius:8px;
text-align:center;
}

.price{
color:green;
font-weight:bold;
margin-top:5px;
}

/* BEST PRICE */
.best{
background:#d4f8d4 !important;
border:2px solid #2ecc71;
}

/* SOCIAL ICONS */
.social-float{
position:fixed;
right:10px;
bottom:20px;
display:flex;
flex-direction:column;
gap:10px;
z-index:9999;
}

.social{
width:45px;
height:45px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
animation:float 2s infinite ease-in-out;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

.social img{width:22px;height:22px;}

.wa{background:#25D366;}
.tg{background:#0088cc;}
.yt{background:#FF0000;}
.ig{background:#E4405F;}
.fb{background:#1877F2;}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-6px);}
}
</style>
</head>

<body>

<div class="header">
Krishnalatha Deals
</div>

<!-- BRANDS -->
<div class="brand-grid">

<div class="brand amazon">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968870.png">
Amazon
</div>

<div class="brand flipkart">
<img src="https://cdn-icons-png.flaticon.com/512/732/732084.png">
Flipkart
</div>

<div class="brand myntra">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968894.png">
Myntra
</div>

<div class="brand meesho">
<img src="https://cdn-icons-png.flaticon.com/512/5968/5968764.png">
Meesho
</div>

<div class="brand ajio">
<img src="https://cdn-icons-png.flaticon.com/512/732/732200.png">
Ajio
</div>

<div class="brand reliance">
<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
Reliance
</div>

</div>

<!-- SEARCH -->
<div class="search-box">
<input id="search" placeholder="Search product (e.g. Samsung S23 FE)">
<button onclick="searchProduct()">Compare Prices</button>
</div>

<!-- RESULT -->
<div id="result"></div>

<!-- SOCIAL -->
<div class="social-float">

<a class="social wa" href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"></a>
<a class="social tg" href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111646.png"></a>
<a class="social yt" href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
<a class="social ig" href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
<a class="social fb" href="#"><img src="https://cdn-icons-png.flaticon.com/512/733/733547.png"></a>

</div>

<script>

/* PRODUCT DATABASE */
const db = {
"Samsung S23 FE":{
amazon:39999,
flipkart:38999,
myntra:null,
meesho:37999,
ajio:null,
reliance:38500
},
"Mens Jacket":{
amazon:4479,
flipkart:4399,
myntra:4599,
meesho:4200,
ajio:4700,
reliance:4350
},
"Shoes":{
amazon:1999,
flipkart:1899,
myntra:2099,
meesho:1750,
ajio:2100,
reliance:1850
},
"Backpack":{
amazon:879,
flipkart:849,
myntra:999,
meesho:799,
ajio:950,
reliance:820
}
};

/* SEARCH FUNCTION */
function searchProduct(){

let name = document.getElementById("search").value.trim();
let data = db[name];

let box = document.getElementById("result");

if(!data){
box.innerHTML = "<div class='compare-card'>❌ No product found</div>";
return;
}

let prices = [];

let html = `<div class="compare-card"><h3>${name}</h3><div class="compare-grid">`;

function addBrand(b, price, color, icon){

if(price){
prices.push({brand:b,price:price});

html += `
<div class="price-box">
<img src="${icon}" width="20"><br>
<b>${b}</b>
<div class="price">₹${price}</div>
</div>`;
}
}

addBrand("Amazon",data.amazon);
addBrand("Flipkart",data.flipkart);
addBrand("Myntra",data.myntra);
addBrand("Meesho",data.meesho);
addBrand("Ajio",data.ajio);
addBrand("Reliance",data.reliance);

html += "</div>";

if(prices.length){

let best = prices.reduce((a,b)=>a.price<b.price?a:b);

html += `<h3 style="color:green;margin-top:10px;">
🏆 Best Price: ${best.brand} ₹${best.price}
</h3>`;
}

html += "</div>";

box.innerHTML = html;
}

</script>

</body>
</html>
