<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KrishnaLatha Deals</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #2874f0;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.search-box {
  width: 90%;
  padding: 10px;
  margin: 10px auto;
  display: block;
  border-radius: 5px;
  border: none;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 8px;
  position: relative;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: contain; /* FIX IMAGE ISSUE */
}

.name {
  font-size: 14px;
  margin: 5px 0;
}

.price {
  color: green;
  font-weight: bold;
}

.old {
  text-decoration: line-through;
  color: gray;
  font-size: 12px;
}

.btn {
  background: #ff9f00;
  border: none;
  padding: 8px;
  width: 100%;
  margin-top: 5px;
  cursor: pointer;
  border-radius: 5px;
}

.wishlist {
  position: absolute;
  top: 5px;
  right: 5px;
  cursor: pointer;
  font-size: 18px;
}

.top-icons {
  position: fixed;
  top: 10px;
  right: 10px;
}

.top-icons span {
  margin-left: 10px;
  cursor: pointer;
  font-size: 18px;
}
</style>
</head>

<body>

<header>KrishnaLatha Deals</header>

<div class="top-icons">
  🛒 <span id="cartCount">0</span>
  ❤️ <span id="wishCount">0</span>
</div>

<input type="text" id="search" class="search-box" placeholder="Search products...">

<div class="products" id="products"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzYhxE_0NfstLPwOpFB6e5hiRWW4mLW_YTrMaAJO5XGIyMvsGKvf1QPUCyT9QaNOWfoyw/exec";

let allProducts = [];
let cart = [];
let wishlist = [];

async function loadProducts() {
  const res = await fetch(API);
  const data = await res.json();

  // CLEAN DATA (fix WhatsApp / sheet issues)
  allProducts = data.map(p => ({
    ...p,
    name: p.name.trim(),
    image: p.image.trim()
  }));

  displayProducts(allProducts);
}

function displayProducts(products) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach(p => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="wishlist" onclick="addWishlist(${p.id})">❤️</div>
      <img src="${p.image}" onclick="scrollToProduct(this)">
      <div class="name">${p.name}</div>
      <div class="price">₹${p.price} <span class="old">₹${p.oldPrice}</span></div>
      <button class="btn" onclick="addCart(${p.id})">Add to Cart</button>
      <button class="btn" onclick="buyNow('${p.affiliateLink}')">Buy Now</button>
    `;

    container.appendChild(div);
  });
}

function addCart(id) {
  cart.push(id);
  document.getElementById("cartCount").innerText = cart.length;
}

function addWishlist(id) {
  wishlist.push(id);
  document.getElementById("wishCount").innerText = wishlist.length;
}

function buyNow(link) {
  window.open(link, "_blank");
}

function scrollToProduct(el) {
  el.scrollIntoView({ behavior: "smooth", block: "center" });
}

document.getElementById("search").addEventListener("input", function() {
  const value = this.value.toLowerCase();

  const filtered = allProducts.filter(p =>
    p.name.toLowerCase().includes(value)
  );

  displayProducts(filtered);

  window.scrollTo({ top: 0, behavior: "smooth" });
});

loadProducts();
</script>

</body>
</html>
