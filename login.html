<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
background:#ff9800;
color:white;
border:none;
cursor:pointer;
}

#status{
margin-top:15px;
}
</style>
</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

<p id="status"></p>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBnp4vvQwB8e2ZedPXmhScChGu-VX_xJYA",
authDomain: "krishnalatha-deals.firebaseapp.com",
projectId: "krishnalatha-deals",
storageBucket: "krishnalatha-deals.firebasestorage.app",
messagingSenderId: "390458780701",
appId: "1:390458780701:web:7f6638bbd480861b12eaf4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function () {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

try {

await signInWithEmailAndPassword(
auth,
email,
password
);

document.getElementById("status").innerHTML =
"Login Successful";

window.location.href = "admin.html";

} catch(error) {

document.getElementById("status").innerHTML =
error.message;

}

};

</script>
</body>
</html>
