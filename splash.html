<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at center, #063d2c, #021d16 70%);
  font-family:'Segoe UI', sans-serif;
  color:#d4af37;
  overflow:hidden;
}

/* MAIN CARD */
.container{
  width:320px;
  padding:30px 20px;
  text-align:center;
  border-radius:18px;
  position:relative;
  border:1.5px solid rgba(212,175,55,0.6);
  background: rgba(0,40,30,0.6);
  box-shadow:0 0 40px rgba(212,175,55,0.25);
}

/* GOLD CORNER DESIGN */
.container::before,
.container::after{
  content:"";
  position:absolute;
  width:60px;
  height:60px;
  border:2px solid #d4af37;
}

.container::before{
  top:-10px;
  left:-10px;
  border-right:none;
  border-bottom:none;
}

.container::after{
  bottom:-10px;
  right:-10px;
  border-left:none;
  border-top:none;
}

/* LOGO */
.logo{
  width:120px;
  height:120px;
  margin:auto;
  border-radius:50%;
  border:2px solid #d4af37;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:42px;
  font-weight:bold;
  position:relative;
  box-shadow:0 0 25px rgba(212,175,55,0.6);
  animation: glow 2s infinite alternate;
}

/* CROWN */
.logo::before{
  content:"👑";
  position:absolute;
  top:-20px;
  font-size:20px;
}

/* GLOW */
@keyframes glow{
  from{ box-shadow:0 0 10px #d4af37; }
  to{ box-shadow:0 0 35px #ffd700; }
}

/* TITLE */
h1{
  margin-top:20px;
  font-size:22px;
  letter-spacing:2px;
}

/* TAGLINE */
.tagline{
  margin-top:10px;
  font-size:13px;
  color:#ddd;
  line-height:1.5;
}

/* DIVIDER */
.divider{
  width:80%;
  height:2px;
  margin:15px auto;
  background:linear-gradient(to right, transparent, #d4af37, transparent);
}

/* LOADING BAR */
.loading-bar{
  width:100%;
  height:6px;
  background:rgba(255,255,255,0.15);
  border-radius:10px;
  overflow:hidden;
  margin-top:20px;
}

.loading-fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, #d4af37, #ffd700);
  animation:load 3s linear forwards;
}

@keyframes load{
  from{ width:0%; }
  to{ width:100%; }
}

/* TEXT */
.loading-text{
  margin-top:10px;
  font-size:13px;
  color:#ccc;
}

/* FLOATING SPARKLES */
.sparkle{
  position:absolute;
  width:4px;
  height:4px;
  background:#ffd700;
  border-radius:50%;
  opacity:0.8;
  animation: floatUp linear infinite;
}

@keyframes floatUp{
  from{
    transform:translateY(0);
    opacity:1;
  }
  to{
    transform:translateY(-600px);
    opacity:0;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">KD</div>

  <h1>KRISHNALATHA DEALS</h1>

  <div class="tagline">
    BEST DEALS, BIG SAVINGS!<br>
    One Destination. Endless Savings.
  </div>

  <div class="divider"></div>

  <div class="loading-bar">
    <div class="loading-fill"></div>
  </div>

  <div class="loading-text">Loading...</div>

</div>

<script>
// SPARKLES
for(let i=0;i<30;i++){
  let s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"%";
  s.style.bottom="-10px";
  s.style.animationDuration=(3+Math.random()*4)+"s";
  document.body.appendChild(s);
}

// AUTO REDIRECT
setTimeout(()=>{
  window.location.href="home.html"; // change if needed
},3000);
</script>

</body>
</html>
