<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Krishnalatha Deals</title>

<style>
body{
  margin:0;
  background: radial-gradient(circle at center, #0b3d2e, #021d16);
  font-family: 'Segoe UI', sans-serif;
  color:#d4af37;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* GOLD BORDER */
.container{
  width:90%;
  max-width:400px;
  padding:25px;
  border:2px solid #d4af37;
  border-radius:20px;
  text-align:center;
  position:relative;
  box-shadow:0 0 25px rgba(212,175,55,0.5);
}

/* LOGO */
.logo{
  font-size:55px;
  font-weight:bold;
  border:3px solid #d4af37;
  border-radius:50%;
  width:120px;
  height:120px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 20px #d4af37;
  animation: glow 2s infinite alternate;
}

@keyframes glow{
  from{ box-shadow:0 0 10px #d4af37; }
  to{ box-shadow:0 0 40px #ffd700; }
}

/* TITLE */
h1{
  margin-top:20px;
  font-size:28px;
  letter-spacing:2px;
}

/* TAGLINE */
.tagline{
  margin-top:10px;
  font-size:14px;
  color:#eee;
}

/* ICON ROW */
.icons{
  margin:20px 0;
  display:flex;
  justify-content:space-around;
  font-size:22px;
}

.icons span{
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
}

/* LOADING */
.loader{
  margin-top:25px;
}

.spinner{
  border:5px solid rgba(255,255,255,0.2);
  border-top:5px solid #d4af37;
  border-radius:50%;
  width:45px;
  height:45px;
  margin:auto;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  100%{ transform:rotate(360deg); }
}

.loading-text{
  margin-top:15px;
  font-size:14px;
  color:#ccc;
}

/* PARTICLES */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:#ffd700;
  border-radius:50%;
  animation: float 6s infinite;
}

@keyframes float{
  0%{ transform:translateY(0); opacity:1;}
  100%{ transform:translateY(-600px); opacity:0;}
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">KD</div>

  <h1>KRISHNALATHA DEALS</h1>

  <div class="tagline">
    BEST DEALS, BIG SAVINGS! <br>
    One Destination. Endless Savings.
  </div>

  <div class="icons">
    <span>🛍️</span>
    <span>🏷️</span>
    <span>🛒</span>
    <span>🎁</span>
  </div>

  <div class="loader">
    <div class="spinner"></div>
    <div class="loading-text">Loading Best Deals...</div>
  </div>

</div>

<!-- PARTICLES SCRIPT -->
<script>
for(let i=0;i<25;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.top=Math.random()*100+"%";
  p.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(p);
}

// AUTO REDIRECT (3 sec)
setTimeout(()=>{
  window.location.href="home.html"; // change if needed
},3000);
</script>

</body>
</html>
