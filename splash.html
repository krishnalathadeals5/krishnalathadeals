<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle, #063d27, #021a12);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* MAIN BOX */
.container{
  text-align:center;
  padding:40px 30px;
  border-radius:20px;
  border:2px solid gold;
  width:320px;
  color:white;
  position:relative;
  z-index:2;

  box-shadow: 
    0 0 40px rgba(255,215,0,0.6),
    0 0 80px rgba(0,255,150,0.2),
    inset 0 0 20px rgba(255,215,0,0.2);

  animation: zoomIn 0.8s ease;
}

/* LOGO */
.logo{
  font-size:36px;
  font-weight:bold;
  color:gold;
  border:2px solid gold;
  border-radius:50%;
  width:80px;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 15px;
  box-shadow:0 0 15px gold;
}

/* TEXT */
.title{
  font-size:20px;
  color:gold;
  margin-bottom:10px;
  font-weight:bold;
}

.subtitle{
  font-size:13px;
  color:#ddd;
  margin-bottom:20px;
}

/* PROGRESS */
.progress{
  width:100%;
  height:10px;
  background:#222;
  border-radius:20px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(to right, gold, orange);
  animation: load 3s ease forwards;
  box-shadow:0 0 10px gold;
}

/* ANIMATION */
@keyframes zoomIn{
  from{transform:scale(0.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

@keyframes load{
  to{width:100%;}
}

/* 🎆 CRACKERS (PURE CSS - ALWAYS WORKS) */
.cracker{
  position:absolute;
  bottom:0;
  width:6px;
  height:150px;
  background:linear-gradient(gold, transparent);
  opacity:0;
}

.left{
  left:10%;
  animation: shoot 2s infinite;
}

.right{
  right:10%;
  animation: shoot 2s infinite 1s;
}

@keyframes shoot{
  0%{
    transform:translateY(0);
    opacity:1;
  }
  100%{
    transform:translateY(-500px);
    opacity:0;
  }
}

/* ✨ GOLD RAIN (NO JS) */
.rain{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  overflow:hidden;
  z-index:1;
}

.rain span{
  position:absolute;
  width:4px;
  height:15px;
  background:gold;
  opacity:0.8;
  animation: fall linear infinite;
}

.rain span:nth-child(1){left:5%; animation-duration:3s;}
.rain span:nth-child(2){left:15%; animation-duration:4s;}
.rain span:nth-child(3){left:25%; animation-duration:5s;}
.rain span:nth-child(4){left:35%; animation-duration:3.5s;}
.rain span:nth-child(5){left:45%; animation-duration:4.5s;}
.rain span:nth-child(6){left:55%; animation-duration:3.2s;}
.rain span:nth-child(7){left:65%; animation-duration:4.2s;}
.rain span:nth-child(8){left:75%; animation-duration:5.2s;}
.rain span:nth-child(9){left:85%; animation-duration:3.8s;}
.rain span:nth-child(10){left:95%; animation-duration:4.8s;}

@keyframes fall{
  0%{top:-20px;}
  100%{top:100vh;}
}

</style>
</head>

<body>

<!-- GOLD RAIN -->
<div class="rain">
  <span></span><span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span><span></span>
</div>

<!-- CRACKERS -->
<div class="cracker left"></div>
<div class="cracker right"></div>

<!-- MAIN -->
<div class="container">
  <div class="logo">KD</div>

  <div class="title">KRISHNALATHA DEALS</div>

  <div class="subtitle">
    Best Deals, Big Savings!<br>
    One Destination. Endless Savings.
  </div>

  <div class="progress">
    <div class="progress-bar"></div>
  </div>

  <p style="color:#ccc;">Loading...</p>
</div>

</body>
</html>
