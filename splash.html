<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle, #063d27, #021a12);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* PARTICLES LAYER */
#particles{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:1;
}

/* MAIN BOX */
.container{
  text-align:center;
  padding:40px 30px;
  border-radius:20px;
  border:2px solid gold;
  width:320px;
  color:white;
  position:relative;
  z-index:2;

  box-shadow: 
    0 0 40px rgba(255,215,0,0.6),
    0 0 80px rgba(0,255,150,0.2),
    inset 0 0 20px rgba(255,215,0,0.2);

  animation: zoomIn 0.8s ease;
}

/* LOGO */
.logo{
  font-size:36px;
  font-weight:bold;
  color:gold;
  border:2px solid gold;
  border-radius:50%;
  width:80px;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 15px;
  box-shadow:0 0 15px gold;
}

/* TEXT */
.title{
  font-size:20px;
  color:gold;
  margin-bottom:10px;
  font-weight:bold;
}

.subtitle{
  font-size:13px;
  color:#ddd;
  margin-bottom:20px;
}

/* PROGRESS */
.progress{
  width:100%;
  height:10px;
  background:#222;
  border-radius:20px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(to right, gold, orange);
  animation: load 3s ease forwards;
  box-shadow:0 0 10px gold;
}

/* ANIMATION */
@keyframes zoomIn{
  from{transform:scale(0.8);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

@keyframes load{
  to{width:100%;}
}

/* 🎆 CRACKERS (VISIBLE NOW) */
.cracker{
  position:absolute;
  bottom:0;
  width:6px;
  height:120px;
  background:linear-gradient(gold, transparent);
  z-index:3;
}

.left-cracker{
  left:8%;
  animation: shoot 1.5s infinite;
}

.right-cracker{
  right:8%;
  animation: shoot 1.5s infinite 0.7s;
}

@keyframes shoot{
  0%{
    transform:translateY(0);
    opacity:1;
  }
  100%{
    transform:translateY(-400px);
    opacity:0;
  }
}

/* ✨ FALLING PARTICLES */
.spark{
  position:absolute;
  width:6px;
  height:6px;
  background:gold;
  border-radius:50%;
  top:-10px;
  opacity:0.8;
  animation: fall linear infinite;
}

@keyframes fall{
  to{
    transform:translateY(110vh);
  }
}

</style>
</head>

<body>

<!-- PARTICLES -->
<div id="particles"></div>

<!-- CRACKERS -->
<div class="cracker left-cracker"></div>
<div class="cracker right-cracker"></div>

<!-- MAIN BOX -->
<div class="container">
  <div class="logo">KD</div>

  <div class="title">KRISHNALATHA DEALS</div>

  <div class="subtitle">
    Best Deals, Big Savings!<br>
    One Destination. Endless Savings.
  </div>

  <div class="progress">
    <div class="progress-bar"></div>
  </div>

  <p style="color:#ccc;">Loading...</p>
</div>

<!-- SCRIPT -->
<script>
const container = document.getElementById("particles");

for(let i=0;i<60;i++){
  let s=document.createElement("div");
  s.className="spark";
  s.style.left=Math.random()*100+"%";
  s.style.animationDuration=(3 + Math.random()*3)+"s";
  s.style.opacity=Math.random();
  container.appendChild(s);
}
</script>

</body>
</html>
