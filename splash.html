<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #063a26, #031f14);
    font-family: Arial;
    overflow: hidden;
}

/* CENTER CARD */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 350px;
    padding: 30px;
    text-align: center;
    border: 2px solid gold;
    border-radius: 20px;
    color: gold;
    box-shadow: 0 0 40px rgba(255,215,0,0.4);
    z-index: 2;
}

/* LOGO */
.logo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid gold;
    margin: auto;
    line-height: 100px;
    font-size: 40px;
    font-weight: bold;
    box-shadow: 0 0 20px gold;
}

/* TEXT */
h1 { margin: 20px 0 10px; }
p { font-size: 14px; }

/* LOADER */
.loader {
    width: 100%;
    height: 8px;
    background: #333;
    border-radius: 10px;
    margin-top: 20px;
    overflow: hidden;
}
.loader span {
    display: block;
    height: 100%;
    width: 0%;
    background: gold;
    animation: load 3s linear forwards;
}
@keyframes load {
    100% { width: 100%; }
}

/* PARTICLES (falling) */
.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: gold;
    border-radius: 50%;
    opacity: 0.8;
    animation: fall linear infinite;
}
@keyframes fall {
    from {
        transform: translateY(-100px);
        opacity: 1;
    }
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}

/* CRACKERS (side bursts) */
.cracker {
    position: absolute;
    width: 4px;
    height: 20px;
    background: gold;
    animation: shoot 1s linear infinite;
}
@keyframes shoot {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-200px);
        opacity: 0;
    }
}

.left { left: 5%; bottom: 0; }
.right { right: 5%; bottom: 0; }

</style>
</head>

<body>

<!-- PARTICLES -->
<script>
for (let i = 0; i < 40; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(p);
}
</script>

<!-- CRACKERS -->
<script>
function createCracker(side) {
    let c = document.createElement("div");
    c.className = "cracker " + side;
    c.style.left = side === "left" ? "5%" : "95%";
    c.style.animationDuration = (0.8 + Math.random()) + "s";
    document.body.appendChild(c);

    setTimeout(() => c.remove(), 1000);
}

setInterval(() => createCracker("left"), 500);
setInterval(() => createCracker("right"), 500);
</script>

<!-- CARD -->
<div class="card">
    <div class="logo">KD</div>

    <h1>KRISHNALATHA DEALS</h1>

    <p>BEST DEALS, BIG SAVINGS!<br>
    One Destination. Endless Savings.</p>

    <div class="loader">
        <span></span>
    </div>

    <p>Loading...</p>
</div>

<!-- REDIRECT -->
<script>
setTimeout(() => {
    window.location.href = "welcome.html";
}, 3500);
</script>

</body>
</html>
