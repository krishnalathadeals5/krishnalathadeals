<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Krishnalatha Deals - Premium Splash</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:"Segoe UI",Arial,sans-serif;

    background:
    radial-gradient(circle at top,#1d8b6b33 0%,transparent 40%),
    linear-gradient(135deg,#020202,#06151f,#083b2e,#000);

    color:#fff;
}

/* Falling Gold Stars */

.star{
    position:absolute;
    width:3px;
    height:3px;
    background:#ffd700;
    border-radius:50%;
    opacity:.8;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-10vh);
    }
    to{
        transform:translateY(110vh);
    }
}

/* Main Card */

.card{

    width:min(92vw,540px);

    padding:45px;

    border-radius:30px;

    border:1px solid rgba(255,215,0,.45);

    background:rgba(255,255,255,.05);

    backdrop-filter:blur(18px);

    text-align:center;

    animation:fadeUp .9s ease;

    box-shadow:
    0 0 25px rgba(212,175,55,.25),
    0 0 60px rgba(255,215,0,.18),
    inset 0 0 18px rgba(255,215,0,.08);

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(35px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* Logo */

.logo{

width:140px;
height:140px;

margin:auto;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:48px;
font-weight:900;

color:#fff;

border:4px solid #d4af37;

background:
radial-gradient(circle,#1b8b67,#063a26 70%);

box-shadow:
0 0 30px rgba(212,175,55,.6);

animation:logoGlow 2s infinite alternate;

}

@keyframes logoGlow{

to{

box-shadow:
0 0 55px rgba(255,215,0,.9);

}

}

/* Heading */

h1{

margin-top:28px;

font-size:40px;

letter-spacing:3px;

font-weight:900;

background:linear-gradient(
180deg,
#fff9cf,
#ffd700,
#d4af37,
#fff4ba
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:
0 1px 0 #fff,
0 2px 4px rgba(0,0,0,.55),
0 0 14px rgba(255,215,0,.5);

}

/* Subtitle */

h2{

margin-top:10px;

font-size:20px;

font-weight:400;

color:#fff4c5;

}

/* Description */

p{

margin:22px 0;

font-size:16px;

line-height:1.7;

color:#dddddd;

}

/* Loading Bar */

.bar{

height:10px;

background:#202020;

border-radius:999px;

overflow:hidden;

}

.fill{

height:100%;

width:0;

border-radius:999px;

background:linear-gradient(
90deg,
#b8860b,
#ffd700,
#fff7b3
);

animation:loading 3.5s linear forwards;

}

@keyframes loading{

to{
width:100%;
}

}

/* Loading Text */

.small{

margin-top:18px;

font-size:15px;

color:#eeeeee;

letter-spacing:1px;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%,100%{
opacity:.45;
}

50%{
opacity:1;
}

}

</style>

</head>

<body>

<script>

for(let i=0;i<120;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.animationDuration=(3+Math.random()*6)+"s";

s.style.animationDelay=(Math.random()*4)+"s";

document.body.appendChild(s);

}

</script>

<div class="card">

<div class="logo">
KD
</div>

<h1>KRISHNALATHA DEALS</h1>

<h2>Best Deals • Big Savings</h2>

<p>
Preparing your premium shopping experience...
</p>

<div class="bar">

<div class="fill"></div>

</div>

<div class="small">
Loading...
</div>

</div>

<script>

setTimeout(()=>{

document.body.style.transition="opacity .8s";

document.body.style.opacity="0";

setTimeout(()=>{

location.href="welcome.html";

},800);

},3500);

</script>

</body>
</html>
