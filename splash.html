<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #063a26, #02150e);
}

/* CARD */
.card {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 350px;
    padding: 30px;
    text-align: center;
    border-radius: 20px;
    border: 2px solid gold;
    color: gold;
    background: rgba(0,0,0,0.2);
    box-shadow: 0 0 40px rgba(255,215,0,0.5);
    z-index: 5;
}

/* LOGO */
.logo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid gold;
    margin: auto;
    line-height: 100px;
    font-size: 40px;
    font-weight: bold;
    box-shadow: 0 0 20px gold;
}

/* TEXT */
h1 { margin: 20px 0 10px; }
p { font-size: 14px; }

/* LOADER */
.loader {
    width: 100%;
    height: 8px;
    background: #333;
    border-radius: 10px;
    margin-top: 20px;
    overflow: hidden;
}
.loader span {
    display: block;
    height: 100%;
    width: 0%;
    background: gold;
    animation: load 3s linear forwards;
}
@keyframes load {
    100% { width: 100%; }
}

/* PARTICLES */
.particle {
    position: fixed;
    top: -10px;
    width: 6px;
    height: 6px;
    background: gold;
    border-radius: 50%;
    opacity: 0.8;
    pointer-events: none;
    z-index: 1;
    animation: fall linear infinite;
}
@keyframes fall {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(100vh); opacity: 0; }
}

/* CRACKERS */
.cracker {
    position: fixed;
    bottom: 0;
    width: 4px;
    height: 20px;
    background: gold;
    z-index: 2;
    animation: shoot 1s linear forwards;
}
@keyframes shoot {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-250px); opacity: 0; }
}

</style>
</head>

<body>

<!-- CARD -->
<div class="card">
    <div class="logo">KD</div>

    <h1>KRISHNALATHA DEALS</h1>

    <p>
        BEST DEALS, BIG SAVINGS!<br>
        One Destination. Endless Savings.
    </p>

    <div class="loader">
        <span></span>
    </div>

    <p>Loading...</p>
</div>

<!-- PARTICLES SCRIPT -->
<script>
for (let i = 0; i < 50; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (3 + Math.random() * 4) + "s";
    document.body.appendChild(p);
}
</script>

<!-- CRACKERS SCRIPT -->
<script>
function createCracker(side) {
    let c = document.createElement("div");
    c.className = "cracker";

    if (side === "left") {
        c.style.left = "5%";
    } else {
        c.style.left = "95%";
    }

    document.body.appendChild(c);
    setTimeout(() => c.remove(), 1000);
}

setInterval(() => createCracker("left"), 400);
setInterval(() => createCracker("right"), 400);
</script>

<!-- REDIRECT -->
<script>
setTimeout(() => {
    window.location.href = "welcome.html";
}, 3500);
</script>

</body>
</html>
