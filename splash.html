<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body{
  margin:0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at center, #062d1a, #001a10);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

/* CENTER BOX */
.container{
  text-align:center;
  padding:40px 30px;
  border-radius:20px;
  border:2px solid gold;
  width:300px;
  color:white;
  position:relative;

  box-shadow: 
    0 0 40px rgba(212,175,55,0.6),
    0 0 80px rgba(0,255,150,0.15),
    inset 0 0 20px rgba(212,175,55,0.2);

  animation: zoomIn 0.8s ease;
}

/* LOGO */
.logo{
  font-size:40px;
  font-weight:bold;
  color:gold;
  border:2px solid gold;
  border-radius:50%;
  width:80px;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 15px;

  box-shadow:0 0 15px gold;
}

/* TITLE */
.title{
  font-size:22px;
  font-weight:bold;
  color:gold;
  margin-bottom:10px;
  letter-spacing:1px;
}

/* SUBTEXT */
.subtitle{
  font-size:14px;
  color:#ddd;
  margin-bottom:20px;
}

/* PROGRESS BAR */
.progress{
  width:100%;
  height:10px;
  background:#222;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:10px;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(to right, gold, orange);
  border-radius:20px;
  animation: load 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  box-shadow:0 0 10px gold;
}

/* LOADING TEXT */
.loading{
  font-size:14px;
  color:#ccc;
}

/* ZOOM */
@keyframes zoomIn{
  from{
    transform:scale(0.8);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

/* LOADING BAR */
@keyframes load{
  from{width:0%;}
  to{width:100%;}
}

/* 🎉 SIDE CRACKERS */
.cracker{
  position:absolute;
  bottom:-50px;
  width:6px;
  height:120px;
  background:linear-gradient(gold, transparent);
  animation: blast 1.5s infinite ease-out;
}

.cracker.left{
  left:10%;
}

.cracker.right{
  right:10%;
}

@keyframes blast{
  0%{
    transform:translateY(0) scaleY(0.5);
    opacity:1;
  }
  100%{
    transform:translateY(-300px) scaleY(1.5);
    opacity:0;
  }
}

/* ✨ FALLING PARTICLES */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  background:gold;
  border-radius:50%;
  top:-10px;
  animation: fall linear infinite;
  opacity:0.8;
}

@keyframes fall{
  to{
    transform:translateY(100vh);
  }
}

</style>
</head>

<body>

<!-- PARTICLES -->
<script>
for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(3+Math.random()*3)+"s";
  p.style.opacity=Math.random();
  document.body.appendChild(p);
}
</script>

<!-- SIDE CRACKERS -->
<div class="cracker left"></div>
<div class="cracker right"></div>

<!-- MAIN BOX -->
<div class="container">

  <div class="logo">KD</div>

  <div class="title">KRISHNALATHA DEALS</div>

  <div class="subtitle">
    Best Deals, Big Savings!<br>
    One Destination. Endless Savings.
  </div>

  <div class="progress">
    <div class="progress-bar"></div>
  </div>

  <div class="loading">Loading...</div>

</div>

</body>
</html>
