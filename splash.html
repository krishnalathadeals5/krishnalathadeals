<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Krishnalatha Deals | Splash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;
background:radial-gradient(circle at top,#0d6b45,#063a26,#02140d);
font-family:Arial,sans-serif;
color:#f4d06f;
}
body::before{
content:"";position:absolute;inset:0;
background:radial-gradient(circle,rgba(255,215,0,.08),transparent 60%);
animation:pulse 4s infinite;
}
@keyframes pulse{50%{transform:scale(1.1);opacity:.5}}
.card{
position:relative;z-index:2;
width:min(92vw,480px);
padding:40px 30px;
border:2px solid #d4af37;
border-radius:24px;
background:rgba(0,0,0,.25);
backdrop-filter:blur(10px);
text-align:center;
box-shadow:0 0 35px rgba(212,175,55,.35);
animation:fade 1.2s ease;
}
@keyframes fade{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.logo{
width:120px;height:120px;margin:auto;
border-radius:50%;
border:4px solid #d4af37;
display:flex;align-items:center;justify-content:center;
font-size:44px;font-weight:900;
background:linear-gradient(135deg,#0b6b3a,#0f7f45);
box-shadow:0 0 25px rgba(255,215,0,.5);
animation:glow 2s infinite alternate;
}
@keyframes glow{to{box-shadow:0 0 40px rgba(255,215,0,.9)}}
h1{
margin:24px 0 10px;
font-size:36px;
letter-spacing:2px;
text-shadow:0 2px 0 #7a5b00,0 0 18px rgba(255,215,0,.45);
}
.tag{color:#fff6d5;font-size:18px}
.sub{margin:14px 0 22px;color:#e9e9e9;font-size:14px}
.bar{height:10px;background:#1e1e1e;border-radius:999px;overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,#d4af37,#ffd700);animation:load 3.5s linear forwards}
@keyframes load{to{width:100%}}
.loading{margin-top:14px;color:#fff}
.p{position:absolute;width:4px;height:4px;border-radius:50%;background:#ffd700;animation:fall linear infinite}
@keyframes fall{from{transform:translateY(-10vh)}to{transform:translateY(110vh)}}
</style>
</head>
<body>
<div class="card">
<div class="logo">KD</div>
<h1>KRISHNALATHA DEALS</h1>
<div class="tag">Best Deals • Big Savings</div>
<div class="sub">Preparing your premium shopping experience...</div>
<div class="bar"><div class="fill"></div></div>
<div class="loading">Loading...</div>
</div>
<script>
for(let i=0;i<70;i++){
 let d=document.createElement('div');
 d.className='p';
 d.style.left=Math.random()*100+'vw';
 d.style.top='-20px';
 d.style.animationDuration=(3+Math.random()*5)+'s';
 d.style.animationDelay=(Math.random()*4)+'s';
 document.body.appendChild(d);
}
setTimeout(()=>{
 document.body.style.transition='opacity .8s';
 document.body.style.opacity='0';
 setTimeout(()=>location.href='welcome.html',800);
},3500);
</script>
</body>
</html>
