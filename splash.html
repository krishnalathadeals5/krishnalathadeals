<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krishnalatha Deals</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at center, #063a26, #02150e);
}

/* CARD */
.card {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 350px;
    padding: 30px;
    text-align: center;
    border-radius: 20px;
    border: 2px solid gold;
    color: gold;
    background: rgba(0,0,0,0.25);
    box-shadow: 0 0 40px rgba(255,215,0,0.6);
    z-index: 10;
}

/* LOGO */
.logo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid gold;
    margin: auto;
    line-height: 100px;
    font-size: 40px;
    font-weight: bold;
    box-shadow: 0 0 25px gold;
}

/* TEXT */
h1 { margin: 20px 0 10px; }
p { font-size: 14px; }

/* LOADER */
.loader {
    width: 100%;
    height: 8px;
    background: #333;
    border-radius: 10px;
    margin-top: 20px;
    overflow: hidden;
}
.loader span {
    display: block;
    height: 100%;
    width: 0%;
    background: gold;
    animation: load 3s linear forwards;
}
@keyframes load {
    100% { width: 100%; }
}

/* PARTICLES (FALLING) */
.particle {
    position: fixed;
    top: -10px;
    width: 6px;
    height: 6px;
    background: gold;
    border-radius: 50%;
    opacity: 0.8;
    pointer-events: none;
    z-index: 1;
    animation: fall linear infinite;
}
@keyframes fall {
    to {
        transform: translateY(100vh);
        opacity: 0;
    }
}

/* FIREWORK EXPLOSION */
.spark {
    position: fixed;
    width: 4px;
    height: 4px;
    background: gold;
    border-radius: 50%;
    pointer-events: none;
    z-index: 2;
    animation: explode 800ms ease-out forwards;
}

@keyframes explode {
    from {
        transform: translate(0,0);
        opacity: 1;
    }
    to {
        transform: translate(var(--x), var(--y));
        opacity: 0;
    }
}

</style>
</head>

<body>

<!-- CARD -->
<div class="card">
    <div class="logo">KD</div>

    <h1>KRISHNALATHA DEALS</h1>

    <p>
        BEST DEALS, BIG SAVINGS!<br>
        One Destination. Endless Savings.
    </p>

    <div class="loader">
        <span></span>
    </div>

    <p>Loading...</p>
</div>

<!-- PARTICLES SCRIPT -->
<script>
for (let i = 0; i < 60; i++) {
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (3 + Math.random() * 5) + "s";
    document.body.appendChild(p);
}
</script>

<!-- FIREWORK SCRIPT -->
<script>
function createFirework(x, y) {
    for (let i = 0; i < 25; i++) {
        let s = document.createElement("div");
        s.className = "spark";

        let angle = Math.random() * 2 * Math.PI;
        let radius = Math.random() * 120;

        s.style.left = x + "px";
        s.style.top = y + "px";

        s.style.setProperty("--x", Math.cos(angle) * radius + "px");
        s.style.setProperty("--y", Math.sin(angle) * radius + "px");

        document.body.appendChild(s);

        setTimeout(() => s.remove(), 800);
    }
}

// Random explosions
setInterval(() => {
    let x = Math.random() * window.innerWidth;
    let y = Math.random() * (window.innerHeight / 2);
    createFirework(x, y);
}, 500);
</script>

<!-- REDIRECT -->
<script>
setTimeout(() => {
    window.location.href = "welcome.html";
}, 3500);
</script>

</body>
</html>
