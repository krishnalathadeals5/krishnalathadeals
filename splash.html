<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Splash</title>

<style>
body{
    margin:0;
    background:#02150e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:gold;
    font-family:Arial;
    overflow:hidden;
}

/* ✨ Fade animation */
.fade{
    opacity:0;
    transform:scale(0.95);
    animation:fadeIn 0.6s ease forwards;
}

@keyframes fadeIn{
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>

</head>

<body>

<div class="fade">
    <h1>Krishnalatha Deals</h1>
    <p>Loading...</p>
</div>

<script>

// ⚡ ULTRA FAST (0.8s)
setTimeout(function(){

    try{

        let visited = localStorage.getItem("visited");

        if(visited === "true"){
            window.location.replace("home.html");
        }else{
            localStorage.setItem("visited","true");
            window.location.replace("welcome.html");
        }

    }catch(e){
        window.location.replace("home.html");
    }

}, 800);

</script>

</body>
</html>
