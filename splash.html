<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Splash</title>

<style>
body{
    margin:0;
    background:#02150e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:gold;
    font-family:Arial;
}
</style>

</head>

<body>

<div>
    <h1>Krishnalatha Deals</h1>
    <p>Loading...</p>
</div>

<script>

// ⚡ FAST LOAD (1.5 sec only)
setTimeout(function(){

    try{

        let visited = localStorage.getItem("visited");

        if(visited === "true"){
            window.location.replace("home.html");
        }else{
            localStorage.setItem("visited","true");
            window.location.replace("welcome.html");
        }

    }catch(e){
        window.location.replace("home.html");
    }

}, 1500);

</script>

</body>
</html>
