<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Krishnalatha Deals - Premium Splash</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
height:100vh;overflow:hidden;font-family:Segoe UI,Arial,sans-serif;
display:flex;justify-content:center;align-items:center;
background:
radial-gradient(circle at top,#1d8b6b22,transparent 40%),
linear-gradient(135deg,#050505,#0b1220,#062b22,#000);
color:#f5d77a;
}
.star{position:absolute;width:3px;height:3px;background:#d4af37;border-radius:50%;animation:fall linear infinite;opacity:.8}
@keyframes fall{from{transform:translateY(-10vh)}to{transform:translateY(110vh)}}
.card{
width:min(92vw,520px);
padding:42px;border:1px solid rgba(212,175,55,.5);
border-radius:28px;text-align:center;
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
box-shadow:0 0 45px rgba(212,175,55,.18);
animation:up .9s ease;
}
@keyframes up{from{opacity:0;transform:translateY(35px)}}
.logo{
width:130px;height:130px;border-radius:50%;
margin:auto;border:4px solid #d4af37;
display:flex;align-items:center;justify-content:center;
font-size:46px;font-weight:900;
background:linear-gradient(135deg,#063a26,#118b5c);
box-shadow:0 0 25px rgba(212,175,55,.6);
animation:glow 2s infinite alternate;
}
@keyframes glow{to{box-shadow:0 0 50px rgba(255,215,0,.9)}}
h1{margin:24px 0 8px;font-size:38px;letter-spacing:2px;text-shadow:0 0 12px #d4af37}
h2{font-size:18px;color:#fff4c7;font-weight:400}
p{margin:18px 0;color:#ddd;line-height:1.7}
.bar{height:10px;background:#222;border-radius:999px;overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,#b8860b,#ffd700,#fff1a8);animation:load 3.5s linear forwards}
@keyframes load{to{width:100%}}
.small{margin-top:14px;color:#eee}
</style>
</head>
<body>
<script>
for(let i=0;i<120;i++){
 let s=document.createElement('div');
 s.className='star';
 s.style.left=Math.random()*100+'vw';
 s.style.animationDuration=(3+Math.random()*6)+'s';
 s.style.animationDelay=(Math.random()*4)+'s';
 document.body.appendChild(s);
}
</script>
<div class="card">
<div class="logo">KD</div>
<h1>KRISHNALATHA DEALS</h1>
<h2>Best Deals • Big Savings</h2>
<p>Preparing your premium shopping experience...</p>
<div class="bar"><div class="fill"></div></div>
<div class="small">Loading...</div>
</div>
<script>
setTimeout(()=>{
document.body.style.transition="opacity .8s";
document.body.style.opacity="0";
setTimeout(()=>location.href="welcome.html",800);
},3500);
</script>
</body>
</html>
