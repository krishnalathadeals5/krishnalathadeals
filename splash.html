<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Splash</title>

<style>
body{
    margin:0;
    background:#02150e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:gold;
    font-family:Arial;
}
</style>

</head>

<body>

<div>
    <h1>Krishnalatha Deals</h1>
    <p>Loading...</p>
</div>

<script>
setTimeout(function(){

    try{
        if(localStorage.getItem("visited")){
            window.location.href = "home.html";
        }else{
            localStorage.setItem("visited","true");
            window.location.href = "welcome.html";
        }
    }catch(e){
        // fallback if localStorage fails
        window.location.href = "home.html";
    }

}, 4000);
</script>

</body>
</html>
