<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Krishnalatha Deals</title>

<style>

/* BACKGROUND */
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at center, #0d4d3a, #021d16 70%);
  font-family: 'Georgia', serif;
  overflow:hidden;
}

/* MAIN CARD */
.container{
  width:340px;
  padding:30px 25px;
  text-align:center;
  border-radius:18px;
  position:relative;
  border:1.5px solid rgba(212,175,55,0.6);
  background: linear-gradient(145deg, rgba(0,40,30,0.9), rgba(0,20,15,0.95));
  box-shadow: 
    0 0 25px rgba(212,175,55,0.4),
    inset 0 0 20px rgba(212,175,55,0.1);
}

/* CORNER DESIGN */
.container::before,
.container::after{
  content:"";
  position:absolute;
  width:40px;
  height:40px;
  border:2px solid #d4af37;
}

.container::before{
  top:10px;
  left:10px;
  border-right:none;
  border-bottom:none;
}

.container::after{
  bottom:10px;
  right:10px;
  border-left:none;
  border-top:none;
}

/* LOGO */
.logo{
  width:110px;
  height:110px;
  margin:auto;
  border-radius:50%;
  border:2px solid #d4af37;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:38px;
  color:#ffd700;
  position:relative;
  box-shadow:0 0 25px rgba(255,215,0,0.6);
  animation: glow 2s infinite alternate;
}

/* CROWN */
.logo::before{
  content:"👑";
  position:absolute;
  top:-22px;
  font-size:22px;
}

/* GLOW ANIMATION */
@keyframes glow{
  from{ box-shadow:0 0 15px #d4af37; }
  to{ box-shadow:0 0 45px #ffd700; }
}

/* TITLE */
h1{
  margin-top:20px;
  font-size:26px;
  letter-spacing:2px;
  color:#d4af37;
}

/* TAGLINE */
.tagline{
  margin-top:8px;
  font-size:13px;
  color:#ddd;
  line-height:1.6;
}

/* GOLD LINE */
.line{
  width:70%;
  height:2px;
  margin:18px auto;
  background: linear-gradient(to right, transparent, #d4af37, transparent);
}

/* PROGRESS BAR */
.progress-container{
  width:100%;
  height:6px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background: linear-gradient(to right, #d4af37, #ffd700);
  animation: load 3s linear forwards;
}

@keyframes load{
  0%{ width:0%; }
  100%{ width:100%; }
}

/* LOADING TEXT */
.loading{
  margin-top:10px;
  font-size:13px;
  color:#ccc;
}

/* PARTICLES */
.particle{
  position:absolute;
  width:5px;
  height:5px;
  background:#ffd700;
  border-radius:50%;
  opacity:0.8;
  animation: float 6s infinite linear;
}

@keyframes float{
  from{
    transform: translateY(0);
    opacity:1;
  }
  to{
    transform: translateY(-800px);
    opacity:0;
  }
}

</style>
</head>

<body>

<div class="container">

  <div class="logo">KD</div>

  <h1>KRISHNALATHA<br>DEALS</h1>

  <div class="tagline">
    BEST DEALS, BIG SAVINGS!<br>
    One Destination. Endless Savings.
  </div>

  <div class="line"></div>

  <div class="progress-container">
    <div class="progress-bar"></div>
  </div>

  <div class="loading">Loading...</div>

</div>

<!-- PARTICLES -->
<script>
for(let i=0;i<30;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.bottom="-10px";
  p.style.animationDuration=(4+Math.random()*4)+"s";
  p.style.opacity=Math.random();
  document.body.appendChild(p);
}

// REDIRECT AFTER LOAD
setTimeout(()=>{
  window.location.href="home.html";
},3000);
</script>

</body>
</html>
