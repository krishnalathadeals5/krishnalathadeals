<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Splash</title>

<style>
body{
    margin:0;
    background:#02150e;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:gold;
    font-family:Arial;
}

/* instant show */
.container{
    animation:fade 0.3s ease;
}

@keyframes fade{
    from{opacity:0;}
    to{opacity:1;}
}
</style>

</head>

<body>

<div class="container">
    <h1>Krishnalatha Deals</h1>
</div>

<script>

// ⚡ SUPER FAST (0.3 sec)
setTimeout(function(){

    try{

        let visited = localStorage.getItem("visited");

        if(visited === "true"){
            window.location.replace("home.html");
        }else{
            localStorage.setItem("visited","true");
            window.location.replace("welcome.html");
        }

    }catch(e){
        window.location.replace("home.html");
    }

}, 300);

</script>

</body>
</html>
