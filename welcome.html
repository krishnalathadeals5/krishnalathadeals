<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome | Krishnalatha Deals</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #f8f8f8, #ffffff);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .welcome-box{
      width:100%;
      max-width:500px;
      background:#fff;
      border-radius:24px;
      padding:40px 25px;
      text-align:center;
      box-shadow:0 12px 35px rgba(0,0,0,0.12);
      animation: fadeIn 1s ease;
      border: 2px solid #f2e3a5;
    }

    .logo-circle{
      width:110px;
      height:110px;
      margin:0 auto 18px;
      border:3px solid #d4af37;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:42px;
      font-weight:800;
      color:#d4af37;
      background:linear-gradient(135deg, #0d7a40, #0a5f32);
      box-shadow:0 0 20px rgba(212,175,55,0.25);
    }

    .brand-small{
      color:#0d7a40;
      font-size:20px;
      font-weight:700;
      margin-bottom:10px;
      letter-spacing:0.5px;
    }

    .welcome-title{
      font-size:44px;
      line-height:1.15;
      color:#145c35;
      font-weight:800;
      margin-bottom:12px;
    }

    .tagline{
      color:#666;
      font-size:18px;
      margin-bottom:25px;
    }

    .deal-emoji{
      font-size:70px;
      margin:10px 0 20px;
    }

    .loading-text{
      color:#0d7a40;
      font-size:16px;
      font-weight:600;
      margin-bottom:12px;
    }

    .loader{
      width:220px;
      max-width:100%;
      height:8px;
      background:#eee;
      border-radius:999px;
      overflow:hidden;
      margin:0 auto;
    }

    .loader span{
      display:block;
      height:100%;
      width:0%;
      background:linear-gradient(90deg, #0d7a40, #d4af37);
      border-radius:999px;
      animation:loading 2.5s linear forwards;
    }

    @keyframes loading{
      from{ width:0%; }
      to{ width:100%; }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @media (max-width: 600px){
      .welcome-box{
        padding:30px 18px;
      }

      .welcome-title{
        font-size:34px;
      }

      .tagline{
        font-size:16px;
      }

      .deal-emoji{
        font-size:56px;
      }
    }
  </style>
</head>
<body>

  <div class="welcome-box">
    <div class="logo-circle">KD</div>
    <div class="brand-small">KRISHNALATHA DEALS</div>

    <div class="welcome-title">
      Welcome to<br>Krishnalatha Deals
    </div>

    <div class="tagline">Best Deals, Big Savings!</div>

    <div class="deal-emoji">🛍️💚💰</div>

    <div class="loading-text">Loading best deals for you...</div>

    <div class="loader">
      <span></span>
    </div>
  </div>

  <script>
    setTimeout(() => {
      window.location.href = "home.html";
    }, 2600);
  </script>

</body>
</html>
